<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EdgeFinder Pro</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg:        #1a1a1a;
      --bg-card:   #242424;
      --bg-panel:  #111111;
      --bg-input:  #2a2a2a;
      --border:    #333333;
      --border-hi: #444444;
      --green:     #00ff41;
      --green-dim: rgba(0,255,65,0.3);
      --green-glow:rgba(0,255,65,0.06);
      --green-dark:rgba(0,255,65,0.08);
      --yellow:    #f0b429;
      --yellow-dim:rgba(240,180,41,0.13);
      --red:       #ff4444;
      --red-dim:   rgba(255,68,68,0.13);
      --blue:      #00ff41;
      --blue-dim:  rgba(0,255,65,0.1);
      --text:      #ffffff;
      --text-dim:  #666666;
      --text-mid:  #aaaaaa;
      --text-bright:#ffffff;
      --font:      'Courier New', Courier, monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      font-size: 13px;
      line-height: 1.5;
    }
    /* ── scrollbar ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 3px; }

    /* ── layout ── */
    #root { display: flex; flex-direction: column; min-height: 100vh; }
    .header {
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 50;
    }
    .header-inner {
      max-width: 1400px; margin: 0 auto;
      padding: 10px 16px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .header-top {
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
    }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-box {
      width: 32px; height: 32px;
      background: var(--green);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; color: #000; font-size: 12px;
    }
    .logo-text h1 { font-size: 16px; font-weight: 900; color: var(--green); letter-spacing: 1px; }
    .logo-text p  { font-size: 10px; color: var(--text-dim); }
    .quota-badge {
      font-size: 11px; color: var(--text-dim);
      border: 1px solid var(--border);
      padding: 3px 8px; border-radius: 3px;
    }
    .quota-badge span { color: var(--green); font-weight: 900; font-size: 13px; }

    /* ── result badges (Yesterday's Picks) ── */
    .rb { display:inline-block; border-radius:3px; padding:2px 7px; font-size:10px; font-weight:900; letter-spacing:.5px; }
    .rb-win  { background:rgba(0,255,136,.18); color:var(--green); border:1px solid rgba(0,255,136,.4); }
    .rb-loss { background:rgba(255,68,68,.18); color:var(--red); border:1px solid rgba(255,68,68,.4); }
    .rb-push { background:rgba(128,128,128,.15); color:var(--text-mid); border:1px solid rgba(128,128,128,.3); }
    .rb-pending { background:rgba(255,200,0,.12); color:var(--yellow); border:1px solid rgba(255,200,0,.3); animation:pulse 2s infinite; }
    .yesterday-summary { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:14px; }
    .ys-stat { background:var(--bg-card); border:1px solid var(--border); border-radius:4px; padding:8px 14px; text-align:center; }
    .ys-stat-val { font-size:20px; font-weight:900; }
    .ys-stat-lbl { font-size:9px; color:var(--text-dim); letter-spacing:1px; text-transform:uppercase; margin-top:2px; }
    .ys-sport-label { font-size:10px; color:var(--green); font-weight:900; letter-spacing:1px; text-transform:uppercase; margin:14px 0 8px; padding-bottom:4px; border-bottom:1px solid var(--border); }
    .ys-pick-row { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid rgba(255,255,255,.04); flex-wrap:wrap; }
    .ys-game { font-size:11px; color:var(--text-mid); flex:1; min-width:120px; }
    .ys-pick { font-size:12px; color:var(--text-bright); font-weight:700; }
    .ys-meta { font-size:10px; color:var(--text-dim); }
    .ys-parlay-card { background:var(--bg-card); border:1px solid var(--border); border-radius:6px; padding:12px; margin-bottom:10px; }
    .ys-parlay-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
    .ys-parlay-type { font-size:11px; color:var(--text-mid); font-weight:700; }
    .ys-parlay-result { font-size:16px; font-weight:900; }
    .ys-leg { display:flex; align-items:center; gap:8px; padding:4px 0; border-bottom:1px solid rgba(255,255,255,.04); }
    .ys-leg-pick { font-size:11px; color:var(--text-bright); flex:1; }
    .ys-leg-game { font-size:10px; color:var(--text-dim); }
    .last-checked { font-size:10px; color:var(--text-dim); margin-left:auto; }

    /* ── sport tabs ── */
    .sport-tabs {
      display: flex; flex-wrap: wrap; gap: 4px;
    }
    .sport-tab {
      padding: 5px 12px;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      font-family: var(--font);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      transition: all 0.15s;
      text-transform: uppercase;
    }
    .sport-tab:hover { border-color: var(--green-dim); color: var(--text-mid); }
    .sport-tab.active {
      background: var(--green-dark);
      border-color: var(--green);
      color: var(--green);
    }
    .sport-tab.special {
      border-color: var(--yellow-dim);
      color: var(--text-dim);
    }
    .sport-tab.special.active {
      background: var(--yellow-dim);
      border-color: var(--yellow);
      color: var(--yellow);
    }
    .sport-tab.stats-tab.active {
      background: var(--blue-dim);
      border-color: var(--blue);
      color: var(--blue);
    }

    /* ── main ── */
    main { flex: 1; max-width: 1400px; margin: 0 auto; width: 100%; padding: 16px; }

    /* ── section header ── */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px; flex-wrap: wrap; gap: 8px;
    }
    .section-title {
      font-size: 13px; font-weight: 900; color: var(--green);
      letter-spacing: 1px; text-transform: uppercase;
    }
    .section-subtitle { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
    .badge {
      display: inline-flex; align-items: center;
      padding: 2px 8px; border-radius: 2px;
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .badge-green  { background: var(--green-dark); color: var(--green); border: 1px solid var(--green-dim); }
    .badge-yellow { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(255,215,0,0.3); }
    .badge-red    { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,68,102,0.3); }
    .badge-blue   { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(0,212,255,0.3); }
    .badge-dim    { background: rgba(255,255,255,0.04); color: var(--text-mid); border: 1px solid var(--border); }
    .badge-vegas  { background: rgba(255,68,102,0.12); color: #ff6688; border: 1px solid rgba(255,68,102,0.25); }
    .badge-public { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(0,212,255,0.25); }

    /* ── card ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 14px;
      margin-bottom: 10px;
    }
    .card:last-child { margin-bottom: 0; }

    /* ── game pick card ── */
    .game-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      flex-wrap: wrap; gap: 6px; margin-bottom: 12px;
    }
    .game-matchup {
      font-size: 15px; font-weight: 900; color: var(--text-bright);
      letter-spacing: 0.5px;
    }
    .game-matchup .at { color: var(--text-dim); font-size: 12px; }
    .game-meta {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
      margin-top: 4px;
    }
    .game-time { font-size: 10px; color: var(--text-dim); }

    /* ── pick type rows ── */
    .picks-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }
    @media (max-width: 700px) {
      .picks-grid { grid-template-columns: 1fr; }
    }
    .pick-type-card {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px;
    }
    .pick-type-label {
      font-size: 9px; font-weight: 900; letter-spacing: 1.5px;
      color: var(--text-dim); text-transform: uppercase; margin-bottom: 6px;
    }
    .pick-value {
      font-size: 14px; font-weight: 900; color: var(--green);
      margin-bottom: 2px;
    }
    .pick-odds { font-size: 12px; color: var(--text-mid); margin-bottom: 6px; }
    .pick-explanation {
      font-size: 10px; color: var(--text-mid); line-height: 1.5;
      margin-bottom: 8px; border-left: 2px solid var(--border-hi);
      padding-left: 6px;
    }
    .systems-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
    .system-tag {
      font-size: 9px; padding: 2px 6px;
      background: rgba(0,255,136,0.07);
      border: 1px solid rgba(0,255,136,0.2);
      border-radius: 2px; color: var(--green-dim);
    }

    /* ── probability bars ── */
    .bar-section { display: flex; flex-direction: column; gap: 5px; }
    .bar-row { display: flex; flex-direction: column; gap: 2px; }
    .bar-label {
      display: flex; justify-content: space-between;
      font-size: 9px; color: var(--text-dim);
    }
    .bar-label span:last-child { color: var(--text-mid); }
    .bar-track {
      height: 5px; background: var(--border);
      border-radius: 2px; overflow: hidden;
    }
    .bar-fill {
      height: 100%; border-radius: 2px;
      transition: width 0.5s ease;
    }
    .bar-fill-green { background: var(--green); }
    .bar-fill-blue  { background: var(--blue); }
    .bar-fill-yellow{ background: var(--yellow); }
    .bar-fill-red   { background: var(--red); }

    /* ── result buttons ── */
    .result-row {
      display: flex; align-items: center; gap: 6px;
      padding-top: 10px; border-top: 1px solid var(--border);
    }
    .result-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; flex: 1; }
    .result-btn {
      padding: 3px 10px; border-radius: 2px; cursor: pointer;
      font-family: var(--font); font-size: 10px; font-weight: 700;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-dim); transition: all 0.15s;
    }
    .result-btn:hover { opacity: 0.8; }
    .result-btn.active-W { background: var(--green-dark); border-color: var(--green); color: var(--green); }
    .result-btn.active-L { background: var(--red-dim); border-color: var(--red); color: var(--red); }
    .result-btn.active-P { background: var(--yellow-dim); border-color: var(--yellow); color: var(--yellow); }

    /* ── skeleton ── */
    @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:.6} }
    .skeleton { background: var(--border); border-radius: 3px; animation: pulse 1.5s ease infinite; }
    .skel-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 4px; padding: 14px; margin-bottom: 10px; }
    .skel-line { height: 10px; margin-bottom: 8px; }
    .skel-line.tall { height: 16px; }
    .skel-line.short { width: 40%; }
    .skel-line.medium { width: 65%; }
    .skel-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin: 12px 0; }
    .skel-box { height: 120px; border-radius: 4px; }
    @media (max-width: 700px) { .skel-grid { grid-template-columns: 1fr; } .skel-box { height: 80px; } }

    /* ── parlay slips ── */
    .parlays-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 12px;
    }
    .parlay-slip {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .parlay-header {
      padding: 10px 14px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .parlay-type {
      font-size: 11px; font-weight: 900;
      letter-spacing: 1.5px; text-transform: uppercase;
    }
    .parlay-odds {
      font-size: 22px; font-weight: 900;
      color: var(--green);
      text-shadow: 0 0 12px rgba(0,255,136,0.4);
    }
    .parlay-leg {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: 7px 14px;
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }
    .parlay-leg:last-of-type { border-bottom: none; }
    .leg-game { font-size: 10px; color: var(--text-dim); margin-bottom: 2px; }
    .leg-pick { font-size: 12px; font-weight: 700; color: var(--text-bright); }
    .leg-alt { font-size: 9px; color: var(--yellow); }
    .leg-odds-badge {
      font-size: 11px; font-weight: 700; padding: 2px 7px;
      border-radius: 2px; white-space: nowrap; flex-shrink: 0;
      background: rgba(0,255,136,0.07);
      border: 1px solid rgba(0,255,136,0.2);
      color: var(--green);
    }
    .parlay-footer {
      padding: 10px 14px;
      background: var(--bg-panel);
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .parlay-risk {
      font-size: 10px; color: var(--text-dim);
    }
    .parlay-win {
      font-size: 14px; font-weight: 900; color: var(--green);
    }
    .parlay-result-row {
      padding: 6px 14px;
      display: flex; align-items: center; gap: 6px;
      border-top: 1px solid var(--border);
    }

    /* ── performance dashboard ── */
    .perf-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px; margin-bottom: 16px;
    }
    .perf-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px; padding: 12px;
    }
    .perf-card-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .perf-card-value { font-size: 22px; font-weight: 900; color: var(--green); }
    .perf-card-sub { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
    .perf-target-bar {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 4px; padding: 14px; margin-bottom: 14px;
    }
    .perf-table-wrap { overflow-x: auto; }
    .perf-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .perf-table th {
      text-align: left; padding: 6px 10px;
      font-size: 9px; color: var(--text-dim); text-transform: uppercase;
      letter-spacing: 1px; border-bottom: 1px solid var(--border);
    }
    .perf-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); }
    .perf-table tr:last-child td { border-bottom: none; }
    .perf-table tr:hover td { background: rgba(255,255,255,0.02); }
    .hot-badge { font-size: 9px; color: var(--green); margin-left: 4px; }
    .cold-badge { font-size: 9px; color: var(--red); margin-left: 4px; }

    /* ── injuries ── */
    .injury-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 4px; padding: 10px 12px; margin-bottom: 8px;
    }
    .injury-title { font-size: 12px; font-weight: 700; color: var(--text-bright); margin-bottom: 4px; }
    .injury-desc { font-size: 11px; color: var(--text-mid); line-height: 1.5; }

    /* ── button ── */
    .btn {
      padding: 6px 14px; border-radius: 3px; cursor: pointer;
      font-family: var(--font); font-size: 11px; font-weight: 700;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-mid); transition: all 0.15s;
      letter-spacing: 0.5px;
    }
    .btn:hover { border-color: var(--green-dim); color: var(--text); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-green {
      background: var(--green-dark); border-color: var(--green); color: var(--green);
    }
    .btn-green:hover { background: rgba(0,255,136,0.15); }

    /* ── spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    .loading-row { display: flex; align-items: center; gap: 10px; color: var(--text-dim); font-size: 11px; padding: 16px 0; }

    /* ── fade in ── */
    @keyframes fadeIn { from { opacity:0; transform: translateY(4px); } to { opacity:1; transform: none; } }
    .fade-in { animation: fadeIn 0.25s ease; }

    /* ── error ── */
    .error-box {
      background: var(--red-dim); border: 1px solid rgba(255,68,102,0.3);
      border-radius: 4px; padding: 10px 14px;
      color: var(--red); font-size: 11px; margin-bottom: 12px;
    }

    /* ── empty ── */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--text-dim); font-size: 12px;
    }
    .empty-state .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }

    /* ── input ── */
    .filter-input {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: var(--font);
      font-size: 11px;
      padding: 5px 10px;
      outline: none;
      width: 240px;
    }
    .filter-input:focus { border-color: var(--green-dim); }

    /* ── footer ── */
    footer {
      text-align: center; padding: 12px;
      font-size: 10px; color: var(--text-dim);
      border-top: 1px solid var(--border);
    }

    /* ── no-games note ── */
    .no-games {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 4px; padding: 30px; text-align: center;
      color: var(--text-dim); font-size: 12px;
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
function getTodayName() {
  return ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date().getDay()];
}
function getDayName() { return getTodayName(); }
const TODAY_NAME = getTodayName();

const { useState, useEffect, useCallback, useRef, useMemo } = React;

// ─── CONSTANTS ────────────────────────────────────────────────────────────────

const SPORTS = [
  { key: 'americanfootball_nfl',   label: 'NFL',          league: 'nfl' },
  { key: 'basketball_nba',         label: 'NBA',          league: 'nba' },
  { key: 'baseball_mlb',           label: 'MLB',          league: 'mlb', includeWbc: true },
  { key: 'icehockey_nhl',          label: 'NHL',          league: 'nhl' },
  { key: 'americanfootball_ncaaf', label: 'NCAAF',        league: 'nfl' },
  { key: 'baseball_ncaa',          label: 'NCAA Baseball', league: 'mlb', noSlotLogic: true },
  { key: 'basketball_ncaab',       label: 'NCAAB',        league: 'nba' },
  { key: 'mma_mixed_martial_arts', label: 'UFC/MMA',      league: 'mma' },
];

const ROTOWIRE_MAP = {
  nfl: 'nfl', nba: 'nba', mlb: 'mlb', nhl: 'nhl', mma: null,
};

const GOAT_SYSTEM_PROMPT = `You are an expert sports betting AI trained on the GOAT Sports Bets system.

═══ DAY SLOT RULES BY SPORT ═══

NFL:
- Monday = VEGAS (Look For Scams, Week Ends)
- Tuesday = VEGAS
- Wednesday = VEGAS
- Thursday = PUBLIC (Week Starts)
- Friday = PUBLIC
- Saturday = PUBLIC before 6pm local time | VEGAS at/after 6pm local time (flag: "BE CAUTIOUS")
- Sunday = Early games before 4pm ET = PUBLIC slate | Late games 4pm ET or later = VEGAS slate

NCAAF:
- Thursday = PUBLIC
- Friday = PUBLIC
- Saturday = Mid-day through afternoon games = VEGAS | Night games = PUBLIC (flag: "BE CAUTIOUS")

NBA — ALTERNATING TIME SLOT RULE:
- PUBLIC days: Monday, Wednesday, Friday
- VEGAS days: Tuesday, Thursday, Saturday, Sunday
- Step 1: Group all games by their exact start time
- Step 2 on PUBLIC day: first time group = VEGAS slot, second time group = PUBLIC slot, third = VEGAS, continues alternating
- Step 2 on VEGAS day: first time group = PUBLIC slot, second time group = VEGAS slot, third = PUBLIC, continues alternating
- ALL games within the same time group get the SAME slot — do NOT alternate within a group

MLB / WBC:
- Monday = PUBLIC
- Tuesday = VEGAS
- Wednesday = HYBRID: games starting before 5:40pm CST = PUBLIC slot | games at/after 5:40pm CST = VEGAS slot
- Thursday = VEGAS
- Friday = PUBLIC
- Saturday = VEGAS (first game on slate = PUBLIC slot)
- Sunday = VEGAS (first game on slate = PUBLIC slot)

NHL — BASED ON GAME COUNT (not day of week):
- 1 game = VEGAS (Look for Scam)
- 2 games = PUBLIC (first game gets VEGAS slot)
- 4 or more games = PUBLIC (first game gets VEGAS slot)
- 3 games = PUBLIC

NHL SPECIAL PRICING RULES (include in reasoning):
- Accurately Priced 3-Way ML: ML under -200 → fair odds range is 50–70 points; ML over -200 → fair range is 90–110 points
- Example bait line: -250 ML with a -120 3-way ML = too many points = flag as "BAIT — MAY LOSE OUTRIGHT"
- Tucked underdog: ML in -105 to +120 range = good value, flag as "TUCKED UNDERDOG"
- Location of game is important. Use team H2H history, rankings, home/away record.

NCAAB:
- Same alternating slot logic as NBA (group by start time, alternates starting opposite of day type)
- Monday/Wednesday/Friday = PUBLIC days; Tuesday/Thursday/Saturday/Sunday = VEGAS days

UFC / MMA:
- Do NOT apply any slot rules. Analyze purely on fighter matchup: styles, reach, age, recent form, finish rate, and line value.

═══ ALTERNATING SLOT MECHANICS ═══
Group all games by exact start time before assigning slots.
On a VEGAS day: first time group = PUBLIC, next = VEGAS, next = PUBLIC... (alternates by group)
On a PUBLIC day: first time group = VEGAS, next = PUBLIC, next = VEGAS... (alternates by group)
Every game within the same time group shares the same slot. Never alternate within a group.

═══ PEMDAS FRAMEWORK ═══
P = Slot (apply rules above first)
E = Trell Rule (star player first absence = covers Vegas slot, HIGH CONFIDENCE)
M = Line Movement (use money movement data provided)
D = Injuries (adjust confidence if key players out)
A = H2H (head-to-head record, location)
S = History (recent form, last 5 games)

PUBLIC slot: sensible outcome, underdog spread if even, OVER if high scorers and total drops
VEGAS slot: upset/scam, favorite if even, UNDER lean

═══ SYSTEM RULES ═══
FLIP FLOP: Big underdog win last game = FADE that team next game
RANK SCAM: Top-ranked team after blowout in Vegas slot = fade. Compare AP Poll ranking to spread — gap = edge.
ANTI-SPAM: 5 OVERs in a row = lean UNDERs. Short slate = underdog day.
SAFETY PARLAY: Find -200+ favorites, apply +4 alt line points, parlay together.
ODDS FLOOR: Never recommend anything heavier than -250.

CONFIDENCE BOOST:
- Sharp signal (SHARP ACTION or STEAM) + correct slot alignment = +2 ai_strength
- Steam alone = +1 ai_strength
- PUBLIC money with no sharp signal = -1 ai_strength
- Conflicting signals = note conflict in explanation, no change

LEARNING: Use historical performance data provided. If a system is hitting below 50% recently, reduce its weight. If above 70%, increase confidence.

VALUE DOG DETECTION:
When you identify a strong underdog play, add "VALUE DOG" to the systems array for that pick. A VALUE DOG is a plus-money underdog that is mispriced by the market. Flag as VALUE DOG when the team is +100 or better AND has 2+ of these factors:
- Line moving toward them (sharp money coming in on underdog)
- Public 65%+ on the favorite (fade the public opportunity)
- Home underdog
- Won 3+ of last 5 H2H meetings against this opponent
- Revenge spot (underdog lost badly in the last meeting)
- Favorite on back-to-back or 3rd game in 4 nights
- Trell Rule on the favorite (star player first absence)
- Rank Scam on the favorite (top-ranked team in Vegas slot after a blowout)
- Underdog in PUBLIC slot (public slot favors the sensible underdog cover)
Always include specific reasoning in the explanation field for WHY this team is mispriced (e.g. "VALUE DOG: Home, line moved from +140 to +115, public 72% on favorite — sharp fade play").
Do NOT apply VALUE DOG to UFC/MMA picks.`;

// ─── SLOT ASSIGNMENT ──────────────────────────────────────────────────────────

function assignSlots(games, sport) {
  const dayName = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date().getDay()];

  // Filter to today only - never include future days
  const today = new Date();
  const todayGames = games.filter(g => {
    const d = new Date(g.commence_time);
    return d.getFullYear() === today.getFullYear() &&
           d.getMonth() === today.getMonth() &&
           d.getDate() === today.getDate();
  });

  const slots = {};

  // ── MLB WEDNESDAY HYBRID ──────────────────────────────
  // Before 5:40pm CST (11:40pm UTC) = PUBLIC, after = VEGAS
  if ((sport === 'MLB' || sport === 'WBC') && dayName === 'Wednesday') {
    todayGames.forEach(g => {
      const utcMins = new Date(g.commence_time).getUTCHours() * 60 + new Date(g.commence_time).getUTCMinutes();
      slots[g.id] = utcMins >= 1420 ? 'VEGAS' : 'PUBLIC';
      console.log('SLOT|'+sport+'|Wed Hybrid|'+new Date(g.commence_time).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})+'|'+slots[g.id]);
    });
    return { slots, dayName, hybrid: true };
  }

  // ── NFL SATURDAY SPLIT ────────────────────────────────
  // Before 6pm local = PUBLIC, 6pm+ = VEGAS
  if (sport === 'NFL' && dayName === 'Saturday') {
    todayGames.forEach(g => {
      const hour = new Date(g.commence_time).getHours();
      slots[g.id] = hour >= 18 ? 'VEGAS' : 'PUBLIC';
      console.log('SLOT|NFL|Sat Split|hour:'+hour+'|'+slots[g.id]);
    });
    return { slots, dayName, hybrid: true };
  }

  // ── NFL SUNDAY SPLIT ──────────────────────────────────
  // Before 4pm ET = PUBLIC, 4pm ET+ = VEGAS
  if (sport === 'NFL' && dayName === 'Sunday') {
    todayGames.forEach(g => {
      const etHour = (new Date(g.commence_time).getUTCHours() - 5 + 24) % 24;
      slots[g.id] = etHour >= 16 ? 'VEGAS' : 'PUBLIC';
      console.log('SLOT|NFL|Sun Split|ET hour:'+etHour+'|'+slots[g.id]);
    });
    return { slots, dayName, hybrid: true };
  }

  // ── NCAAF SATURDAY SPLIT ──────────────────────────────
  // Before 7pm local = VEGAS, 7pm+ = PUBLIC (flag as BE CAUTIOUS)
  if (sport === 'NCAAF' && dayName === 'Saturday') {
    todayGames.forEach(g => {
      const hour = new Date(g.commence_time).getHours();
      slots[g.id] = hour >= 19 ? 'PUBLIC' : 'VEGAS';
      if (hour >= 19) console.log('SLOT|NCAAF|Sat Night BE CAUTIOUS|'+g.away_team+'@'+g.home_team);
    });
    return { slots, dayName, hybrid: true };
  }

  // ── NHL GAME COUNT RULE ───────────────────────────────
  // 1 game = entire slate VEGAS (scam)
  // 2+ games = first time group VEGAS, alternates
  if (sport === 'NHL') {
    if (todayGames.length === 1) {
      todayGames.forEach(g => { slots[g.id] = 'VEGAS'; });
      console.log('SLOT|NHL|1 game scam|VEGAS');
      return { slots, dayName };
    }
    // 2+ games: first group always VEGAS then alternate
    const groups = {};
    todayGames.forEach(g => {
      const mins = new Date(g.commence_time).getHours() * 60 + new Date(g.commence_time).getMinutes();
      const key = Math.round(mins / 15) * 15;
      if (!groups[key]) groups[key] = [];
      groups[key].push(g);
    });
    const sortedKeys = Object.keys(groups).map(Number).sort((a,b) => a-b);
    sortedKeys.forEach((key, index) => {
      const slot = index % 2 === 0 ? 'VEGAS' : 'PUBLIC';
      groups[key].forEach(g => {
        slots[g.id] = slot;
        const t = new Date(g.commence_time).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
        console.log('SLOT|NHL|'+t+'|idx:'+index+'|'+g.away_team+'@'+g.home_team+'|'+slot);
      });
    });
    return { slots, dayName };
  }

  // ── ALL OTHER SPORTS: NBA, MLB (non-Wed), NCAAF (non-Sat), NCAAB, NFL (non-Sat/Sun) ──
  // Determine if today is a VEGAS day for this sport
  const VEGAS_DAYS = {
    NBA:   ['Tuesday','Thursday','Saturday','Sunday'],
    MLB:   ['Tuesday','Thursday','Saturday','Sunday'],
    WBC:   ['Tuesday','Thursday','Saturday','Sunday'],
    NCAAB: ['Tuesday','Thursday','Saturday','Sunday'],
    NFL:   ['Monday','Tuesday','Wednesday'],
    NCAAF: ['Monday','Tuesday','Wednesday'],
  };
  const isVegas = (VEGAS_DAYS[sport] || []).includes(dayName);

  // Group by time rounded to nearest 15 min
  const groups = {};
  todayGames.forEach(g => {
    const mins = new Date(g.commence_time).getHours() * 60 + new Date(g.commence_time).getMinutes();
    const key = Math.round(mins / 15) * 15;
    if (!groups[key]) groups[key] = [];
    groups[key].push(g);
  });

  const sortedKeys = Object.keys(groups).map(Number).sort((a,b) => a-b);

  sortedKeys.forEach((key, index) => {
    // PUBLIC day (isVegas=false): even index=VEGAS, odd index=PUBLIC
    // VEGAS day (isVegas=true): even index=PUBLIC, odd index=VEGAS
    const slot = isVegas
      ? (index % 2 === 0 ? 'PUBLIC' : 'VEGAS')
      : (index % 2 === 0 ? 'VEGAS' : 'PUBLIC');
    groups[key].forEach(g => {
      slots[g.id] = slot;
      const t = new Date(g.commence_time).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
      console.log('SLOT|'+sport+'|'+dayName+'|vegasDay:'+isVegas+'|'+t+'|idx:'+index+'|'+g.away_team+'@'+g.home_team+'|'+slot);
    });
  });

  return { slots, dayName, isVegas };
}

function americanToImplied(odds) {
  if (!odds || isNaN(odds)) return 50;
  if (odds > 0) return (100 / (odds + 100)) * 100;
  return (Math.abs(odds) / (Math.abs(odds) + 100)) * 100;
}

function fmtOdds(price) {
  if (price === null || price === undefined || isNaN(price)) return 'N/A';
  return price > 0 ? `+${price}` : `${price}`;
}

function parlayWin(totalOdds, risk) {
  if (totalOdds > 0) return ((totalOdds / 100) * risk).toFixed(2);
  return ((100 / Math.abs(totalOdds)) * risk).toFixed(2);
}

function winRatePct(w, l) {
  if (w + l === 0) return null;
  return ((w / (w + l)) * 100).toFixed(1);
}

function barColor(pct) {
  if (pct >= 70) return 'bar-fill-green';
  if (pct >= 55) return 'bar-fill-blue';
  if (pct >= 45) return 'bar-fill-yellow';
  return 'bar-fill-red';
}


function parseClaudeJSON(text) {
  try { return JSON.parse(text); } catch {}
  const md = text.match(/```(?:json)?\s*([\s\S]*?)\s*```/);
  if (md) { try { return JSON.parse(md[1]); } catch {} }
  const obj = text.match(/\{[\s\S]*\}/);
  if (obj) { try { return JSON.parse(obj[0]); } catch {} }
  throw new Error('Could not parse JSON from response');
}

function parsePicksArray(text) {
  console.log('[picks raw]', text.slice(0, 300));
  const a = text.indexOf('['), b = text.lastIndexOf(']');
  if (a !== -1 && b !== -1 && b > a) {
    try {
      const arr = JSON.parse(text.slice(a, b + 1));
      if (Array.isArray(arr)) return arr;
    } catch (e) { console.warn('[picks array parse failed]', e.message); }
  }
  console.error('[picks] Could not extract array from response');
  return null;
}

function extractGameSummary(game) {
  const spread = { away: null, home: null };
  const ml     = { away: null, home: null };
  const total  = { line: null, over: null, under: null };

  for (const bm of (game.bookmakers || [])) {
    for (const mkt of (bm.markets || [])) {
      if (mkt.key === 'spreads') {
        const ao = mkt.outcomes.find(o => o.name === game.away_team);
        const ho = mkt.outcomes.find(o => o.name === game.home_team);
        if (ao && (spread.away === null || ao.price > (spread.away?.odds ?? -9999))) {
          spread.away = { line: ao.point, odds: ao.price };
          spread.home = ho ? { line: ho.point, odds: ho.price } : null;
        }
      }
      if (mkt.key === 'h2h') {
        const ao = mkt.outcomes.find(o => o.name === game.away_team);
        const ho = mkt.outcomes.find(o => o.name === game.home_team);
        if (ao && (ml.away === null || ao.price > ml.away)) ml.away = ao.price;
        if (ho && (ml.home === null || ho.price > ml.home)) ml.home = ho.price;
      }
      if (mkt.key === 'totals' && total.line === null) {
        const ov = mkt.outcomes.find(o => o.name === 'Over');
        const un = mkt.outcomes.find(o => o.name === 'Under');
        if (ov) { total.line = ov.point; total.over = ov.price; }
        if (un)   total.under = un.price;
      }
    }
  }
  return { id: game.id, away_team: game.away_team, home_team: game.home_team, commence_time: game.commence_time, spread, moneyline: ml, total };
}

// Result calculation functions
function calculateSpreadResult(pickedTeam, spreadLine, homeTeam, homeScore, awayScore) {
  const pickedIsHome = pickedTeam === homeTeam;
  const pickedScore  = pickedIsHome ? homeScore : awayScore;
  const oppScore     = pickedIsHome ? awayScore : homeScore;
  const adjusted     = (pickedScore - oppScore) + spreadLine;
  if (adjusted > 0) return 'WIN';
  if (adjusted < 0) return 'LOSS';
  return 'PUSH';
}
function calculateTotalResult(direction, totalLine, homeScore, awayScore) {
  const combined = homeScore + awayScore;
  if (direction === 'OVER')  return combined > totalLine ? 'WIN' : combined < totalLine ? 'LOSS' : 'PUSH';
  if (direction === 'UNDER') return combined < totalLine ? 'WIN' : combined > totalLine ? 'LOSS' : 'PUSH';
  return null;
}
function calculateMLResult(pickedTeam, homeTeam, homeScore, awayScore) {
  if (homeScore === awayScore) return 'PUSH';
  const homeWon    = homeScore > awayScore;
  const pickedHome = pickedTeam === homeTeam;
  return (pickedHome === homeWon) ? 'WIN' : 'LOSS';
}

// Parse a parlay leg pick string to determine bet type
function parseLegPick(pick) {
  if (!pick) return { type: 'ml', team: pick };
  const s = pick.trim();
  const totalMatch = s.match(/^(over|under)\s+([\d.]+)$/i);
  if (totalMatch) return { type: 'total', direction: totalMatch[1].toUpperCase(), line: parseFloat(totalMatch[2]) };
  const spreadMatch = s.match(/^(.+?)\s+([+-][\d.]+)$/);
  if (spreadMatch) return { type: 'spread', team: spreadMatch[1].trim(), line: parseFloat(spreadMatch[2]) };
  return { type: 'ml', team: s };
}

// Fuzzy team name match for score lookup (handles "Atlanta Hawks" vs "Hawks")
function teamsMatch(a, b) {
  if (!a || !b) return false;
  const norm = s => s.toLowerCase().trim();
  return norm(a) === norm(b) || norm(a).includes(norm(b)) || norm(b).includes(norm(a));
}

}

function buildPerfSummary(history) {
  const settled = history.filter(p => p.result && p.result !== null);
  if (settled.length === 0) return 'No historical performance data yet.';
  const bySport = {}, bySlot = { VEGAS: {w:0,l:0}, PUBLIC: {w:0,l:0} }, bySys = {};
  for (const p of settled) {
    if (p.result === 'P') continue;
    const w = p.result === 'W';
    if (!bySport[p.sport]) bySport[p.sport] = {w:0,l:0};
    w ? bySport[p.sport].w++ : bySport[p.sport].l++;
    const slot = p.slot || 'PUBLIC';
    if (bySlot[slot]) (w ? bySlot[slot].w++ : bySlot[slot].l++);
    for (const sys of (p.systems || [])) {
      if (!bySys[sys]) bySys[sys] = {w:0,l:0};
      w ? bySys[sys].w++ : bySys[sys].l++;
    }
  }
  const fmt = obj => Object.entries(obj)
    .map(([k,v]) => `${k}:${v.w}W-${v.l}L(${v.w+v.l>0?((v.w/(v.w+v.l))*100).toFixed(0):0}%)`).join(', ');
  return `HISTORICAL PERF — By Sport: ${fmt(bySport)} | By Slot: ${fmt(bySlot)} | By System: ${fmt(bySys)}`;
}

// Reads from stats_history (auto-checked results) and builds a learning context
// string prepended to every Claude picks call.
function buildLearningContext() {
  const statsHistory = loadStatsHistory();
  const cutoff = Date.now() - 30 * 24 * 60 * 60 * 1000;
  const recent = statsHistory.filter(p => new Date(p.generated_at).getTime() > cutoff);
  if (recent.length < 5) return null; // not enough data yet

  const settled = recent.filter(p => p.result && p.result !== 'PUSH');
  const wins    = settled.filter(p => p.result === 'WIN').length;
  const losses  = settled.filter(p => p.result === 'LOSS').length;
  if (wins + losses === 0) return null;

  const overallPct = ((wins / (wins + losses)) * 100).toFixed(0);
  const bySport = {}, bySlot = {}, bySys = {}, byDay = {}, byPickType = {};
  const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

  for (const p of settled) {
    if (!bySport[p.sport]) bySport[p.sport] = {w:0,l:0};
    p.result === 'WIN' ? bySport[p.sport].w++ : bySport[p.sport].l++;
    const sl = p.slot || 'PUBLIC';
    if (!bySlot[sl]) bySlot[sl] = {w:0,l:0};
    p.result === 'WIN' ? bySlot[sl].w++ : bySlot[sl].l++;
    for (const sys of (p.systems || [])) {
      if (!bySys[sys]) bySys[sys] = {w:0,l:0};
      p.result === 'WIN' ? bySys[sys].w++ : bySys[sys].l++;
    }
    const dayName = DAY_NAMES[new Date(p.generated_at).getDay()];
    if (!byDay[dayName]) byDay[dayName] = {w:0,l:0};
    p.result === 'WIN' ? byDay[dayName].w++ : byDay[dayName].l++;
    const pt = p.pick_type || 'unknown';
    if (!byPickType[pt]) byPickType[pt] = {w:0,l:0};
    p.result === 'WIN' ? byPickType[pt].w++ : byPickType[pt].l++;
  }

  const fmtR = v => v.w+v.l > 0 ? `${((v.w/(v.w+v.l))*100).toFixed(0)}% (${v.w}-${v.l})` : 'N/A';
  const sportStr = Object.entries(bySport).map(([k,v]) => `${k}:${fmtR(v)}`).join(', ');
  const slotStr  = Object.entries(bySlot).map(([k,v]) => `${k}:${fmtR(v)}`).join(', ');
  const sysSorted = Object.entries(bySys).sort((a,b) => {
    const ra = a[1].w+a[1].l>0 ? a[1].w/(a[1].w+a[1].l) : 0;
    const rb = b[1].w+b[1].l>0 ? b[1].w/(b[1].w+b[1].l) : 0;
    return rb - ra;
  });
  const best  = sysSorted[0];
  const worst = sysSorted[sysSorted.length - 1];
  const sysBest  = best  ? `${best[0]} (${fmtR(best[1])})` : 'N/A';
  const sysWorst = worst ? `${worst[0]} (${fmtR(worst[1])})` : 'N/A';

  // Best/worst day of week
  const daySorted = Object.entries(byDay).filter(([,v]) => v.w+v.l >= 3).sort((a,b) => {
    const ra = a[1].w+a[1].l>0 ? a[1].w/(a[1].w+a[1].l) : 0;
    const rb = b[1].w+b[1].l>0 ? b[1].w/(b[1].w+b[1].l) : 0;
    return rb - ra;
  });
  const bestDay  = daySorted[0];
  const worstDay = daySorted[daySorted.length - 1];
  const dayStr   = bestDay ? `Best: ${bestDay[0]} ${fmtR(bestDay[1])} | Worst: ${worstDay[0]} ${fmtR(worstDay[1])}` : 'N/A';

  // Pick type breakdown
  const pickTypeStr = Object.entries(byPickType).map(([k,v]) => `${k}:${fmtR(v)}`).join(', ');

  return `HISTORICAL PERFORMANCE (last 30 days, ${settled.length} settled picks):
Overall hit rate: ${overallPct}% (target: 90%)
By sport: ${sportStr || 'N/A'}

By pick type: ${pickTypeStr || 'N/A'}

// Computes and saves a learning_stats summary to localStorage (called after any result is marked)
function saveLearningStats(allHistory) {
  try {
    const settled = allHistory.filter(p => p.result && p.result !== 'P');
    const wins    = settled.filter(p => p.result === 'W').length;
    const losses  = settled.filter(p => p.result === 'L').length;
    const total   = wins + losses;
    const pct     = total > 0 ? Math.round((wins / total) * 100) : null;
    const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const bySport = {}, bySlot = {}, byDay = {}, byPickType = {}, byOddsRange = {};
    const oddsRanges = [
      { label: 'Heavy Fav (-250 to -151)', test: o => o >= -250 && o <= -151 },
      { label: 'Fav (-150 to -110)',        test: o => o >= -150 && o <= -110 },
      { label: "Pick'em (-109 to +109)",    test: o => o >= -109 && o <= 109  },
      { label: 'Dog (+110 to +199)',         test: o => o >= 110  && o <= 199  },
      { label: 'Dog (+200 to +350)',         test: o => o >= 200  && o <= 350  },
      { label: 'Longshot (+351+)',           test: o => o > 350               },
    ];
    for (const p of settled) {
      if (!bySport[p.sport]) bySport[p.sport] = {w:0,l:0};
      p.result === 'W' ? bySport[p.sport].w++ : bySport[p.sport].l++;
      const sl = p.slot || 'PUBLIC';
      if (!bySlot[sl]) bySlot[sl] = {w:0,l:0};
      p.result === 'W' ? bySlot[sl].w++ : bySlot[sl].l++;
      const dayName = DAY_NAMES[new Date(p.generated_at).getDay()];
      if (!byDay[dayName]) byDay[dayName] = {w:0,l:0};
      p.result === 'W' ? byDay[dayName].w++ : byDay[dayName].l++;
      const pt = p.pick_type || 'unknown';
      if (!byPickType[pt]) byPickType[pt] = {w:0,l:0};
      p.result === 'W' ? byPickType[pt].w++ : byPickType[pt].l++;
      const odds = typeof p.odds === 'number' ? p.odds : null;
      if (odds !== null) {
        for (const range of oddsRanges) {
          if (range.test(odds)) {
            if (!byOddsRange[range.label]) byOddsRange[range.label] = {w:0,l:0};
            p.result === 'W' ? byOddsRange[range.label].w++ : byOddsRange[range.label].l++;
            break;
          }
        }
      }
    }
    localStorage.setItem('learning_stats', JSON.stringify({
      updated_at: new Date().toISOString(),
      total_picks: total,
      wins, losses,
      win_pct: pct,
      by_sport: bySport,
      by_slot: bySlot,
      by_day: byDay,
      by_pick_type: byPickType,
      by_odds_range: byOddsRange,
    }));
  } catch (_) {}
}

// ─── API ──────────────────────────────────────────────────────────────────────

async function apiFetch(url, opts = {}) {
  const res = await fetch(url, opts);
  const json = await res.json();
  if (!res.ok) {
    const e = json.error;
    const msg = typeof e === 'string' ? e
      : e?.message
      || e?.error?.message
      || (e?.type ? `${e.type}: ${e?.error?.message || JSON.stringify(e)}` : null)
      || JSON.stringify(e)
      || res.statusText;
    throw new Error(msg);
  }
  return json;
}

const MULTI_BOOKS = 'draftkings,fanduel,betmgm,caesars,bovada';
const BOOK_PRIORITY = ['bovada', 'draftkings', 'fanduel', 'betmgm', 'caesars'];
const REFRESH_INTERVAL_MS = 15 * 60 * 1000; // 15 minutes
const ODDS_CACHE_TTL = 10 * 60 * 1000; // 10 minutes

// In-memory odds cache — survives tab switches, cleared on page reload
if (!window.oddsCache) window.oddsCache = {};

function getCachedOdds(sportKey) {
  const entry = window.oddsCache[sportKey];
  if (entry && Date.now() - entry.ts < ODDS_CACHE_TTL) return entry.data;
  return null;
}

function setCachedOdds(sportKey, data, quota) {
  window.oddsCache[sportKey] = { data, ts: Date.now() };
  if (quota) window.latestQuota = quota;
}

// Return odds from the highest-priority book available for a given market/outcome
function getBestOdds(game, marketKey, outcomeName) {
  for (const slug of BOOK_PRIORITY) {
    const bm = (game.bookmakers || []).find(b =>
      b.key.toLowerCase().includes(slug) || b.title.toLowerCase().includes(slug)
    );
    if (!bm) continue;
    const mkt = (bm.markets || []).find(m => m.key === marketKey);
    if (!mkt) continue;
    const outcome = outcomeName ? mkt.outcomes.find(o => o.name === outcomeName) : mkt.outcomes[0];
    if (outcome) return { price: outcome.price, point: outcome.point, book: bm.title };
  }
  // Fallback: any available book
  for (const bm of (game.bookmakers || [])) {
    const mkt = (bm.markets || []).find(m => m.key === marketKey);
    if (!mkt) continue;
    const outcome = outcomeName ? mkt.outcomes.find(o => o.name === outcomeName) : mkt.outcomes[0];
    if (outcome) return { price: outcome.price, point: outcome.point, book: bm.title };
  }
  return null;
}

// Match a Claude pick string to a team name in the game (handles "Hawks" → "Atlanta Hawks")
function pickMatchesTeam(pickStr, game) {
  if (!pickStr || !game) return null;
  const p = pickStr.toLowerCase();
  const away = game.away_team.toLowerCase();
  const home = game.home_team.toLowerCase();
  if (p.includes(away) || away.split(' ').some(w => w.length > 3 && p.includes(w))) return game.away_team;
  if (p.includes(home) || home.split(' ').some(w => w.length > 3 && p.includes(w))) return game.home_team;
  return null;
}

// Replace Claude-generated odds with real API odds (Bovada-priority)
function syncPicksToLiveOdds(picks, gameMap) {
  for (const pick of picks) {
    const game = gameMap[pick.game_id];
    if (!game) continue;
    if (pick.spread) {
      const teamName = pickMatchesTeam(pick.spread.pick, game);
      if (teamName) {
        const odds = getBestOdds(game, 'spreads', teamName);
        if (odds) {
          pick.spread.odds = odds.price;
          pick.spread.line = odds.point;
          pick.spread._book = odds.book;
          const lineStr = odds.point > 0 ? `+${odds.point}` : `${odds.point}`;
          pick.spread.pick = `${teamName} ${lineStr}`;
        }
      }
    }
    if (pick.moneyline) {
      const teamName = pickMatchesTeam(pick.moneyline.pick, game);
      if (teamName) {
        const odds = getBestOdds(game, 'h2h', teamName);
        if (odds) { pick.moneyline.odds = odds.price; pick.moneyline._book = odds.book; pick.moneyline.pick = teamName; }
      }
    }
    if (pick.total) {
      const dir = (pick.total.direction || '').toUpperCase() === 'OVER' ? 'Over' : 'Under';
      const odds = getBestOdds(game, 'totals', dir);
      if (odds) { pick.total.odds = odds.price; pick.total.line = odds.point; pick.total._book = odds.book; }
    }
  }
}

// Calculate approximate alternate-line odds (each 0.5pt improvement ≈ -14 cents)
function calcAltSpreadOdds(baseOdds, pointsAdded) {
  // Buying points on a spread makes it easier to cover so books charge MORE juice
  // Each half-point ≈ 13-15 cents of additional juice (American odds go more negative)
  // e.g. -7.5 (-110) → take at -3.5 (buying 4 pts = 8 half-pts) ≈ -110 - 112 = -222
  const halfPoints = Math.abs(pointsAdded) / 0.5;
  const adjustment = Math.round(halfPoints * 14);
  const result = typeof baseOdds === 'number' ? baseOdds - adjustment : -110;
  return result;
}

// Find a raw game object matching a parlay leg's awayTeam/homeTeam
function findGameForLeg(leg, allGames) {
  const away = (leg.awayTeam || '').toLowerCase();
  const home = (leg.homeTeam || '').toLowerCase();
  if (!away && !home) return null;
  return allGames.find(g => {
    const ga = g.away_team.toLowerCase();
    const gh = g.home_team.toLowerCase();
    const awayOk = !away || ga.includes(away) || away.includes(ga) || ga.split(' ').some(w => w.length > 3 && away.includes(w));
    const homeOk = !home || gh.includes(home) || home.includes(gh) || gh.split(' ').some(w => w.length > 3 && home.includes(w));
    return awayOk && homeOk;
  });
}

// Resolve actual API odds for a single parlay leg
function resolveParlaLegOdds(leg, allGames) {
  const game = findGameForLeg(leg, allGames);
  if (!game) return leg;
  const pick = leg.pick || '';
  if (/\bover\b/i.test(pick)) {
    const odds = getBestOdds(game, 'totals', 'Over');
    if (odds) return { ...leg, odds: fmtOdds(odds.price), _book: odds.book };
  } else if (/\bunder\b/i.test(pick)) {
    const odds = getBestOdds(game, 'totals', 'Under');
    if (odds) return { ...leg, odds: fmtOdds(odds.price), _book: odds.book };
  } else if (/[+-]\d+(\.\d+)?$/.test(pick.trim()) && !/\bml\b/i.test(pick)) {
    // Spread pick — detect if an alt line (+4) was applied
    const spreadMatch = pick.match(/([+-]\d+(\.\d+)?)$/);
    const legSpread = spreadMatch ? parseFloat(spreadMatch[1]) : null;
    const teamName = pickMatchesTeam(pick, game);
    const baseOdds = teamName ? getBestOdds(game, 'spreads', teamName) : null;
    if (baseOdds) {
      if (legSpread !== null && Math.abs(legSpread - baseOdds.point) >= 0.5) {
        // Alt line detected — calculate adjusted odds
        const pointsDiff = Math.abs(legSpread - baseOdds.point);
        const altOdds = calcAltSpreadOdds(baseOdds.price, pointsDiff);
        // If alt line would exceed the -250 floor, skip this leg's odds resolution
        if (altOdds < -250) return leg;
        return { ...leg, odds: `${fmtOdds(altOdds)} (est)`, _book: `${baseOdds.book}*` };
      }
      return { ...leg, odds: fmtOdds(baseOdds.price), _book: baseOdds.book };
    }
  } else {
    // Moneyline
    const teamName = pickMatchesTeam(pick, game);
    if (teamName) {
      const odds = getBestOdds(game, 'h2h', teamName);
      if (odds) return { ...leg, odds: fmtOdds(odds.price), _book: odds.book };
    }
  }
  return leg;
}

// Post-generation validation: enforce odds floor, remove dupes, remove started games
function validateParlay(slip) {
  if (!slip || !Array.isArray(slip.legs)) return slip;
  const seenGames = new Set();
  slip.legs = slip.legs.filter(leg => {
    // Remove legs with no pick
    if (!leg.pick) return false;
    // Remove legs with odds heavier than -250
    const oddsNum = parseFloat(String(leg.odds).replace(/[^0-9+\-.]/g, ''));
    if (!isNaN(oddsNum) && oddsNum < -250) return false;
    // Remove started games
    if (leg.commenceTime && new Date(leg.commenceTime) <= new Date()) return false;
    // Remove duplicate games (same away+home)
    const gameKey = `${(leg.awayTeam||'').toLowerCase()}|${(leg.homeTeam||'').toLowerCase()}`;
    if (gameKey !== '|' && seenGames.has(gameKey)) return false;
    if (gameKey !== '|') seenGames.add(gameKey);
    return true;
  });
  return slip;
}

// Validate individual pick odds from sport tab — flags legs over the floor
function validatePick(pickObj) {
  if (!pickObj) return pickObj;
  if (pickObj.spread?.odds != null && pickObj.spread.odds < -250) {
    pickObj.spread = { ...pickObj.spread, pick: 'ODDS FLOOR — find alt line', flagged: true };
  }
  if (pickObj.moneyline?.odds != null && pickObj.moneyline.odds < -250) {
    pickObj.moneyline = { ...pickObj.moneyline, pick: 'ODDS FLOOR — SKIP', flagged: true };
  }
  return pickObj;
}

async function fetchGamesForSport(sportKey) {
  const hit = getCachedOdds(sportKey);
  if (hit) return hit;
  const d = await apiFetch(`/api/odds?sport=${sportKey}&markets=h2h,spreads,totals&regions=us&bookmakers=${MULTI_BOOKS}`);
  const todayStr = new Date().toLocaleDateString('en-CA');
  const all = d.data || [];
  const filtered = all.filter(g => new Date(g.commence_time).toLocaleDateString('en-CA') === todayStr);
  setCachedOdds(sportKey, filtered, d.quota);
  return filtered;
}

// ─── LINE CONSENSUS & SHARP DETECTION ────────────────────────────────────────

function calcLineConsensus(game) {
  const spreads = [], totals = [], books = [];

  for (const bm of (game.bookmakers || [])) {
    books.push(bm.title);
    for (const mkt of (bm.markets || [])) {
      if (mkt.key === 'spreads') {
        const ao = mkt.outcomes.find(o => o.name === game.away_team);
        if (ao?.point != null) spreads.push(ao.point);
      }
      if (mkt.key === 'totals') {
        const ov = mkt.outcomes.find(o => o.name === 'Over');
        if (ov?.point != null) totals.push(ov.point);
      }
    }
  }

  if (spreads.length === 0 && totals.length === 0) return null;

  const avg   = arr => arr.length ? arr.reduce((a,b) => a+b, 0) / arr.length : null;
  const minV  = arr => arr.length ? Math.min(...arr) : null;
  const maxV  = arr => arr.length ? Math.max(...arr) : null;

  const spreadAvg = avg(spreads);
  const spreadMin = minV(spreads);
  const spreadMax = maxV(spreads);
  const spreadRange = spreadMax != null && spreadMin != null ? spreadMax - spreadMin : 0;

  const totalAvg  = avg(totals);
  const totalMin  = minV(totals);
  const totalMax  = maxV(totals);
  const totalDrop = totalMax != null && totalMin != null ? totalMax - totalMin : 0;

  // How many books agree within 0.5 of consensus spread
  const consensusCount = spreadAvg != null
    ? spreads.filter(s => Math.abs(s - spreadAvg) <= 0.5).length
    : 0;

  // Signal detection
  let signal = 'NONE';
  if (spreads.length >= 3 && spreadRange >= 2) signal = 'STEAM';
  else if (totals.length >= 3 && totalDrop >= 1.5) signal = 'SHARP_UNDER';
  else if (spreads.length >= 2 && consensusCount === spreads.length) signal = 'PUBLIC';

  // Reverse line movement: public favorite but line moved the other way
  // Approximate: if spread tightened (moved toward 0) = sharp on underdog
  if (spreads.length >= 3 && spreadAvg != null) {
    const sorted = [...spreads].sort((a,b) => a - b);
    const firstHalf = avg(sorted.slice(0, Math.floor(sorted.length/2)));
    const secondHalf = avg(sorted.slice(Math.floor(sorted.length/2)));
    if (firstHalf != null && secondHalf != null && Math.abs(secondHalf - firstHalf) >= 1) {
      signal = 'SHARP_ACTION';
    }
  }

  return {
    books,
    spreadAvg: spreadAvg != null ? parseFloat(spreadAvg.toFixed(1)) : null,
    spreadMin, spreadMax, spreadRange: parseFloat(spreadRange.toFixed(1)),
    totalAvg: totalAvg != null ? parseFloat(totalAvg.toFixed(1)) : null,
    totalMin, totalMax, totalDrop: parseFloat(totalDrop.toFixed(1)),
    consensusCount, totalBooks: spreads.length,
    signal, // SHARP_ACTION | STEAM | SHARP_UNDER | PUBLIC | NONE
  };
}

function signalLabel(signal) {
  switch(signal) {
    case 'SHARP_ACTION': return '🔪 SHARP ACTION';
    case 'STEAM':        return '⚡ STEAM';
    case 'SHARP_UNDER':  return '📉 SHARP UNDER';
    case 'PUBLIC':       return '👥 PUBLIC';
    default:             return null;
  }
}

function signalConfidenceAdj(signal) {
  switch(signal) {
    case 'SHARP_ACTION': return +1;
    case 'STEAM':        return +1;
    case 'PUBLIC':       return -1;
    default:             return 0;
  }
}

if (!window.picksCache) window.picksCache = {};

async function generatePicks(sport, games, history) {

  // Filter to today's games only
  const todaysGames = games.filter(g => isToday(g.commence_time));
  if (todaysGames.length === 0) return null;

  // Build game map for live odds lookup after Claude responds
  const gameMap = {};
  for (const g of todaysGames) gameMap[g.id] = g;

  const summaries = todaysGames.map(g => ({
    ...extractGameSummary(g),
    consensus: calcLineConsensus(g),
  }));
  const perfSummary = buildLearningContext() || buildPerfSummary(history);
  const today = new Date().toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric', year:'numeric' });

  // Assign slots using the canonical assignSlots function
  const { slots: rawSlots, dayName: day, hybrid: isHybrid, isVegas } = sport.noSlotLogic
    ? { slots: {}, dayName: getTodayName() }
    : assignSlots(summaries, sport.label);
  const slotMap = rawSlots;

  // Build set of game IDs that should show BE CAUTIOUS (NCAAF Sat night PUBLIC games)
  const cautiousIds = new Set();
  if (sport.label === 'NCAAF' && isHybrid) {
    summaries.forEach(s => {
      if (slotMap[s.id] === 'PUBLIC') cautiousIds.add(s.id);
    });
  }

  const moneyLines = summaries.map(s => {
    const c = s.consensus;
    if (!c) return `${s.away_team} @ ${s.home_team}: No multi-book data`;
    const sl = signalLabel(c.signal) || 'NONE';
    return `${s.away_team} @ ${s.home_team}: Books=[${c.books.join(',')}] SpreadRange=${c.spreadMin} to ${c.spreadMax} (avg ${c.spreadAvg}) TotalRange=${c.totalMin} to ${c.totalMax} (avg ${c.totalAvg}) Signal=${sl} ConsensusBooks=${c.consensusCount}/${c.totalBooks}`;
  }).join('\n');

  const arraySchema = `[
  {
    "game_id": "...",
    "away_team": "...",
    "home_team": "...",
    "commence_time": "...",
    "game_slot": "VEGAS or PUBLIC or N/A",
    "game_position": 1,
    "spread": { "pick": "Team Name -3.5", "line": -3.5, "odds": -110, "explanation": "1-2 sentences", "systems": ["..."], "ai_strength": 78 },
    "moneyline": { "pick": "Team Name", "odds": -175, "explanation": "...", "systems": ["..."], "ai_strength": 65 },
    "total": { "direction": "OVER", "line": 224.5, "odds": -110, "explanation": "...", "systems": ["..."], "ai_strength": 72 }
  }
]`;

  // Build game lines with slot explicitly shown
  const gameLines = summaries.map(s => {
    const slot = slotMap[s.id] || (sport.noSlotLogic ? 'N/A' : 'PUBLIC');
    const spread = s.spread?.away ? `Spread: ${s.spread.away.line} (${s.spread.away.odds})` : 'Spread: N/A';
    const ml = s.moneyline?.away != null ? `ML: ${s.moneyline.away > 0 ? '+' : ''}${s.moneyline.away}/${s.moneyline.home > 0 ? '+' : ''}${s.moneyline.home}` : 'ML: N/A';
    const total = s.total?.line != null ? `Total: ${s.total.line} (O${s.total.over}/U${s.total.under})` : 'Total: N/A';
    const time = new Date(s.commence_time).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    return `[id:${s.id}] ${s.away_team} @ ${s.home_team} | ${time} | SLOT: ${slot} | ${spread} | ${ml} | ${total}`;
  });

  // Also build structured objects for the JSON schema reference
  const gamesWithSlots = summaries.map(({consensus, ...s}) => ({
    ...s,
    game_slot: slotMap[s.id] || (sport.noSlotLogic ? 'N/A' : 'PUBLIC'),
    be_cautious: cautiousIds.has(s.id),
  }));

  let prompt;
  if (sport.noSlotLogic) {
    prompt = `Analyze these ${sport.label} games. Base picks ONLY on: money line movement, pitching matchups, head-to-head records, team rankings, and recent form. Do NOT apply Vegas/Public day slot rules.
Today: ${today}
${perfSummary}

GAMES:
${gameLines.join('\n')}

MONEY MOVEMENT DATA:
${moneyLines}

Return ONLY a valid JSON array. No markdown. No backticks. No text before or after. Start with [ and end with ]
Use the game id from [id:...] as the game_id field in your response.
${arraySchema}`;
  } else {
    prompt = `Analyze these ${sport.label} games using the GOAT Sports Bets system.
Today: ${today} (${day})
Slate size: ${todaysGames.length} game(s)
${perfSummary}

IMPORTANT: The SLOT shown for each game has been pre-assigned using the GOAT alternating slot system. Use it exactly as shown — do NOT recalculate or override it.

GAMES (SLOT pre-assigned):
${gameLines.join('\n')}

MONEY MOVEMENT DATA (use to adjust confidence):
${moneyLines}

CONFIDENCE BOOST RULES:
- Sharp signal (SHARP ACTION or STEAM) + correct slot alignment = +2 to ai_strength
- Steam detected alone = +1 to ai_strength
- PUBLIC money with no sharp signal = -1 to ai_strength

Apply all GOAT system rules. Use the pre-assigned SLOT as game_slot in your response. Determine which systems fire, factor in money movement, then make picks.

Return ONLY a valid JSON array. No markdown. No backticks. No text before or after. Start with [ and end with ]
Use the game id from [id:...] as the game_id field in your response.
${arraySchema}`;
  }

  const data = await apiFetch('/api/claude', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      system: GOAT_SYSTEM_PROMPT,
      messages: [{ role: 'user', content: prompt }],
      max_tokens: 6000,
    }),
  });

  const text = data.content?.[0]?.text || '';
  const picksArray = parsePicksArray(text);
  if (!picksArray) throw new Error('Could not parse picks — click Refresh to retry');

  // Replace Claude's odds with real live API odds (Bovada-priority)
  syncPicksToLiveOdds(picksArray, gameMap);

  // Validate each pick — flag legs over the -250 odds floor
  picksArray.forEach(pick => validatePick(pick));

  // Merge be_cautious flag from gamesWithSlots (NCAAF Sat night PUBLIC games)
  const cautiousMap = {};
  gamesWithSlots.forEach(g => { if (g.be_cautious) cautiousMap[g.id] = true; });
  picksArray.forEach(pick => { if (cautiousMap[pick.game_id]) pick.be_cautious = true; });

  // Populate global picks cache
  for (const pick of picksArray) {
    if (pick.game_id) window.picksCache[pick.game_id] = pick;
  }

  const day_slot = picksArray[0]?.game_slot || null;
  const result = { sport: sport.label, day_slot, picks: picksArray };
  return result;
}

function isToday(commenceTime) {

async function fetchAllGamesForParlays(existingCache, setCacheCallback) {

  await Promise.allSettled(toFetch.map(async (sportKey) => {

      const d = await apiFetch(`/api/odds?sport=${sportKey}&markets=h2h,spreads,totals&regions=us&bookmakers=${MULTI_BOOKS}`);
      const todayStr = new Date().toLocaleDateString('en-CA');
      const allMain = d.data || [];
      let games = allMain.filter(g => new Date(g.commence_time).toLocaleDateString('en-CA') === todayStr);
      // Merge WBC into MLB
      if (sportKey === 'baseball_mlb') {
        try {
          const wbcHit = getCachedOdds('baseball_wbc');
          let filteredWbc;
          if (wbcHit) {
            filteredWbc = wbcHit.map(g => ({ ...g, _isWbc: true }));
          } else {
            const wbc = await apiFetch(`/api/odds?sport=baseball_wbc&markets=h2h,spreads,totals&regions=us&bookmakers=${MULTI_BOOKS}`);
            const allWbc = (wbc.data || []).map(g => ({ ...g, _isWbc: true }));
            filteredWbc = allWbc.filter(g => new Date(g.commence_time).toLocaleDateString('en-CA') === todayStr);
            setCachedOdds('baseball_wbc', filteredWbc, wbc.quota);
          }
          games = [...games, ...filteredWbc];
        } catch {}
      }
      setCachedOdds(sportKey, games, d.quota);
      merged[sportKey] = games;
      sessionStorage.setItem(`efp_games_${sportKey}`, JSON.stringify(games));
    } catch {}
  }));
  if (setCacheCallback) setCacheCallback(merged);
  return merged;
}

function parseParlayJSON(text, label) {
  console.log(`[${label} raw response]`, text);
  const a = text.indexOf('['), b = text.lastIndexOf(']');
  if (a !== -1 && b !== -1 && b > a) {
    try {
      const arr = JSON.parse(text.slice(a, b + 1));
      console.log(`[${label} parsed]`, arr);
      if (Array.isArray(arr)) return arr;
    } catch (e) { console.warn(`[${label} array parse failed]`, e.message); }
  }
  const c = text.indexOf('{'), d = text.lastIndexOf('}');
  if (c !== -1 && d !== -1 && d > c) {
    try {
      const obj = JSON.parse(text.slice(c, d + 1));
      console.log(`[${label} obj parsed]`, obj);
      if (obj?.parlays) return obj.parlays;
      if (Array.isArray(obj)) return obj;
    } catch (e) { console.warn(`[${label} obj parse failed]`, e.message); }
  }
  console.error(`[${label}] All parse strategies failed`);
  return null;
}

function buildGameLine(g) {
  const t = g.commence_time ? new Date(g.commence_time).toLocaleString('en-US',{hour:'numeric',minute:'2-digit'}) : '';
  const ml  = g.moneyline?.away != null && g.moneyline?.home != null
    ? ` ML:${g.moneyline.away > 0 ? '+' : ''}${g.moneyline.away}/${g.moneyline.home > 0 ? '+' : ''}${g.moneyline.home}` : '';
  const spd = g.spread?.away ? ` SPD:${g.spread.away.line}(${g.spread.away.odds})` : '';
  const tot = g.total?.line  ? ` TOT:${g.total.line}(O${g.total.over}/U${g.total.under})` : '';
  return `${g.sport}: ${g.away_team} @ ${g.home_team} [${t}]${ml}${spd}${tot}`;
}

async function callClaudeForParlays(promptText, cacheKey) {
  const cached = sessionStorage.getItem(cacheKey);
  if (cached) { try { return JSON.parse(cached); } catch {} }
  const data = await apiFetch('/api/claude', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      system: 'You are a sports betting AI. Output ONLY a raw JSON array. No markdown, no backticks, no commentary, nothing outside the [ ] brackets.',
      messages: [{ role: 'user', content: promptText }],
      max_tokens: 4000,
    }),
  });
  const text = (data.content?.[0]?.text || '').trim();
  const result = parseParlayJSON(text, cacheKey);
  if (result) sessionStorage.setItem(cacheKey, JSON.stringify(result));
  return result;
}

async function generateParlays(gamesCache, history, setCacheCallback) {

    // Pre-assign slots for non-cached games grouped by sport

    }
    const openSlotMap = {};

    const lockedSection = cachedPickLines.length > 0

      : '';
    const openSection = openGameLines.length > 0
      ? `\nAdditional games (you may choose picks freely):\n${openGameLines.join('\n')}`

    const varietySports = Array.from(sportsWithGames).join(', ');
    const mainPrompt = `You are building real-money parlay slips. Every leg must be a real logical sports bet based ONLY on the game data provided below. Use only real Bovada lines from the data — never invent odds. Show one sentence reasoning per leg in a "reason" field.

Format:

${lockedSection}${openSection}`;
    mainSlips = await callClaudeForParlays(mainPrompt, `efp_main_parlays_${cacheDate}`);

    // Post-process: replace Claude-estimated odds with real API odds, then validate
    if (mainSlips) {

Today's UFC fights:
${fightLines}`;
    fightNightSlips = await callClaudeForParlays(fnPrompt, `efp_fn_parlays_${cacheDate}`);

  const [consensusMap, setConsensusMap] = useState({});
  const [lineMovedSet, setLineMovedSet] = useState(new Set());
  const [wbcGameIds, setWbcGameIds]     = useState(new Set());
  const refreshTimer                    = useRef(null);
  const prevConsensusRef                = useRef({});

  const games = gamesCache[sport.key] || null;

  // 1-second tick to update the countdown display
  useEffect(() => {
    const t = setInterval(() => setTick(n => n + 1), 1000);
    return () => clearInterval(t);
  }, []);

  const fetchLines = useCallback(async (force = false) => {
    try {
      let g;
      const todayStr = new Date().toLocaleDateString('en-CA');

      const cacheHit = !force && getCachedOdds(sport.key);
      if (cacheHit) {
        g = cacheHit;
        if (window.latestQuota) { setQuota(window.latestQuota); onQuotaUpdate?.(window.latestQuota); }
      } else {
        const d = await apiFetch(`/api/odds?sport=${sport.key}&markets=h2h,spreads,totals&regions=us&bookmakers=${MULTI_BOOKS}`);
        const allFetched = d.data || [];
        g = allFetched.filter(game => new Date(game.commence_time).toLocaleDateString('en-CA') === todayStr);
        setQuota(d.quota);
        onQuotaUpdate?.(d.quota);
        // Merge WBC into MLB
        if (sport.includeWbc) {
          try {
            const wbcHit = !force && getCachedOdds('baseball_wbc');
            let wbcGames;
            if (wbcHit) {
              wbcGames = wbcHit.map(g => ({ ...g, _isWbc: true }));
            } else {
              const wbcD = await apiFetch(`/api/odds?sport=baseball_wbc&markets=h2h,spreads,totals&regions=us&bookmakers=${MULTI_BOOKS}`);
              const allWbc = (wbcD.data || []).map(game => ({ ...game, _isWbc: true }));
              wbcGames = allWbc.filter(game => new Date(game.commence_time).toLocaleDateString('en-CA') === todayStr);
              setCachedOdds('baseball_wbc', wbcGames, wbcD.quota);
            }
            g = [...g, ...wbcGames];
            setWbcGameIds(new Set(wbcGames.map(wg => wg.id)));
          } catch { setWbcGameIds(new Set()); }
        }
        setCachedOdds(sport.key, g, d.quota);
      }
      setGamesCache(prev => ({ ...prev, [sport.key]: g }));
      sessionStorage.setItem(`efp_games_${sport.key}`, JSON.stringify(g));
      const cm = {};
      for (const game of g) cm[game.id] = calcLineConsensus(game);

      // Detect line movement vs previous refresh
      const moved = new Set();
      for (const [gid, newC] of Object.entries(cm)) {
        const prev = prevConsensusRef.current[gid];
        if (prev && newC) {
          const spreadMoved = Math.abs((newC.spreadAvg || 0) - (prev.spreadAvg || 0)) >= 0.5;
          const totalMoved  = Math.abs((newC.totalAvg  || 0) - (prev.totalAvg  || 0)) >= 0.5;
          if (spreadMoved || totalMoved) moved.add(gid);
        }
      }
      prevConsensusRef.current = cm;
      setLineMovedSet(moved);

      // Invalidate picks cache for any game with 1+ point line movement

      setConsensusMap(cm);
      setLinesUpdated(new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}));
      setNextRefreshAt(Date.now() + REFRESH_INTERVAL_MS);
      return g;
    } catch (e) {
      console.warn('Lines refresh failed:', e.message);
      return null;
    }
  }, [sport.key, sport.includeWbc]);

  const load = useCallback(async (forceRefresh = false) => {
    setLoading(true);
    setError('');
    setPicks(null);
    setIsCached(false);
    try {
      setLoadingPhase('Fetching live odds from 5 books...');
      const g = await fetchLines(forceRefresh) || games || [];
      setLoadingPhase('Generating AI picks with GOAT system + sharp money data...');
      const result = await generatePicks(sport, g, history);
      setPicks(result);
      setIsCached(result?._cached || false);
      if (result?.picks) onPicksGenerated(result.picks, sport);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
      setLoadingPhase('');
    }
  }, [sport.key, games, history, fetchLines]);

  // Initial load + auto-refresh lines every 15 minutes
  useEffect(() => {
    load();
    refreshTimer.current = setInterval(() => fetchLines(), REFRESH_INTERVAL_MS);
    return () => clearInterval(refreshTimer.current);
  }, [sport.key]);

  const day = getDayName();
  const today = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  const secsLeft = nextRefreshAt ? Math.max(0, Math.round((nextRefreshAt - Date.now()) / 1000)) : null;
  const countdownStr = secsLeft !== null
    ? `Refreshing in ${Math.floor(secsLeft / 60)}:${String(secsLeft % 60).padStart(2, '0')}`
    : null;

  return (
    <div>
      <div className="section-header">
        <div>
          <div className="section-title">{sport.label} PICKS — {today}</div>
          <div className="section-subtitle">
            {picks ? `${picks.picks?.length || 0} games · Slot: ${picks.day_slot || '?'}` : day}
            {picks && <span style={{marginLeft:8,color: isCached ? 'var(--yellow)' : 'var(--green)',fontWeight:900}}>{isCached ? '⚡ Cached' : '🔄 Fresh'}</span>}
            {linesUpdated && <span style={{marginLeft:8,color:'var(--text-dim)'}}>· Lines: {linesUpdated}</span>}
            {countdownStr && <span style={{marginLeft:8,color:'var(--text-dim)'}}>· {countdownStr}</span>}
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          {quota && <span className="quota-badge">API: <span>{quota.remainingRequests}</span> left</span>}
          <button className="btn" onClick={() => load(true)} disabled={loading}>
            ↺ Refresh
          </button>
        </div>
      </div>

      {error && (
        <div className="error-box">
          ⚠ {error}
          <button className="btn" style={{marginLeft:12,fontSize:10}} onClick={() => load(true)}>Retry</button>
        </div>
      )}

      {loading && (
        <div>
          <div className="loading-row"><Spinner /><span>{loadingPhase || 'Loading...'}</span></div>
          {Array.from({length: Math.max(3, (games || []).length)}).map((_, i) => <SkeletonCard key={i} />)}
        </div>
      )}

      {!loading && picks && picks.picks?.length === 0 && (
        <div className="no-games">
          <div style={{fontSize:28,marginBottom:12,opacity:0.4}}>📭</div>
          No upcoming {sport.label} games found. Check back later.
        </div>
      )}

      {!loading && picks && picks.picks?.length > 0 && (
        <div className="fade-in">
          {picks.picks.map(gp => (
            <GamePickCard
              key={gp.game_id}
              gamePick={gp}
              sport={sport}
              history={history}
              consensus={consensusMap[gp.game_id] || null}
              isWbc={wbcGameIds.has(gp.game_id)}
              lineMoved={lineMovedSet.has(gp.game_id)}
              onMarkResult={onMarkResult}
            />
          ))}
        </div>
      )}

      {!loading && !picks && !error && games && games.length === 0 && (
        <div className="no-games">No upcoming {sport.label} games found.</div>
      )}
    </div>
  );
}

function ParlaySlip({ slip, parlayHistory, onMarkParlay }) {
  // Support both old field names and new simplified format
  const totalOddsRaw = slip.totalOdds ?? slip.total_odds;
  const totalOddsNum = typeof totalOddsRaw === 'string' ? parseInt(totalOddsRaw.replace('+','')) : (totalOddsRaw || 1200);
  const win     = parlayWin(totalOddsNum, 25);
  const pResult = parlayHistory.find(p => p.id === slip.id)?.result;

  // Match color by first word of type (e.g. "Sharp #1" → "Sharp")
  const typeKey = (slip.type || '').split(' ')[0];
  const typeColors = {
    Sharp:    { border: 'rgba(0,255,65,0.3)',    color: 'var(--green)',  bg: 'rgba(0,255,65,0.04)'   },
    Value:    { border: 'rgba(0,255,65,0.5)',    color: 'var(--green)',  bg: 'rgba(0,255,65,0.07)'   },
    Safety:   { border: 'rgba(240,180,41,0.4)',  color: 'var(--yellow)', bg: 'rgba(240,180,41,0.05)' },
    Longshot: { border: 'rgba(255,68,68,0.4)',   color: 'var(--red)',    bg: 'rgba(255,68,68,0.05)'  },
    Variety:  { border: 'rgba(100,180,255,0.4)', color: '#64b4ff',       bg: 'rgba(100,180,255,0.05)'},
  };
  const tc = typeColors[typeKey] || typeColors.Value;
  const isFallback = slip.isFallback;

  return (
    <div className="parlay-slip" style={{borderColor: tc.border, opacity: isFallback ? 0.5 : 1}}>
      <div className="parlay-header" style={{background: tc.bg}}>
        <div>
          <div className="parlay-type" style={{color: tc.color}}>{slip.type || 'Parlay'}</div>
          {slip.description && <div style={{fontSize:10,color:'var(--text-dim)',marginTop:2}}>{slip.description}</div>}
        </div>
        <div className="parlay-odds" style={{color: 'var(--green)'}}>
          {typeof totalOddsRaw === 'string' ? totalOddsRaw : fmtOdds(totalOddsNum)}
        </div>
      </div>

      {isFallback && (
        <div style={{padding:'12px 14px',fontSize:11,color:'var(--text-dim)'}}>
          Generation failed — click Rebuild to retry
        </div>
      )}

      {!isFallback && (slip.legs || []).map((leg, i) => {
        const legOddsNum = typeof leg.odds === 'string' ? parseInt(leg.odds.replace('+','')) : (leg.odds || 0);
        return (
          <div key={i} className="parlay-leg">
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:2,flexWrap:'wrap'}}>
                <span style={{fontSize:9,padding:'1px 5px',background:'rgba(255,255,255,0.06)',border:'1px solid var(--border)',borderRadius:2,color:'var(--text-mid)',flexShrink:0}}>
                  {leg.sport || '?'}
                </span>
                {(leg.awayTeam || leg.homeTeam)
                  ? <span className="leg-game">{leg.awayTeam} @ {leg.homeTeam}</span>
                  : leg.team && <span className="leg-game">{leg.team}</span>
                }
                {(leg.valueDog || (leg.systems || []).includes('VALUE DOG')) && (
                  <span style={{background:'#ffd700',color:'#000',fontWeight:800,fontSize:8,padding:'1px 5px',borderRadius:2}}>💰 VALUE DOG</span>
                )}
              </div>
              <div className="leg-pick">{leg.pick}</div>
              {leg._book && <span style={{fontSize:8,color:'var(--text-dim)',background:'rgba(255,255,255,0.04)',border:'1px solid var(--border)',borderRadius:2,padding:'1px 4px',display:'inline-block',marginTop:2}}>{leg._book}</span>}
            </div>
            <div className="leg-odds-badge" style={{color: legOddsNum > 0 ? 'var(--green)' : 'var(--text-bright)'}}>
              {typeof leg.odds === 'string' ? leg.odds : fmtOdds(legOddsNum)}
            </div>
          </div>
        );
      })}

      <div className="parlay-footer">
        <div>
          <div className="parlay-risk">Risk: $25.00</div>
          <div style={{fontSize:10,color:'var(--text-dim)'}}>Legs: {(slip.legs||[]).length}</div>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{fontSize:10,color:'var(--text-dim)'}}>To Win</div>
          <div className="parlay-win">${win}</div>
        </div>
      </div>

      {slip.id && !isFallback && (
        <div className="parlay-result-row">
          <span style={{fontSize:9,color:'var(--text-dim)',textTransform:'uppercase',letterSpacing:1}}>Result:</span>
          {['W','L'].map(r => (
            <button key={r} className={`result-btn ${pResult === r ? `active-${r}` : ''}`}
              onClick={() => onMarkParlay(slip.id, pResult === r ? null : r)}>
              {r === 'W' ? '✓ WIN' : '✗ LOSS'}
            </button>
          ))}
          {pResult && <span style={{marginLeft:'auto',fontSize:10,color: pResult==='W'?'var(--green)':'var(--red)'}}>
            {pResult === 'W' ? `✓ Won $${win}` : '✗ Loss'}
          </span>}
        </div>
      )}
    </div>
  );
}

const SLIP_ORDER = ['Safety #1','Safety #2','Value #1','Value #2','Sharp #1','Sharp #2','Variety #1','Variety #2','Longshot #1','Longshot #2'];
const SLIP_SECTIONS = [
  { label: 'SAFETY PLAYS',   types: ['Safety #1','Safety #2']     },
  { label: 'VALUE PLAYS',    types: ['Value #1','Value #2']       },
  { label: 'SHARP PLAYS',    types: ['Sharp #1','Sharp #2']       },
  { label: 'VARIETY PLAYS',  types: ['Variety #1','Variety #2']   },
  { label: 'LONGSHOT PLAYS', types: ['Longshot #1','Longshot #2'] },
];

function ParlaySection({ label, slips, parlayHistory, onMarkParlay }) {

      <div style={{fontSize:10,fontWeight:900,letterSpacing:2,color:'var(--text-dim)',textTransform:'uppercase',marginBottom:8,paddingBottom:4,borderBottom:'1px solid var(--border)'}}>
        {label}
