function GamePickCard({ gamePick, sport, history, consensus, isWbc, lineMoved, lineMoveSummary, updatedPick, picksGeneratedAt, onMarkResult, weatherData, fatigueData, underdogSignal, teamTotalFlags }) {
  const gameTime = gamePick.commence_time ? new Date(gamePick.commence_time) : null;
  const isLive   = gameTime && gameTime <= new Date();
  const timeStr  = gameTime ? gameTime.toLocaleString('en-US',{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}) : '';
  const slotClass = gamePick.game_slot === 'VEGAS' ? 'badge badge-vegas' : gamePick.game_slot === 'N/A' ? 'badge badge-dim' : 'badge badge-public';
  const slotLabel = gamePick.game_slot || '—';

  // Timing window
  const hoursToGame = gameTime ? (gameTime - new Date()) / 3600000 : null;
  const timingLabel = hoursToGame != null && hoursToGame > 0
    ? hoursToGame >= 4 ? { text:'⏰ Early — best value', color:'var(--green)' }
    : hoursToGame >= 2 ? { text:'⏰ Standard timing',   color:'var(--text-dim)' }
    : { text:'⚠ Late pick', color:'var(--yellow)' }
    : null;

  // Steam detection from lineMoveSummary
  const isSteam = lineMoveSummary && lineMoveSummary.includes('🔥 STEAM');

  // Check if any pick type was flagged as a VALUE DOG
  const allSystems = [
    ...(gamePick.spread?.systems || []),
    ...(gamePick.moneyline?.systems || []),
    ...(gamePick.total?.systems || []),
  ];
  const isValueDog     = allSystems.includes('VALUE DOG');
  const isVeryLowConf  = allSystems.includes('VERY LOW CONFIDENCE');
  const isLowConf      = !isVeryLowConf && allSystems.includes('LOW CONFIDENCE');
  const isConflicting  = allSystems.includes('CONFLICTING SIGNALS');
  const isLimitedData  = allSystems.includes('LIMITED DATA');
  const isProceedCaution = allSystems.includes('PROCEED WITH CAUTION');
  // ML odds of the underdog pick for display next to badge
  const valueDogOdds = isValueDog && gamePick.moneyline?.odds > 0
    ? fmtOdds(gamePick.moneyline.odds)
    : isValueDog && gamePick.spread?.odds > 0
    ? fmtOdds(gamePick.spread.odds)
    : null;

  const getPickId = (type) => `${gamePick.game_id}_${type}`;
  const getResult = (type) => history.find(h => h.game_id === gamePick.game_id && h.pick_type === type)?.result;

  // Best Bet logic: identify the highest-quality pick type for this game
  const bestBetType = computeBestBetForGame(gamePick, underdogSignal);
  const hasAnyQualifying = !!(gamePick.spread || gamePick.moneyline || gamePick.total);

  return (
    <div className="card fade-in" style={isLive ? {borderColor:'rgba(255,68,68,0.4)'} : {}}>
      <div className="game-header">
        <div>
          <div className="game-matchup">
            {gamePick.away_team} <span className="at">@</span> {gamePick.home_team}
          </div>
          <div className="game-meta">
            {timeStr && <span className="game-time">⏰ {timeStr}</span>}
            {isLive && <span className="badge badge-red">LIVE</span>}
            {isSteam && <span style={{background:'rgba(255,100,0,0.2)',color:'#ff6400',fontWeight:800,fontSize:9,padding:'2px 6px',borderRadius:2,letterSpacing:0.5}}>🔥 STEAM MOVE</span>}
            {lineMoved && !isSteam && <span className="badge badge-yellow">📈 LINE MOVED</span>}
            {isWbc && <span className="badge badge-yellow">WBC</span>}
            {weatherData && weatherData.indoor && <span style={{fontSize:9,color:'var(--text-dim)',background:'rgba(255,255,255,0.05)',border:'1px solid var(--border)',borderRadius:2,padding:'1px 5px'}}>🏟 Indoor — {weatherData.stadiumName}</span>}
            {weatherData && !weatherData.indoor && <span style={{fontSize:9,color:weatherData.lean==='OVER'?'var(--green)':weatherData.lean==='UNDER'?'#64b4ff':'var(--text-dim)',background:'rgba(255,255,255,0.05)',border:'1px solid var(--border)',borderRadius:2,padding:'1px 5px'}}>{weatherData.emoji} {weatherData.note}{weatherData.flags?.length > 0 ? ' ⚠ '+weatherData.flags.join(', ') : ''}</span>}
            {fatigueData && (fatigueData.away?.b2b || fatigueData.away?.gamesInLast3 >= 2 || fatigueData.home?.b2b || fatigueData.home?.gamesInLast3 >= 2) && (
              <span style={{background:'rgba(255,160,0,0.15)',color:'var(--yellow)',fontSize:9,padding:'1px 5px',borderRadius:2,fontWeight:700}}>
                😴 FATIGUE: {[fatigueData.away?.b2b || fatigueData.away?.gamesInLast3 >= 2 ? `${gamePick.away_team} ${fatigueData.away.note}` : null, fatigueData.home?.b2b || fatigueData.home?.gamesInLast3 >= 2 ? `${gamePick.home_team} ${fatigueData.home.note}` : null].filter(Boolean).join(' / ')}
              </span>
            )}
            {timingLabel && !isLive && <span style={{fontSize:9,color:timingLabel.color}}>{timingLabel.text}</span>}
            {gamePick.game_slot && gamePick.game_slot !== 'N/A' && sport.key !== 'basketball_ncaab' && !sport.noSlotLogic && <span className={slotClass}>{slotLabel} Slot</span>}
            {gamePick.be_cautious && <span className="badge badge-yellow">⚠ BE CAUTIOUS</span>}
            {isValueDog && (
              <span style={{background:'#ffd700',color:'#000',fontWeight:800,fontSize:10,padding:'2px 7px',borderRadius:3,letterSpacing:0.5}}>
                💰 VALUE DOG{valueDogOdds ? ` ${valueDogOdds}` : ''}
              </span>
            )}
            {underdogSignal && (
              <span style={{background:'rgba(100,180,255,0.15)',color:'#64b4ff',fontWeight:700,fontSize:9,padding:'2px 7px',borderRadius:3,border:'1px solid rgba(100,180,255,0.35)',letterSpacing:0.3}}>
                📊 Underdog Signal: {underdogSignal.team} ML {fmtOdds(underdogSignal.mlOdds)} / Spread {fmtOdds(underdogSignal.spreadOdds)} — check 1Q/1H lines
              </span>
            )}
            {teamTotalFlags && teamTotalFlags.length > 0 && (
              <span style={{background:'rgba(255,200,0,0.18)',color:'#ffd700',fontWeight:800,fontSize:9,padding:'2px 7px',borderRadius:3,border:'1px solid rgba(255,200,0,0.5)',letterSpacing:0.3}}>

              </span>
            )}
            <span className="badge badge-dim">#{gamePick.game_position || '?'} on slate</span>
          </div>
        </div>
      </div>

      <MoneyMovementBar consensus={consensus} />

      {/* Confidence flag banners */}
      {isVeryLowConf && <div style={{background:'rgba(255,120,0,0.1)',border:'1px solid rgba(255,120,0,0.4)',borderRadius:4,padding:'6px 12px',marginBottom:8,fontSize:11,color:'#ff9040'}}>⚠⚠ VERY LOW CONFIDENCE — Coinflip territory. Use your own judgment.</div>}
      {isLowConf && <div style={{background:'rgba(240,180,41,0.08)',border:'1px solid rgba(240,180,41,0.35)',borderRadius:4,padding:'6px 12px',marginBottom:8,fontSize:11,color:'var(--yellow)'}}>⚠ LOW CONFIDENCE — Proceed with caution. You may have insight the system does not.</div>}
      {isConflicting && <div style={{background:'rgba(100,180,255,0.07)',border:'1px solid rgba(100,180,255,0.3)',borderRadius:4,padding:'6px 12px',marginBottom:8,fontSize:11,color:'#64b4ff'}}>🔀 CONFLICTING SIGNALS — Systems disagree on this game.</div>}
      {isLimitedData && <div style={{background:'rgba(150,150,150,0.07)',border:'1px solid rgba(150,150,150,0.3)',borderRadius:4,padding:'6px 12px',marginBottom:8,fontSize:11,color:'var(--text-mid)'}}>📊 LIMITED DATA — Insufficient information for high confidence.</div>}
      {isProceedCaution && !isLowConf && !isVeryLowConf && <div style={{background:'rgba(240,180,41,0.06)',border:'1px solid rgba(240,180,41,0.25)',borderRadius:4,padding:'6px 12px',marginBottom:8,fontSize:11,color:'var(--yellow)'}}>⚠ PROCEED WITH CAUTION — Multiple uncertainty factors.</div>}

      {/* Line movement banner */}
      {lineMoveSummary && (
        <div className="line-move-banner">
          📈 LINE MOVED: {lineMoveSummary}
        </div>
      )}

      {/* Original pick label when we have an updated pick */}
      {updatedPick && picksGeneratedAt && (
        <div className="original-pick-label">ORIGINAL PICK — Generated {picksGeneratedAt}</div>
      )}

      <div className="picks-grid">
        <PickTypeCard
          label="SPREAD"
          pick={gamePick.spread}
          pickId={getPickId('spread')}
          historyResult={getResult('spread')}
          onMark={onMarkResult}
          isBestBet={bestBetType === 'spread'}
          showNoEdge={hasAnyQualifying && !bestBetType && !!gamePick.spread}
        />
        <PickTypeCard
          label="MONEYLINE"
          pick={gamePick.moneyline}
          pickId={getPickId('moneyline')}
          historyResult={getResult('moneyline')}
          onMark={onMarkResult}
          isBestBet={bestBetType === 'moneyline'}
          showNoEdge={hasAnyQualifying && !bestBetType && !!gamePick.moneyline}
        />
        <PickTypeCard
          label="TOTAL"
          pick={gamePick.total}
          pickId={getPickId('total')}
          historyResult={getResult('total')}
          onMark={onMarkResult}
          isBestBet={bestBetType === 'total'}
          showNoEdge={hasAnyQualifying && !bestBetType && !!gamePick.total}
        />
      </div>

      {/* Updated pick section — shown when line movement triggered a re-analysis */}
      {updatedPick && (
        <div className="updated-pick-section">
          <div className="updated-pick-label">📈 UPDATED PICK — Line moved at {updatedPick._movedAt}</div>
          <div className="picks-grid">
            <PickTypeCard label="SPREAD"     pick={updatedPick.spread}     pickId={null} historyResult={null} onMark={null} />
            <PickTypeCard label="MONEYLINE"  pick={updatedPick.moneyline}  pickId={null} historyResult={null} onMark={null} />
            <PickTypeCard label="TOTAL"      pick={updatedPick.total}      pickId={null} historyResult={null} onMark={null} />
          </div>
        </div>
      )}
    </div>
  );
}

// ─── NFL 1Q TEAM TOTAL AUTO-FLAG ─────────────────────────────────────────────

// Scan game bookmaker data for team_totals lines at 0.5 (rare — flags extreme defensive spots)
function scanTeamTotalFlags(games) {
  // game_id → array of flagged team names
  const result = {};
  for (const game of games) {
    const flagged = [];
    for (const bm of (game.bookmakers || [])) {
      for (const mkt of (bm.markets || [])) {
        if (mkt.key !== 'team_totals') continue;
        for (const outcome of (mkt.outcomes || [])) {
          if (outcome.point === 0.5 && outcome.name === 'Over') {
            if (!flagged.includes(outcome.description || outcome.name)) {
              flagged.push(outcome.description || outcome.name);
            }
          }
        }
      }
    }
    if (flagged.length > 0) result[game.id] = flagged;
  }
  return result;
}

// ─── PICKS VIEW ───────────────────────────────────────────────────────────────

function PicksView({ sport, gamesCache, setGamesCache, history, onMarkResult, onPicksGenerated, onQuotaUpdate, lineMovementsForSport, updatedPicksForSport }) {
  const [loading, setLoading]           = useState(false);
  const [loadingPhase, setLoadingPhase] = useState('');
  const [error, setError]               = useState('');
  const [picks, setPicks]               = useState(null);
  const [isCached, setIsCached]         = useState(false);
  const [quota, setQuota]               = useState(null);
  const [linesUpdated, setLinesUpdated] = useState(null);
  const [nextRefreshAt, setNextRefreshAt] = useState(null);
  const [consensusMap, setConsensusMap] = useState({});
  const [lineMovedSet, setLineMovedSet] = useState(new Set());
  const [wbcGameIds, setWbcGameIds]     = useState(new Set());
  const [weatherMap, setWeatherMap]           = useState({}); // game_id → weather data (MLB only)
  const [underdogSignalMap, setUnderdogSignalMap]   = useState({}); // game_id → NBA underdog signal
  const [teamTotalFlagsMap, setTeamTotalFlagsMap]   = useState({}); // game_id → [teamName, ...] flagged teams
  const refreshTimer                          = useRef(null);
  const prevConsensusRef                = useRef({});

  const games = gamesCache[sport.key] || null;

  // No countdown tick needed — we show static times

  const fetchLines = useCallback(async (force = false) => {
    try {
      let g;
      const todayStr = new Date().toLocaleDateString('en-CA');

      const cacheHit = !force && getCachedOdds(sport.key);
      if (cacheHit) {
        g = cacheHit;
        if (window.latestQuota) { setQuota(window.latestQuota); onQuotaUpdate?.(window.latestQuota); }
      } else {
        // Try primary key then fallback keys (for sports like NCAA Baseball that may have alternate API keys)
        const keysToTry = [sport.key, ...(sport.fallbackKeys || [])];
        let d = null, allFetched = [];
        for (const tryKey of keysToTry) {
          try {
            const r = await apiFetch(`/api/odds?sport=${tryKey}&markets=h2h,spreads,totals&regions=us&bookmakers=${MULTI_BOOKS}`);
            console.log(`[${sport.label}] Key "${tryKey}": ${(r.data||[]).length} total games`);
            if ((r.data||[]).length > 0 || tryKey === keysToTry[keysToTry.length - 1]) {
              d = r; allFetched = r.data || []; break;
            }
          } catch (e) {
            console.warn(`[${sport.label}] Key "${tryKey}" failed:`, e.message);
            if (tryKey === keysToTry[keysToTry.length - 1]) throw e;
          }
        }
        if (!d) throw new Error(`${sport.label}: all sport keys returned no data`);
        g = allFetched.filter(game => new Date(game.commence_time).toLocaleDateString('en-CA') === todayStr);
        console.log(`[${sport.label}] Today's games: ${g.length} of ${allFetched.length} total (${todayStr})`);
        if (g.length === 0 && allFetched.length > 0) {
          const sample = allFetched.slice(0, 3).map(x => x.commence_time);
          console.log(`[${sport.label}] Game dates in API (not today):`, sample);
        }
        setQuota(d.quota);
        onQuotaUpdate?.(d.quota);
        // Merge WBC into MLB
        if (sport.includeWbc) {
          try {
            const wbcHit = !force && getCachedOdds('baseball_wbc');
            let wbcGames;
            if (wbcHit) {
              wbcGames = wbcHit.map(g => ({ ...g, _isWbc: true }));
            } else {
              const wbcD = await apiFetch(`/api/odds?sport=baseball_wbc&markets=h2h,spreads,totals&regions=us&bookmakers=${MULTI_BOOKS}`);
              const allWbc = (wbcD.data || []).map(game => ({ ...game, _isWbc: true }));
              wbcGames = allWbc.filter(game => new Date(game.commence_time).toLocaleDateString('en-CA') === todayStr);
              setCachedOdds('baseball_wbc', wbcGames, wbcD.quota);
            }
            g = [...g, ...wbcGames];
            setWbcGameIds(new Set(wbcGames.map(wg => wg.id)));
          } catch { setWbcGameIds(new Set()); }
        }
        setCachedOdds(sport.key, g, d.quota);
      }
      setGamesCache(prev => ({ ...prev, [sport.key]: g }));
      sessionStorage.setItem(`efp_games_${sport.key}`, JSON.stringify(g));
      const cm = {};
      for (const game of g) cm[game.id] = calcLineConsensus(game);

      // Detect line movement vs previous refresh
      const moved = new Set();
      for (const [gid, newC] of Object.entries(cm)) {
        const prev = prevConsensusRef.current[gid];
        if (prev && newC) {
          const spreadMoved = Math.abs((newC.spreadAvg || 0) - (prev.spreadAvg || 0)) >= 0.5;
          const totalMoved  = Math.abs((newC.totalAvg  || 0) - (prev.totalAvg  || 0)) >= 0.5;
          if (spreadMoved || totalMoved) moved.add(gid);
        }
      }
      prevConsensusRef.current = cm;
      setLineMovedSet(moved);

      // Invalidate picks cache for any game with 1+ point line movement

      setConsensusMap(cm);
      setLinesUpdated(new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}));
      setNextRefreshAt(Date.now() + REFRESH_INTERVAL_MS);
      return g;
    } catch (e) {
      console.warn(`[${sport.label}] Lines fetch failed:`, e.message);
      // Ensure gamesCache is set to empty array so the UI doesn't show a blank screen
      setGamesCache(prev => ({ ...prev, [sport.key]: prev[sport.key] ?? [] }));
      return null;
    }
  }, [sport.key, sport.includeWbc]);

  const load = useCallback(async (forceRefresh = false) => {
    // ── Instant display from background picks cache (no loading flash) ──
    if (!forceRefresh) {
      const bgCached = window.bgPicksCache?.[sport.key];
      const lsCached = loadPicksFromCache(sport.key);
      const cached = (bgCached && Date.now() - bgCached.ts < PICKS_CACHE_TTL) ? bgCached.picks : lsCached;
      if (cached) {
        setPicks(cached);
        setIsCached(true);
        if (cached?.picks) onPicksGenerated(cached.picks, sport);
        // Still fetch fresh lines in background for movement detection
        fetchLines(false);
        return;
      }
    }

    setLoading(true);
    setError('');
    setPicks(null);
    setIsCached(false);
    try {
      setLoadingPhase('Fetching live odds from 5 books...');
      const fetchedGames = await fetchLines(forceRefresh);
      const g = fetchedGames ?? games ?? [];
      if (fetchedGames === null && !games) {
        throw new Error(`${sport.label} data unavailable — sport may be inactive or out of season. Check server console for active sport keys.`);
      }
      console.log(`[${sport.label}] Generating picks for ${g.length} game(s)`);
      setLoadingPhase('Generating AI picks with GOAT system + sharp money data...');
      const result = await generatePicks(sport, g, history);
      setPicks(result);
      setIsCached(false);
      if (result?.picks) onPicksGenerated(result.picks, sport);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
      setLoadingPhase('');
    }
  }, [sport.key, games, history, fetchLines]);

  // Initial load + auto-refresh lines every 15 minutes
  useEffect(() => {
    load();
    refreshTimer.current = setInterval(() => fetchLines(), REFRESH_INTERVAL_MS);
    return () => clearInterval(refreshTimer.current);
  }, [sport.key]);

  // Fetch weather for current picks (MLB, NFL, NCAAF)
  useEffect(() => {
    const isNFL = sport.label === 'NFL' || sport.label === 'NCAAF';
    if (sport.league !== 'mlb' && !isNFL) return;
    if (!picks?.picks) return;
    const fetchWeather = async () => {
      const results = await Promise.allSettled(
        picks.picks.map(gp => {
          const fn = isNFL ? fetchNFLWeather : fetchMLBWeather;
          return fn(gp.home_team, gp.commence_time).then(w => ({ id: gp.game_id, w }));
        })
      );
      const map = {};
      results.forEach(r => { if (r.status === 'fulfilled' && r.value?.w) map[r.value.id] = r.value.w; });
      if (Object.keys(map).length > 0) setWeatherMap(map);
    };
    fetchWeather();
  }, [picks, sport.league, sport.label]);

  // Compute NBA underdog divergence signals from raw game data
  useEffect(() => {
    if (sport.league !== 'nba') { setUnderdogSignalMap({}); return; }
    if (!games || games.length === 0) return;
    const map = {};
    games.forEach(g => {
      const summary = extractGameSummary(g);
      const signal = detectNBAUnderdogSignal(summary);
      if (signal) map[g.id] = signal;
    });
    setUnderdogSignalMap(map);
  }, [games, sport.league]);

  // Fetch NFL team_totals market and auto-flag 0.5 Over lines
  useEffect(() => {
    if (sport.league !== 'nfl') { setTeamTotalFlagsMap({}); return; }
    if (!games || games.length === 0) return;
    const fetchTeamTotals = async () => {
      try {
        const r = await apiFetch(`/api/odds?sport=${sport.key}&markets=team_totals&regions=us&bookmakers=${MULTI_BOOKS}`);
        const flagged = scanTeamTotalFlags(r.data || []);
        if (Object.keys(flagged).length > 0) setTeamTotalFlagsMap(flagged);
      } catch { /* non-fatal */ }
    };
    fetchTeamTotals();
  }, [games, sport.key, sport.league]);

  const day = getDayName();
  const today = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  const nextCheckStr = nextRefreshAt
    ? new Date(nextRefreshAt).toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'})
    : null;
  const movesForTab = (lineMovementsForSport || []);

  return (
    <div>
      <div className="section-header">
        <div>
          <div className="section-title">{sport.label} PICKS — {today}</div>
          <div className="section-subtitle">
            {picks ? `${picks.picks?.length || 0} games${picks.day_slot && picks.day_slot !== 'N/A' ? (picks.day_slot === 'HYBRID' ? ' · HYBRID Day (split schedule)' : ` · ${picks.day_slot} Day`) : ''}` : day}
            {picks && <span style={{marginLeft:8,color: isCached ? 'var(--yellow)' : 'var(--green)',fontWeight:900}}>{isCached ? '⚡ Cached' : '🔄 Fresh'}</span>}
            {linesUpdated && <span style={{marginLeft:8,color:'var(--text-dim)',fontFamily:'var(--font-mono)'}}>· Lines updated: {linesUpdated}</span>}
            {nextCheckStr && <span style={{marginLeft:8,color:'var(--text-dim)',fontFamily:'var(--font-mono)'}}>· Next check: {nextCheckStr}</span>}
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          {quota && <span className="quota-badge">API: <span>{quota.remainingRequests}</span> left</span>}
          <button className="btn" onClick={() => load(true)} disabled={loading}>
            ↺ Refresh
          </button>
        </div>
      </div>

      {movesForTab.length > 0 && (
        <div style={{background:'rgba(240,180,41,0.08)',border:'1px solid rgba(240,180,41,0.4)',borderRadius:4,padding:'8px 14px',marginBottom:12,fontSize:12,color:'var(--yellow)'}}>
          📈 {movesForTab.length} line{movesForTab.length > 1 ? 's' : ''} moved since last check — scroll to see updated picks below
        </div>

      {error && (
        <div className="error-box">

      {loading && (
        <div>
          <div className="loading-row"><Spinner /><span>{loadingPhase || 'Loading...'}</span></div>
          {Array.from({length: Math.max(3, (games || []).length)}).map((_, i) => <SkeletonCard key={i} />)}

      )}

      {!loading && picks && picks.picks?.length === 0 && (

      {!loading && picks && picks.picks?.length > 0 && (() => {
        const picksAt = picks._generatedAt
          ? new Date(picks._generatedAt).toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'})
          : linesUpdated;
        const movesByGame = {};
        (movesForTab || []).forEach(m => { movesByGame[m.gameId] = m; });
        return (
          <div className="fade-in">
            {picks.picks.map(gp => {
              const moveInfo = movesByGame[gp.game_id];

              const upd = updatedPicksForSport?.[gp.game_id] || window.updatedPicksStore[gp.game_id] || null;
              const gameDate = gp.commence_time;
              const fatigue = sport.league === 'nba' || sport.league === 'nhl' ? {

              return (
                <GamePickCard

// ─── PARLAY SCORING ──────────────────────────────────────────────────────────

// Score a parlay slip for BEST PARLAY comparison within a section
function scoreParlay(slip) {
  if (!slip || slip.isFallback) return 0;
  const totalOddsRaw = slip.totalOdds ?? slip.total_odds;
  const totalOddsNum = typeof totalOddsRaw === 'string' ? parseInt(totalOddsRaw.replace('+','')) : (totalOddsRaw || 0);
  const legs = slip.legs || [];
  if (legs.length === 0) return 0;
  // Payout score: positive odds = more upside, normalized
  const payoutScore = totalOddsNum > 0 ? Math.min(totalOddsNum / 50, 60) : 0;
  // Leg quality: average implied probability of each leg (higher implied = more likely to win)
  const avgImplied = legs.reduce((sum, leg) => {
    const o = typeof leg.odds === 'string' ? parseInt(leg.odds.replace(/[^0-9+\-.]/g,'')) : (leg.odds || 0);
    return sum + americanToImplied(isNaN(o) ? -110 : o);
  }, 0) / legs.length;
  // Consistency bonus: legs that align with cached singles picks
  const cache = window.picksCache || {};
  let consistencyBonus = 0;
  for (const leg of legs) {
    const game = Object.values(cache).find(g =>
      (leg.awayTeam && teamsMatch(g.away_team, leg.awayTeam)) ||
      (leg.homeTeam && teamsMatch(g.home_team, leg.homeTeam))
    );
    if (game) {
      const maxStr = Math.max(game.spread?.ai_strength||0, game.moneyline?.ai_strength||0, game.total?.ai_strength||0);
      consistencyBonus += maxStr / legs.length;
    }
  }
  return payoutScore * 0.3 + avgImplied * 0.4 + consistencyBonus * 0.3;
}

// Find best unincluded single bet for a parlay section, pull from bgPicksCache
function findBestSingleForSection(slip) {
  const cache = window.bgPicksCache || {};
  let bestSingle = null, bestScore = -1;
  const slipGameKeys = new Set((slip.legs||[]).map(l =>
    `${(l.awayTeam||'').toLowerCase()}|${(l.homeTeam||'').toLowerCase()}`
  ));
  for (const [, entry] of Object.entries(cache)) {
    const picks = entry?.picks?.picks || [];
    for (const gp of picks) {
      const gameKey = `${gp.away_team.toLowerCase()}|${gp.home_team.toLowerCase()}`;
      if (slipGameKeys.has(gameKey)) continue; // already in slip
      // Find best bet type for this game
      const bt = computeBestBetForGame(gp);
      if (!bt) continue;
      const pick = gp[bt];
      if (!pick) continue;
      const oddsNum = typeof pick.odds === 'string'
        ? parseInt(pick.odds.replace(/[^0-9+\-.]/g,''))
        : pick.odds;
      if (isNaN(oddsNum) || oddsNum < -185 || oddsNum > 350) continue;
      const score = (pick.ai_strength || 0) * 0.6 + americanToImplied(oddsNum) * 0.4;
      if (score > bestScore) {
        bestScore = score;
        bestSingle = {
          awayTeam: gp.away_team,
          homeTeam: gp.home_team,
          pick: bt === 'total' ? `${pick.direction} ${pick.line}` : pick.pick,
          odds: fmtOdds(oddsNum),
          sport: entry.picks?.sport || '',
          reason: pick.explanation || 'Best single pick from picks engine',
          _isBestSingle: true,
        };
      }
    }
  }
  return bestSingle;
}

function ParlaySlip({ slip, parlayHistory, onMarkParlay, isBestParlay }) {
  // Support both old field names and new simplified format
  const totalOddsRaw = slip.totalOdds ?? slip.total_odds;
  const totalOddsNum = typeof totalOddsRaw === 'string' ? parseInt(totalOddsRaw.replace('+','')) : (totalOddsRaw || 1200);
  const win     = parlayWin(totalOddsNum, 25);
  const pResult = parlayHistory.find(p => p.id === slip.id)?.result;

  // Match color by first word of type (e.g. "Sharp #1" → "Sharp")
  const rawTypeKey = (slip.type || '').split(' ')[0];
  const typeKey = rawTypeKey === 'Correlated' ? 'Variety' : rawTypeKey;
  const typeColors = {
    Sharp:    { border: 'rgba(0,255,65,0.3)',    color: 'var(--green)',  bg: 'rgba(0,255,65,0.04)'   },
    Value:    { border: 'rgba(0,255,65,0.5)',    color: 'var(--green)',  bg: 'rgba(0,255,65,0.07)'   },
    Safety:   { border: 'rgba(240,180,41,0.4)',  color: 'var(--yellow)', bg: 'rgba(240,180,41,0.05)' },
    Longshot: { border: 'rgba(255,68,68,0.4)',   color: 'var(--red)',    bg: 'rgba(255,68,68,0.05)'  },
    Variety:  { border: 'rgba(100,180,255,0.4)', color: '#64b4ff',       bg: 'rgba(100,180,255,0.05)'},
  };
  const tc = typeColors[typeKey] || typeColors.Value;
  const isFallback = slip.isFallback;
  const borderStyle = isBestParlay ? '2px solid var(--green)' : `1px solid ${tc.border}`;

  return (
    <div className="parlay-slip" style={{border: borderStyle, opacity: isFallback ? 0.5 : 1, position:'relative'}}>
      {isBestParlay && (
        <div style={{position:'absolute',top:-10,left:14,background:'var(--bg-panel)',padding:'0 6px',fontSize:9,fontWeight:900,color:'var(--green)',letterSpacing:1,display:'flex',alignItems:'center',gap:4}}>

      )}

        <div>
          <div className="parlay-type" style={{color: isBestParlay ? 'var(--green)' : tc.color}}>{slip.type || 'Parlay'}</div>
          {slip.description && <div style={{fontSize:10,color:'var(--text-dim)',marginTop:2}}>{slip.description}</div>}
        </div>
        <div className="parlay-odds" style={{color: 'var(--green)'}}>
          {typeof totalOddsRaw === 'string' ? totalOddsRaw : fmtOdds(totalOddsNum)}
        </div>
      </div>

      {isFallback && (
        <div style={{padding:'12px 14px',fontSize:11,color:'var(--text-dim)'}}>
          Generation failed — click Rebuild to retry
        </div>
      )}

      {!isFallback && (slip.legs || []).map((leg, i) => {
        const legOddsNum = typeof leg.odds === 'string' ? parseInt(leg.odds.replace(/[^0-9+\-.]/g,'')) : (leg.odds || 0);
        const isOverCap  = !isNaN(legOddsNum) && legOddsNum < -185;
        const isBestSingleLeg = !!leg._isBestSingle;
        const legStyle = isBestSingleLeg
          ? {border:'2px solid #ffd700',borderRadius:4,background:'rgba(255,215,0,0.04)'}
          : isOverCap ? {opacity:0.5,border:'1px solid rgba(255,68,68,0.4)',borderRadius:3} : {};
        return (
          <div key={i} className="parlay-leg" style={legStyle}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:2,flexWrap:'wrap'}}>
                <span style={{fontSize:9,padding:'1px 5px',background:'rgba(255,255,255,0.06)',border:'1px solid var(--border)',borderRadius:2,color:'var(--text-mid)',flexShrink:0}}>
                  {leg.sport || '?'}
                </span>

                  <span style={{background:'#ffd700',color:'#000',fontWeight:800,fontSize:8,padding:'1px 5px',borderRadius:2}}>💰 VALUE DOG</span>

      <div style={{padding:'4px 14px 6px',fontSize:8,color:'var(--text-dim)',borderTop:'1px solid var(--border)',marginTop:2}}>

const SLIP_ORDER = ['Safety #1','Safety #2','Value #1','Value #2','Sharp #1','Sharp #2','Variety #1','Correlated #2','Longshot #1','Longshot #2'];
const SLIP_SECTIONS = [
  { label: 'SAFETY PLAYS',   types: ['Safety #1','Safety #2'],        isVariety: false },
  { label: 'VALUE PLAYS',    types: ['Value #1','Value #2'],           isVariety: false },
  { label: 'SHARP PLAYS',    types: ['Sharp #1','Sharp #2'],           isVariety: false },
  { label: 'VARIETY PLAYS',  types: ['Variety #1','Correlated #2'],    isVariety: true  },
  { label: 'LONGSHOT PLAYS', types: ['Longshot #1','Longshot #2'],     isVariety: false },
];

function ParlayROITracker({ allSlips, parlayHistory }) {
  const resultById = new Map(parlayHistory.map(p => [p.id, p.result]));
  let wins = 0, losses = 0, risked = 0, wonTotal = 0;
  const byType = {};

  for (const slip of allSlips) {
    if (!slip.id || slip.isFallback) continue;
    const r = resultById.get(slip.id);
    if (!r) continue;
    const typeKey = (slip.type || '?').split(' ')[0];
    if (!byType[typeKey]) byType[typeKey] = { w: 0, l: 0 };
    const totalOddsRaw = slip.totalOdds ?? slip.total_odds;
    const totalOddsNum = typeof totalOddsRaw === 'string' ? parseInt(totalOddsRaw.replace('+','')) : (totalOddsRaw || 1200);
    const winAmt = parseFloat(parlayWin(totalOddsNum, 25));
    if (r === 'W') { wins++; risked += 25; wonTotal += winAmt; byType[typeKey].w++; }
    else if (r === 'L') { losses++; risked += 25; byType[typeKey].l++; }
  }

  if (wins + losses === 0) return null;
  const net = wonTotal - risked;
  const roi = risked > 0 ? ((net / risked) * 100).toFixed(0) : null;

  return (
    <div style={{background:'rgba(255,255,255,0.03)',border:'1px solid var(--border)',borderRadius:6,padding:'10px 14px',marginBottom:14}}>
      <div style={{fontSize:9,fontWeight:900,letterSpacing:2,color:'var(--text-dim)',textTransform:'uppercase',marginBottom:8}}>Parlay ROI Tracker · $25/slip</div>
      <div style={{display:'flex',gap:16,flexWrap:'wrap',alignItems:'center'}}>
        <div style={{fontSize:13,fontWeight:900,color:'var(--text-bright)',fontFamily:'var(--font-mono)'}}>{wins}W–{losses}L</div>
        <div style={{fontSize:11,color:'var(--text-mid)'}}>Risked: <span style={{color:'var(--text-bright)',fontFamily:'var(--font-mono)'}}>${risked.toFixed(2)}</span></div>
        <div style={{fontSize:11,color:'var(--text-mid)'}}>Won: <span style={{color:'var(--green)',fontFamily:'var(--font-mono)'}}>${wonTotal.toFixed(2)}</span></div>
        <div style={{fontSize:11,color:'var(--text-mid)'}}>Net: <span style={{color:net>=0?'var(--green)':'var(--red)',fontFamily:'var(--font-mono)',fontWeight:700}}>{net>=0?'+':''}{net.toFixed(2)}</span></div>
        {roi && <div style={{fontSize:11,color:'var(--text-mid)'}}>ROI: <span style={{color:parseFloat(roi)>=0?'var(--green)':'var(--red)',fontFamily:'var(--font-mono)',fontWeight:700}}>{roi}%</span></div>}
      </div>
      {Object.keys(byType).length > 0 && (
        <div style={{display:'flex',gap:8,marginTop:8,flexWrap:'wrap'}}>
          {Object.entries(byType).map(([type, {w,l}]) => (
            <span key={type} style={{fontSize:10,color:'var(--text-dim)',background:'rgba(255,255,255,0.04)',border:'1px solid var(--border)',borderRadius:3,padding:'2px 7px'}}>
              {type}: <span style={{color:'var(--text-bright)'}}>{w}W–{l}L</span>
            </span>
          ))}
        </div>
      )}
    </div>
  );
}

function ParlaySection({ label, slips, parlayHistory, onMarkParlay, isVariety, eligibleLegCount }) {
  // Identify BEST PARLAY: score each slip and mark the winner
  const scores = slips.map(s => scoreParlay(s));
  const maxScore = Math.max(...scores);
  let bestIdx = maxScore > 0 ? scores.indexOf(maxScore) : -1;
  if (bestIdx === -1 && slips.length > 0) {
    bestIdx = slips.reduce((best, s, i) => (s.legs?.length || 0) > (slips[best]?.legs?.length || 0) ? i : best, 0);
  }

  // Add best single leg to the BEST PARLAY slip (req #4)
  const enrichedSlips = slips.map((slip, i) => {
    if (i !== bestIdx || slip.isFallback) return slip;
    const best = findBestSingleForSection(slip);
    if (!best) return slip;
    // Recalculate totalOdds with added leg
    const newLegs = [...(slip.legs || []), best];
    const dec = newLegs.reduce((acc, leg) => {
      const o = parseFloat(String(leg.odds).replace(/[^0-9+\-.]/g, ''));
      return acc * (isNaN(o) ? 1 : (o > 0 ? (o/100)+1 : (100/Math.abs(o))+1));
    }, 1);
    const american = dec >= 2 ? Math.round((dec-1)*100) : Math.round(-100/(dec-1));
    return { ...slip, legs: newLegs, totalOdds: american > 0 ? `+${american}` : `${american}` };
  });

  const hasInsufficientLegs = eligibleLegCount > 0 && eligibleLegCount < 4;

  return (
    <div style={{marginBottom:20}}>
      <div style={{fontSize:10,fontWeight:900,letterSpacing:2,color:'var(--text-dim)',textTransform:'uppercase',marginBottom:4,paddingBottom:4,borderBottom:'1px solid var(--border)'}}>
        {label}
      </div>
      <div style={{fontSize:9,color:'rgba(150,150,150,0.5)',marginBottom:isVariety ? 4 : 8,letterSpacing:0.3}}>
        All legs verified ≤ -185
      </div>
      {isVariety && (
        <div style={{fontSize:9,color:'var(--text-dim)',marginBottom:8,fontStyle:'italic'}}>
          Variety #1 — True multi-sport parlay · Correlated #2 — Correlation-based parlay
          <span style={{marginLeft:12,color:'rgba(100,180,255,0.6)'}}>Correlation engine: active</span>
        </div>
      )}
      {hasInsufficientLegs && (
        <div style={{background:'rgba(255,160,0,0.08)',border:'1px solid rgba(255,160,0,0.3)',borderRadius:4,padding:'7px 12px',marginBottom:8,fontSize:11,color:'var(--yellow)'}}>
          ⚠ Insufficient qualified legs today — {eligibleLegCount} leg{eligibleLegCount !== 1 ? 's' : ''} available after -185 cap filter
        </div>
      )}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:10}}>
        {enrichedSlips.map((slip, i) => (
          <ParlaySlip key={slip.id || i} slip={slip} parlayHistory={parlayHistory} onMarkParlay={onMarkParlay} isBestParlay={i === bestIdx} />
        ))}
      </div>
    </div>
  );
}

function ParlaysView({ gamesCache, setGamesCache, history, parlayHistory, onMarkParlay, onParlaysGenerated }) {
  const [loading, setLoading]           = useState(false);
  const [loadingPhase, setLoadingPhase] = useState('');
  const [error, setError]               = useState('');
  const [builds, setBuilds]             = useState(() => loadParlayBuilds());
  const [buildIdx, setBuildIdx]         = useState(() => { const b = loadParlayBuilds(); return b.length > 0 ? b.length - 1 : -1; });
  const [staleBuilds, setStaleBuilds]   = useState(() => loadStaleBuilds());
  const sessionStart                    = getOrCreateSessionStart();

  const currentBuild    = builds[buildIdx] || null;
  const mainSlips       = currentBuild?.mainSlips  || null;
  const fightSlips      = currentBuild?.fightSlips || null;
  const sportsUsed      = currentBuild?.sportsUsed || [];
  const hasFightNight   = currentBuild?.hasFightNight || false;
  const eligibleLegCount = currentBuild?.eligibleLegCount || 0;

  const clearCaches = () => {
    const d = new Date().toDateString();
    sessionStorage.removeItem(`efp_main_parlays_${d}`);
    sessionStorage.removeItem(`efp_fn_parlays_${d}`);
    sessionStorage.removeItem(`efp_variety_parlays_${d}`);
    sessionStorage.removeItem(`efp_ext_parlays_${d}`);
  };

  // Daily purge: clear stale localStorage builds on mount and every minute
  useEffect(() => {
    const check = () => {
      const todayStr = new Date().toLocaleDateString('en-CA');
      try {
        const all = JSON.parse(localStorage.getItem(PARLAY_BUILDS_KEY) || '[]');
        const stale = all.filter(b => b.date && b.date !== todayStr);
        if (stale.length > 0) {
          const fresh = all.filter(b => b.date === todayStr);
          localStorage.setItem(PARLAY_BUILDS_KEY, JSON.stringify(fresh));
          console.log('[DailyReset] Purged', stale.length, 'stale builds');
        }
      } catch {}
      const todayBuilds = loadParlayBuilds();
      if (todayBuilds.length !== builds.length) {
        setBuilds(todayBuilds);
        setBuildIdx(todayBuilds.length > 0 ? todayBuilds.length - 1 : -1);
      }
    };
    check();
    const t = setInterval(check, 60_000);
    return () => clearInterval(t);
  }, [builds.length]);

  const load = useCallback(async (forceRefresh = false) => {
    setLoading(true);
    setError('');
    setStaleBuilds([]); // dismiss stale warning on any build attempt
    try {
      if (forceRefresh) clearCaches();
      setLoadingPhase('Fetching today\'s games across all sports...');
      const result = await generateParlays(gamesCache, history, setGamesCache);

      const stamp = Date.now();
      const mains  = (result.mainSlips || []).map((p, i) => ({ ...p, id: `mp_${stamp}_${i}` }));
      const fights = (result.fightNightSlips || []).map((p, i) => ({ ...p, id: `fn_${stamp}_${i}` }));

      const newBuild = {
        date: new Date().toLocaleDateString('en-CA'),
        builtAt: stamp,
        mainSlips: mains,
        fightSlips: fights,
        sportsUsed: result.sportsWithGames || [],
        hasFightNight: result.hasFightNight || false,
        eligibleLegCount: result.eligibleLegCount || 0,
      };

      setBuilds(prev => {
        const next = [...prev, newBuild];
        saveParlayBuilds(next);
        return next;
      });
      setBuildIdx(prev => {
        const b = loadParlayBuilds();
        return b.length; // will be length after save = prev.length
      });
      // Use local vars since state update is async
      onParlaysGenerated([...mains, ...fights]);
    } catch (e) {
      console.error('[ParlaysView error]', e);
      setError(e.message);
    } finally {
      setLoading(false);
      setLoadingPhase('');
    }
  }, [gamesCache, history]);

  // Set buildIdx correctly after builds changes; reset to -1 (empty state) when cleared
  useEffect(() => {
    if (builds.length > 0) setBuildIdx(builds.length - 1);
    else setBuildIdx(-1);
  }, [builds.length]);

  useEffect(() => {
    if (builds.length === 0) load();
  }, []);

  const today = new Date().toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
  const builtAtStr = currentBuild
    ? new Date(currentBuild.builtAt).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})
    : null;

  const slipByType = {};
  for (const s of (mainSlips || [])) slipByType[s.type] = s;

  return (
    <div>
      <div className="section-header">
        <div>
          <div className="section-title">PARLAY SLIPS — {today}</div>
          <div className="section-subtitle">
            {sportsUsed.length > 0
              ? `Built from: ${sportsUsed.join(' · ')} · Today only`
              : 'Auto-generated · Today\'s games only · Started games excluded'}
            {builtAtStr && <span style={{marginLeft:8,color:'var(--text-dim)'}}>· Built {builtAtStr}</span>}
            <span style={{marginLeft:8,color:'var(--text-dim)'}}>· Results auto-update 9PM–2AM</span>
            {sessionStart && <span style={{marginLeft:8,color:'rgba(100,180,100,0.5)',fontFamily:'var(--font-mono)'}}>· Session started: {new Date(sessionStart).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}</span>}
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
          {builds.length > 1 && (
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <button className="btn" style={{padding:'4px 8px'}}
                onClick={() => setBuildIdx(i => Math.max(0, i - 1))}
                disabled={buildIdx <= 0}>←</button>
              <span style={{fontSize:10,color:'var(--text-dim)',whiteSpace:'nowrap'}}>
                Build {buildIdx + 1} of {builds.length}
              </span>
              <button className="btn" style={{padding:'4px 8px'}}
                onClick={() => setBuildIdx(i => Math.min(builds.length - 1, i + 1))}
                disabled={buildIdx >= builds.length - 1}>→</button>
            </div>
          )}
          <button className="btn" onClick={() => load(true)} disabled={loading}>↺ Rebuild</button>
        </div>
      </div>

      {error && <div className="error-box">⚠ {error}</div>}
      {loading && <div className="loading-row"><Spinner /><span>{loadingPhase || 'Building parlay slips...'}</span></div>}

      {!loading && staleBuilds.length > 0 && builds.length === 0 && (
        <div style={{background:'rgba(255,200,0,0.08)',border:'1px solid rgba(255,200,0,0.3)',borderRadius:6,padding:'10px 14px',marginBottom:12,fontSize:11,color:'var(--yellow)',display:'flex',alignItems:'center',gap:10}}>
          <span>📅 Previous-day slips detected ({staleBuilds.length} build{staleBuilds.length>1?'s':''} from {staleBuilds[0]?.date}). Click Rebuild to start a fresh session.</span>
          <button className="btn" style={{fontSize:10,padding:'3px 8px',marginLeft:'auto'}} onClick={() => setStaleBuilds([])}>Dismiss</button>
        </div>
      )}

      {!loading && mainSlips && (
        <div className="fade-in">
          <ParlayROITracker allSlips={[...(mainSlips || []), ...(fightSlips || [])]} parlayHistory={parlayHistory} />
          {SLIP_SECTIONS.map(section => {
            const sectionSlips = section.types.map(t => slipByType[t]).filter(Boolean);
            const fallback = sectionSlips.length === 0
              ? (mainSlips || []).filter(s => section.types.some(t => {
                  const st = (s.type||'');
                  return st === t || st.startsWith(t.split(' ')[0]);
                }))
              : sectionSlips;
            if (fallback.length === 0) return null;
            return (
              <ParlaySection
                key={section.label}
                label={section.label}
                slips={fallback}
                parlayHistory={parlayHistory}
                onMarkParlay={onMarkParlay}
                isVariety={!!section.isVariety}
                eligibleLegCount={eligibleLegCount}
              />
            );
          })}

          {hasFightNight && fightSlips && fightSlips.length > 0 && (
            <ParlaySection
              label="⚡ FIGHT NIGHT"
              slips={fightSlips}
              parlayHistory={parlayHistory}
              onMarkParlay={onMarkParlay}
              isVariety={false}
              eligibleLegCount={0}
            />
          )}
        </div>
      )}

      {!loading && builds.length === 0 && !error && (
        <div className="loading-row"><Spinner /><span>Generating parlay slips...</span></div>
      )}
    </div>
  );
}

function ResultBadge({ result }) {
  if (!result) return <span className="rb rb-pending">PENDING</span>;
  if (result === 'WIN')  return <span className="rb rb-win">WIN ✓</span>;
  if (result === 'LOSS') return <span className="rb rb-loss">LOSS ✗</span>;
  if (result === 'PUSH') return <span className="rb rb-push">PUSH</span>;
  return null;
}

function YesterdayView({ onAutoResults, onAutoParlay }) {
  const todayKey     = getDailyKey();
  const yesterdayKey = getYesterdayKey();

  // Determine which day's picks to show:
  // Show today's picks if available; fall back to yesterday's (pending until 11am clear)
  const resolveActiveKey = () => {
    const td = loadDailyPicks(todayKey);
    if (td?.singles?.length > 0 || td?.parlays?.length > 0) return todayKey;
    const yd = loadDailyPicks(yesterdayKey);
    if (yd?.singles?.length > 0 || yd?.parlays?.length > 0) return yesterdayKey;
    return todayKey;
  };

  const [pickKey, setPickKey]           = useState(resolveActiveKey);
  const [dayData, setDayData]           = useState(() => loadDailyPicks(resolveActiveKey()));
  const [checking, setChecking]         = useState(false);
  const [lastChecked, setLastChecked]   = useState(() => {
    const d = loadDailyPicks(resolveActiveKey());
    return d?.lastChecked ? new Date(d.lastChecked).toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' }) : null;
  });
  const [checkStatus, setCheckStatus]   = useState(null); // null | 'checking' | {type:'allDone',w,l,p} | 'apiError'
  const [inWindow, setInWindow]         = useState(isInCheckWindow);
  const [cleared, setCleared]           = useState(false);
  const [lastReverified, setLastReverified] = useState(null);
  const autoIntervalRef                 = useRef(null);

  // Update inWindow badge every minute
  useEffect(() => {
    const t = setInterval(() => setInWindow(isInCheckWindow()), 60_000);
    return () => clearInterval(t);
  }, []);

  // 11am auto-clear: if active picks are from yesterday, rotate them and reset
  useEffect(() => {
    const hour = new Date().getHours();
    if (hour >= 11 && pickKey === yesterdayKey) {
      const data = loadDailyPicks(yesterdayKey);
      if (data) {
        // Mark any remaining PENDING as UNRESOLVED
        const finalized = {
          ...data,
          singles: (data.singles || []).map(p => p.result ? p : { ...p, result: 'UNRESOLVED' }),
        };
        // Rotate to stats_history
        const existing = loadStatsHistory();
        const existIds = new Set(existing.map(p => p.id));
        const toAdd = finalized.singles.filter(p => !existIds.has(p.id));
        if (toAdd.length > 0) saveStatsHistory([...existing, ...toAdd]);
        localStorage.removeItem(DAILY_PICKS_PFX + yesterdayKey);
      }
      setDayData(null);
      setPickKey(todayKey);
      setCleared(true);
    }
  }, []); // eslint-disable-line

  // Auto-check: every 90 min within 9PM–2AM window; run once on mount if in window
  useEffect(() => {
    const tryAutoCheck = () => {
      if (!isInCheckWindow()) return;
      const d = loadDailyPicks(pickKey);
      if (!d) return;
      if (!(d.singles || []).some(p => !p.result)) return;
      doCheck(true);
    };
    tryAutoCheck();
    autoIntervalRef.current = setInterval(tryAutoCheck, AUTO_CHECK_MS);
    return () => clearInterval(autoIntervalRef.current);
  }, [pickKey]); // eslint-disable-line

  // Reset the 90-min auto-check timer (called after a manual check inside the window)
  const resetAutoTimer = () => {
    clearInterval(autoIntervalRef.current);
    autoIntervalRef.current = setInterval(() => {
      if (!isInCheckWindow()) return;
      const d = loadDailyPicks(pickKey);
      if (!d) return;
      if (!(d.singles || []).some(p => !p.result)) return;
      doCheck(true);
    }, AUTO_CHECK_MS);
  };

  async function doCheck(isAuto = false, force = false) {
    const data = loadDailyPicks(pickKey);
    if (!data) return;
    setChecking(true);
    if (isAuto) setCheckStatus('checking');
    if (!isAuto && isInCheckWindow()) resetAutoTimer();

    try {
      // Determine which picks to grade: pending ones, or all if force=true
      const allSingles  = data.singles || [];
      const pendingSingles = force ? allSingles : allSingles.filter(p => !p.result || !p.score_verified);
      const sportKeys = [...new Set(pendingSingles.map(p => p.sport_key).filter(Boolean))];

      // ── SOURCE 1: Odds API scores ─────────────────────────────────────────────
      const scoresMap = { ...window.scoreCache };
      const scoresByTeams = Object.values(scoresMap);

      for (const sk of sportKeys) {
        try {
          const d = await apiFetch(`/api/scores?sport=${sk}&daysFrom=2`);
          for (const g of (d.data || [])) {
            if (!g.completed || !g.scores) continue;
            if (!window.scoreCache[g.id]) window.scoreCache[g.id] = g;
            scoresMap[g.id] = g;
            if (!scoresByTeams.find(s => s.id === g.id)) scoresByTeams.push(g);
          }
        } catch (err) {
          const msg = err.message || '';
          if (msg.includes('OUT_OF_USAGE_CREDITS') || msg.includes('credits exhausted') || msg.includes('402')) {
            setCheckStatus('apiError');
            setChecking(false);
            return;
          }
        }
      }

      // ── SOURCE 2: ESPN scores (cross-reference) ───────────────────────────────
      const espnByTeams = [];
      const today = new Date();
      const yd = new Date(today - 86400000);
      const fmtD = d => d.toISOString().slice(0,10).replace(/-/g,'');
      for (const sk of sportKeys) {
        for (const dateStr of [fmtD(yd), fmtD(today)]) {
          try {
            const espnData = await apiFetch(`/api/espn-scores?sport=${sk}&date=${dateStr}`);
            for (const g of (espnData.data || [])) {
              if (g.completed) espnByTeams.push(g);
            }
          } catch { /* non-fatal — ESPN may not have data for all sports */ }
        }
      }

      const findEspnGame = (awayTeam, homeTeam) =>
        espnByTeams.find(g =>
          (teamsMatch(g.away_team, awayTeam) && teamsMatch(g.home_team, homeTeam)) ||
          (teamsMatch(g.away_team, homeTeam) && teamsMatch(g.home_team, awayTeam))
        ) || null;

      // ── Parse score helpers ───────────────────────────────────────────────────
      const findScore = pick => {
        if (scoresMap[pick.game_id]) return scoresMap[pick.game_id];
        return scoresByTeams.find(g =>
          (teamsMatch(g.home_team, pick.home_team) && teamsMatch(g.away_team, pick.away_team)) ||
          (teamsMatch(g.home_team, pick.away_team) && teamsMatch(g.away_team, pick.home_team))
        ) || null;
      };
      const parseScore = g => {
        const home = parseInt(g.scores?.find(s => teamsMatch(s.name, g.home_team))?.score ?? -1);
        const away = parseInt(g.scores?.find(s => teamsMatch(s.name, g.away_team))?.score ?? -1);
        return { homeScore: home, awayScore: away, valid: home >= 0 && away >= 0 };
      };

      // ── Grade singles with dual-source verification ───────────────────────────
      const updatedSingles = allSingles.map(pick => {
        if (!force && pick.result && pick.score_verified) return pick; // already verified by both sources
        const g = findScore(pick);
        if (!g) return pick;
        const { homeScore, awayScore, valid } = parseScore(g);
        if (!valid) return pick;

        let result = null;
        if (pick.pick_type === 'spread' && pick.picked_team && pick.spread_line != null)
          result = calculateSpreadResult(pick.picked_team, pick.spread_line, g.home_team, homeScore, awayScore);
        else if (pick.pick_type === 'total' && pick.total_direction && pick.total_line != null)
          result = calculateTotalResult(pick.total_direction, pick.total_line, homeScore, awayScore);
        else if (pick.pick_type === 'moneyline' && pick.picked_team)
          result = calculateMLResult(pick.picked_team, g.home_team, homeScore, awayScore);
        if (!result) return pick;

        // Cross-reference with ESPN
        const espnG = findEspnGame(pick.away_team, pick.home_team);
        let score_verified = false;
        let score_source = 'odds-api';
        if (espnG && espnG.home_score != null) {
          // Align ESPN scores to home/away in Odds API format
          const espnHomeScore = teamsMatch(espnG.home_team, g.home_team) ? espnG.home_score : espnG.away_score;
          const espnAwayScore = teamsMatch(espnG.home_team, g.home_team) ? espnG.away_score : espnG.home_score;
          if (homeScore === espnHomeScore && awayScore === espnAwayScore) {
            score_verified = true;
            score_source   = 'espn+odds-api';
          } else {
            // Sources disagree — keep result but flag as unverified
            score_source = `conflict: odds-api(${awayScore}-${homeScore}) espn(${espnAwayScore}-${espnHomeScore})`;
          }
        }

        const reasoning = buildResultReasoning(pick, homeScore, awayScore, g.home_team, result);
        return { ...pick, result, score_verified, score_source, final_home_score: homeScore, final_away_score: awayScore, result_reasoning: reasoning };
      });

      // ── Grade parlays with push voiding ────────────────────────────────────────
      const updatedParlays = (data.parlays || []).map(slip => {
        if (!force && slip.result) return slip;
        const updatedLegs = slip.legs.map(leg => {
          if (!force && leg.result) return leg;
          const g = scoresByTeams.find(s =>
            (teamsMatch(s.home_team, leg.homeTeam) && teamsMatch(s.away_team, leg.awayTeam)) ||
            (teamsMatch(s.home_team, leg.awayTeam) && teamsMatch(s.away_team, leg.homeTeam))
          );
          if (!g) return leg;
          const { homeScore, awayScore, valid } = parseScore(g);
          if (!valid) return leg;
          const parsed = parseLegPick(leg.pick);
          let result = null;
          if (parsed.type === 'spread')      result = calculateSpreadResult(parsed.team, parsed.line, g.home_team, homeScore, awayScore);
          else if (parsed.type === 'total')  result = calculateTotalResult(parsed.direction, parsed.line, homeScore, awayScore);
          else                               result = calculateMLResult(parsed.team, g.home_team, homeScore, awayScore);
          return result ? { ...leg, result, final_score: `${awayScore}-${homeScore}` } : leg;
        });

        const allSettled = updatedLegs.every(l => l.result);
        if (!allSettled) return { ...slip, legs: updatedLegs };

        // PUSH VOIDING: pushed legs are voided from the parlay calculation
        const activeLegs = updatedLegs.filter(l => l.result !== 'PUSH');
        const pushedCount = updatedLegs.length - activeLegs.length;
        let slipResult, adjustedOdds = null;

        if (activeLegs.length === 0) {
          // All legs pushed — full void, stake returned
          slipResult = 'PUSH';
        } else if (activeLegs.every(l => l.result === 'WIN')) {
          slipResult = 'WIN';
          if (pushedCount > 0) adjustedOdds = recalcParlayOdds(updatedLegs);
        } else {
          slipResult = 'LOSS';
        }

        return {
          ...slip,
          legs: updatedLegs,
          result: slipResult,
          originalOdds: slip.totalOdds,
          adjustedOdds: pushedCount > 0 ? adjustedOdds : null,
          pushedLegs: pushedCount,
        };
      });

      const updated = { ...data, singles: updatedSingles, parlays: updatedParlays, lastChecked: Date.now() };
      saveDailyPicks(pickKey, updated);
      setDayData(updated);
      const nowStr = new Date().toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
      setLastChecked(nowStr);
      if (force) setLastReverified(nowStr);

      if (onAutoResults) onAutoResults(updatedSingles);
      if (onAutoParlay) onAutoParlay(updatedParlays);

      const allResolved = updatedSingles.every(p => p.result);
      if (allResolved) {
        const w = updatedSingles.filter(p => p.result === 'WIN').length;
        const l = updatedSingles.filter(p => p.result === 'LOSS').length;
        const p = updatedSingles.filter(p => p.result === 'PUSH').length;
        setCheckStatus({ type: 'allDone', w, l, p });
        clearInterval(autoIntervalRef.current);
      } else if (isAuto) {
        setCheckStatus(null);
      }
    } catch (err) {
      const msg = err.message || '';
      if (msg.includes('OUT_OF_USAGE_CREDITS') || msg.includes('credits exhausted')) setCheckStatus('apiError');
    } finally {
      setChecking(false);
    }
  }

  const singles = dayData?.singles || [];
  const parlays = dayData?.parlays || [];
  const singleSettled = singles.filter(p => p.result && p.result !== 'PUSH' && p.result !== 'UNRESOLVED');
  const wins    = singleSettled.filter(p => p.result === 'WIN').length;
  const losses  = singleSettled.filter(p => p.result === 'LOSS').length;
  const pushes  = singles.filter(p => p.result === 'PUSH').length;
  const pending = singles.filter(p => !p.result).length;
  const hitRate = wins + losses > 0 ? ((wins / (wins + losses)) * 100).toFixed(0) : null;

  const bySport = {};
  for (const p of singles) {
    if (!bySport[p.sport]) bySport[p.sport] = [];
    bySport[p.sport].push(p);
  }
  const sortPicks = arr => [...arr].sort((a,b) => (a.result?0:1) - (b.result?0:1));

  const dateLabel = pickKey === todayKey
    ? new Date().toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' }).toUpperCase()
    : new Date(yesterdayKey + 'T12:00:00').toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' }).toUpperCase();

  const renderStatusBar = () => {
    if (checkStatus === 'apiError')
      return <div style={{background:'rgba(255,160,0,.1)',border:'1px solid rgba(255,160,0,.4)',borderRadius:5,padding:'8px 14px',marginBottom:12,fontSize:12,color:'var(--yellow)'}}>⚠ API credits low — mark results manually</div>;
    if (checkStatus?.type === 'allDone')
      return <div style={{background:'rgba(0,255,65,.08)',border:'1px solid rgba(0,255,65,.3)',borderRadius:5,padding:'8px 14px',marginBottom:12,fontSize:12,color:'var(--green)'}}>✅ All results in — {checkStatus.w} wins, {checkStatus.l} losses, {checkStatus.p} pushes</div>;
    if (checkStatus === 'checking')
      return <div style={{background:'rgba(0,180,255,.07)',border:'1px solid rgba(0,180,255,.25)',borderRadius:5,padding:'8px 14px',marginBottom:12,fontSize:12,color:'#64b4ff',display:'flex',alignItems:'center',gap:8}}><span style={{animation:'spin 1s linear infinite',display:'inline-block'}}>🔄</span> Checking results...</div>;
    return null;
  };

  return (
    <div>
      <div className="section-header">
        <div>
          <div className="section-title">TODAY'S PICKS — {dateLabel}</div>
          <div style={{display:'flex',gap:12,flexWrap:'wrap',marginTop:3}}>
            <span style={{fontSize:11,color:inWindow?'var(--green)':'var(--text-dim)'}}>
              {inWindow ? '🟢 Auto-check active (9PM–2AM)' : '⏰ Auto-check window: 9PM–2AM'}
            </span>
            {lastChecked && <span style={{fontSize:11,color:'var(--text-dim)'}}>Last checked: {lastChecked}</span>}
            {lastReverified && <span style={{fontSize:11,color:'var(--text-dim)'}}>· Reverified: {lastReverified} via ESPN + Odds API</span>}
            {pending > 0 && !inWindow && <span style={{fontSize:11,color:'var(--yellow)'}}>· {pending} pending</span>}
          </div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-sm" onClick={() => doCheck(false, true)} disabled={checking} style={{fontSize:11,padding:'5px 10px'}}>
            {checking ? '⏳' : '↻ Reverify All'}
          </button>
          <button className="btn" onClick={() => doCheck(false)} disabled={checking}>
            {checking ? '⏳ Checking...' : '↺ Check Results Now'}
          </button>
        </div>
      </div>

      {renderStatusBar()}

      {cleared && (
        <div style={{background:'rgba(0,255,65,.05)',border:'1px solid rgba(0,255,65,.2)',borderRadius:5,padding:'10px 14px',marginBottom:12,fontSize:12,color:'var(--green)'}}>
          Refreshed for new day — waiting for today's picks.
        </div>
      )}

      {/* Summary bar */}
      {singles.length > 0 && (
        <div className="yesterday-summary">
          <div className="ys-stat"><div className="ys-stat-val">{singles.length}</div><div className="ys-stat-lbl">Total Picks</div></div>
          <div className="ys-stat"><div className="ys-stat-val" style={{color:'var(--green)'}}>{wins}</div><div className="ys-stat-lbl">Wins</div></div>
          <div className="ys-stat"><div className="ys-stat-val" style={{color:'var(--red)'}}>{losses}</div><div className="ys-stat-lbl">Losses</div></div>
          <div className="ys-stat"><div className="ys-stat-val" style={{color:'var(--text-dim)'}}>{pushes}</div><div className="ys-stat-lbl">Pushes</div></div>
          <div className="ys-stat"><div className="ys-stat-val" style={{color:'var(--yellow)'}}>{pending}</div><div className="ys-stat-lbl">Pending</div></div>
          {hitRate && <div className="ys-stat"><div className="ys-stat-val" style={{color:parseFloat(hitRate)>=55?'var(--green)':'var(--red)'}}>{hitRate}%</div><div className="ys-stat-lbl">Hit Rate</div></div>}
        </div>
      )}

      {/* Singles grouped by sport */}
      {Object.keys(bySport).length > 0 && (
        <div className="card">
          <div style={{fontSize:11,color:'var(--green)',fontWeight:900,letterSpacing:1,marginBottom:10,textTransform:'uppercase'}}>Single Picks</div>
          {Object.entries(bySport).map(([sport, picks]) => (
            <div key={sport}>
              <div className="ys-sport-label">{sport}</div>
              {sortPicks(picks).map(p => (
                <div key={p.id} className="ys-pick-row">
                  <div className="ys-game">{p.game}</div>
                  <span className={`badge ${p.slot==='VEGAS'?'badge-vegas':'badge-public'}`}>{p.slot||'?'}</span>
                  <span className="badge badge-dim" style={{fontSize:9}}>{(p.pick_type||'').toUpperCase()}</span>
                  {p.is_value_dog && <span style={{background:'#ffd700',color:'#000',fontWeight:800,fontSize:8,padding:'1px 5px',borderRadius:2}}>💰 VALUE DOG</span>}
                  <div className="ys-pick">{p.pick_display}</div>
                  <div className="ys-meta">{fmtOdds(p.odds)}</div>
                  <ResultBadge result={p.result} />
                  {p.result_reasoning && <div style={{fontSize:10,color:'var(--text-dim)',marginTop:2,width:'100%'}}>{p.result_reasoning}{p.score_source && p.score_source !== 'odds-api' && p.score_source !== 'espn+odds-api' && <span style={{color:'var(--yellow)',marginLeft:6}}> ⚠ {p.score_source}</span>}</div>}
                  {p.score_verified && <span style={{fontSize:9,color:'#64b4ff',marginTop:1}}>✓ verified</span>}
                </div>
              ))}
            </div>
          ))}
        </div>
      )}

      {/* Parlays */}
      {parlays.length > 0 && (
        <div>
          <div style={{fontSize:11,color:'var(--green)',fontWeight:900,letterSpacing:1,margin:'16px 0 10px',textTransform:'uppercase'}}>Parlay Slips</div>
          {[...parlays].sort((a,b) => (a.result?0:1)-(b.result?0:1)).map(slip => (
            <div key={slip.id} className="ys-parlay-card">
              <div className="ys-parlay-header">
                <div className="ys-parlay-type">{slip.type}</div>
                <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:2}}>
                  <div className="ys-parlay-result" style={{color: slip.result==='WIN'?'var(--green)':slip.result==='LOSS'?'var(--red)':slip.result==='PUSH'?'var(--text-dim)':'var(--yellow)'}}>
                    {slip.result === 'PUSH' && slip.pushedLegs === (slip.legs||[]).length ? 'ALL PUSHED — FULL VOID' : (slip.result || 'PENDING')}
                  </div>
                  {slip.result === 'WIN' && slip.pushedLegs > 0 && slip.originalOdds && slip.adjustedOdds && (
                    <div style={{fontSize:10,color:'var(--text-dim)'}}>
                      <span style={{textDecoration:'line-through'}}>{slip.originalOdds}</span>
                      <span style={{color:'var(--green)',marginLeft:6}}>→ {slip.adjustedOdds} (adj.)</span>
                    </div>
                  )}
                </div>
              </div>
              {(slip.legs || []).map(leg => (
                <div key={leg.id} className="ys-leg" style={leg.result === 'PUSH' ? {opacity:0.5} : {}}>
                  <div className="ys-leg-pick" style={leg.result === 'PUSH' ? {textDecoration:'line-through',color:'var(--text-dim)'} : {}}>{leg.pick}</div>
                  <div className="ys-leg-game">{leg.awayTeam} @ {leg.homeTeam}</div>
                  {leg.final_score && <div style={{fontSize:10,color:'var(--text-dim)',marginLeft:4}}>({leg.final_score})</div>}
                  {leg.result === 'PUSH'
                    ? <span style={{fontSize:10,color:'var(--text-dim)',fontWeight:700,marginLeft:'auto'}}>PUSH — VOIDED</span>
                    : <ResultBadge result={leg.result} />}
                </div>
              ))}
            </div>
          ))}
        </div>
      )}

      {singles.length === 0 && parlays.length === 0 && !cleared && (
        <div className="empty-state">
          <div className="empty-icon">📋</div>
          <div>No picks yet for today</div>
          <div style={{marginTop:6,fontSize:11,color:'var(--text-dim)'}}>Picks are automatically saved when you generate them on any sport tab. Auto-check runs 9PM–2AM.</div>
        </div>
      )}
    </div>
  );
}

// ─── PERFORMANCE VIEW ─────────────────────────────────────────────────────────

function PerformanceView({ history, parlayHistory, onMarkResult, onClearHistory, onRecalcStats }) {
  const [recalcNote, setRecalcNote] = React.useState(null);
  // Read pre-computed learning_stats for fast access
  const ls = (() => { try { return JSON.parse(localStorage.getItem('learning_stats') || '{}'); } catch { return {}; } })();
  const ov = ls.overall || { wins:0, losses:0, pushes:0 };

  // Fallback: also compute from live history for recency data
  const allSettled = history.filter(p => p.result && p.result !== 'P' && p.result !== 'UNRESOLVED');
  const wins    = allSettled.filter(p => p.result === 'W').length;
  const losses  = allSettled.filter(p => p.result === 'L').length;
  const pushes  = history.filter(p => p.result === 'P').length;
  const pending = history.filter(p => !p.result).length;
  const total   = wins + losses;
  const overallPct = total > 0 ? Math.round((wins / total) * 100) : null;

  const now = Date.now();
  const last7d  = allSettled.filter(p => (now - new Date(p.generated_at).getTime()) < 7*86400000);
  const last30d = allSettled.filter(p => (now - new Date(p.generated_at).getTime()) < 30*86400000);
  const w7  = last7d.filter(p => p.result === 'W').length,  l7  = last7d.filter(p => p.result === 'L').length;
  const w30 = last30d.filter(p => p.result === 'W').length, l30 = last30d.filter(p => p.result === 'L').length;

  // Current streak
  const chron = [...history].sort((a,b) => new Date(a.generated_at)-new Date(b.generated_at));
  const settledChron = chron.filter(p => p.result === 'W' || p.result === 'L');
  let streak = 0, streakType = null;
  for (let i = settledChron.length - 1; i >= 0; i--) {
    const r = settledChron[i].result;
    if (!streakType) { streakType = r; streak = 1; }
    else if (r === streakType) streak++;
    else break;
  }

  // Value dog stats
  const valueDogPicks = allSettled.filter(p => p.is_value_dog || (p.systems||[]).includes('VALUE DOG'));
  const vdW = valueDogPicks.filter(p => p.result === 'W').length;
  const vdL = valueDogPicks.filter(p => p.result === 'L').length;

  // Recent 20 picks
  const recent20 = [...history].reverse().slice(0, 20);

  const wr = (s) => {
    if (!s) return null;
    const w = s.wins || 0, l = s.losses || 0;
    if (w + l === 0) return null;
    return Math.round((w / (w + l)) * 100);
  };
  const wrStr = (s) => {
    const r = wr(s);
    return r !== null ? `${r}%` : '—';
  };
  const wrColor = (pct) => {
    if (pct === null) return 'var(--text-dim)';
    if (pct >= 70) return 'var(--green)';
    if (pct >= 55) return '#64b4ff';
    if (pct >= 45) return 'var(--yellow)';
    return 'var(--red)';
  };
  const sysStatus = (pct) => {
    if (pct === null) return null;
    if (pct >= 75) return { label: '✅ HIGH CONFIDENCE', color: 'var(--green)' };
    if (pct >= 50) return { label: '⚠️ NEUTRAL', color: 'var(--yellow)' };
    return { label: '❌ REDUCE WEIGHT', color: 'var(--red)' };
  };

  // Trend: compare last 10 vs overall
  const trendFor = (sport) => {
    const sportPicks = allSettled.filter(p => p.sport === sport);
    const last10 = sportPicks.slice(-10);
    if (last10.length < 5) return null;
    const l10w = last10.filter(p => p.result === 'W').length;
    const l10pct = Math.round((l10w / last10.length) * 100);
    const allW = sportPicks.filter(p => p.result === 'W').length;
    const allPct = sportPicks.length > 0 ? Math.round((allW / sportPicks.length) * 100) : 0;
    return l10pct > allPct + 5 ? '↑' : l10pct < allPct - 5 ? '↓' : '→';
  };

  const DAY_ORDER = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const ODDS_RANGE_ORDER = ['heavy_fav','fav','pick_em','dog','big_dog'];
  const ODDS_RANGE_LABELS = { heavy_fav:'Heavy Fav (≤-151)', fav:'Fav (-150 to -110)', pick_em:"Pick'em", dog:'Dog (+110–+350)', big_dog:'Big Dog (+351+)' };

  return (
    <div>
      <div className="section-header">
        <div>
          <div className="section-title">SYSTEM LEARNING DASHBOARD</div>
          <div className="section-subtitle">Track GOAT system accuracy · Target: 90% hit rate</div>
          {ls.lastUpdated && <div style={{fontSize:10,color:'var(--text-dim)',marginTop:2}}>Stats recalculated from verified results as of {new Date(ls.lastUpdated).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}</div>}
          {recalcNote && <div style={{fontSize:10,color:'var(--green)',marginTop:2}}>{recalcNote}</div>}
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-sm" onClick={() => { saveLearningStats(history); setRecalcNote('Stats recalculated ✓ — ' + new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})); if (onRecalcStats) onRecalcStats(); }} style={{fontSize:11,padding:'5px 10px'}}>
            ↻ Recalculate Stats
          </button>
          <button className="btn" onClick={onClearHistory} style={{color:'var(--red)',borderColor:'rgba(255,68,102,0.3)'}}>
            Clear History
          </button>
        </div>
      </div>

      {/* Hit rate progress bar */}
      <div className="perf-target-bar">
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
          <span style={{fontSize:11,color:'var(--text-mid)'}}>Hit Rate: <strong style={{color:wrColor(overallPct)}}>{overallPct !== null ? `${overallPct}%` : '—'}</strong></span>
          <span style={{fontSize:11,color:'var(--text-dim)'}}>Goal: 90%</span>
        </div>
        <ProgressBar value={overallPct||0} colorClass={barColor(overallPct||0)} height={10} />
        <div style={{display:'flex',justifyContent:'space-between',marginTop:4,fontSize:10,color:'var(--text-dim)'}}>
          <span>{wins}W – {losses}L – {pushes}P · {pending} pending</span>
          <span>Target: 90%</span>
        </div>
      </div>

      {/* SECTION 1 — OVERALL PERFORMANCE */}
      <div className="perf-grid" style={{marginBottom:16}}>
        <div className="perf-card">
          <div className="perf-card-label">Overall</div>
          <div className="perf-card-value" style={{color:wrColor(overallPct)}}>{overallPct !== null ? `${overallPct}%` : '—'}</div>
          <div className="perf-card-sub">{wins}W – {losses}L</div>
        </div>
        <div className="perf-card">
          <div className="perf-card-label">Last 7 Days</div>
          <div className="perf-card-value" style={{color:wrColor(w7+l7>0?Math.round((w7/(w7+l7))*100):null)}}>
            {w7+l7 > 0 ? `${Math.round((w7/(w7+l7))*100)}%` : '—'}
          </div>
          <div className="perf-card-sub">{w7}W – {l7}L</div>
        </div>
        <div className="perf-card">
          <div className="perf-card-label">Last 30 Days</div>
          <div className="perf-card-value" style={{color:wrColor(w30+l30>0?Math.round((w30/(w30+l30))*100):null)}}>
            {w30+l30 > 0 ? `${Math.round((w30/(w30+l30))*100)}%` : '—'}
          </div>
          <div className="perf-card-sub">{w30}W – {l30}L</div>
        </div>
        <div className="perf-card">
          <div className="perf-card-label">Current Streak</div>
          <div className="perf-card-value" style={{color:streakType==='W'?'var(--green)':streakType==='L'?'var(--red)':'var(--text-dim)'}}>
            {streak > 0 ? `${streak}${streakType}` : '—'}
          </div>
          <div className="perf-card-sub">{streakType==='W'?'Win streak 🔥':streakType==='L'?'Loss streak ❄':'No data'}</div>
        </div>
        <div className="perf-card">
          <div className="perf-card-label">Total Tracked</div>
          <div className="perf-card-value" style={{color:'var(--text-bright)'}}>{total + pushes}</div>
          <div className="perf-card-sub">picks · {pending} pending</div>
        </div>
        <div className="perf-card">
          <div className="perf-card-label">Value Dogs</div>
          <div className="perf-card-value" style={{color:'#ffd700'}}>{vdW+vdL>0?`${Math.round((vdW/(vdW+vdL))*100)}%`:'—'}</div>
          <div className="perf-card-sub">{vdW}W – {vdL}L</div>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:12,marginBottom:16}}>

        {/* SECTION 2 — BY SPORT */}
        {Object.keys(ls.bySport||{}).length > 0 && (
          <div className="card">
            <div style={{fontSize:10,color:'var(--green)',fontWeight:900,letterSpacing:1,marginBottom:10,textTransform:'uppercase'}}>By Sport</div>
            <table className="perf-table" style={{width:'100%'}}>
              <thead><tr><th>Sport</th><th>W</th><th>L</th><th>P</th><th>Rate</th><th>Trend</th></tr></thead>
              <tbody>
                {Object.entries(ls.bySport).sort((a,b) => (b[1].wins+b[1].losses)-(a[1].wins+a[1].losses)).map(([sport, s]) => {
                  const rate = wr(s);
                  const trend = trendFor(sport);
                  return (
                    <tr key={sport}>
                      <td style={{color:'var(--text-bright)'}}>{sport}</td>
                      <td style={{color:'var(--green)'}}>{s.wins}</td>
                      <td style={{color:'var(--red)'}}>{s.losses}</td>
                      <td style={{color:'var(--text-dim)'}}>{s.pushes||0}</td>
                      <td style={{color:wrColor(rate)}}>{wrStr(s)}</td>
                      <td style={{color: trend==='↑'?'var(--green)':trend==='↓'?'var(--red)':'var(--text-dim)',fontWeight:700}}>{trend||'—'}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}

        {/* SECTION 3 — VEGAS vs PUBLIC */}
        <div className="card">
          <div style={{fontSize:10,color:'var(--green)',fontWeight:900,letterSpacing:1,marginBottom:10,textTransform:'uppercase'}}>Vegas vs Public</div>
          {['VEGAS','PUBLIC'].map(slot => {
            const s = ls.bySlot?.[slot];
            const rate = wr(s);
            const w7slot = last7d.filter(p => (p.slot||'PUBLIC')===slot && p.result==='W').length;
            const l7slot = last7d.filter(p => (p.slot||'PUBLIC')===slot && p.result==='L').length;
            return (
              <div key={slot} style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:4,padding:'10px 12px',marginBottom:8}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                  <span className={slot==='VEGAS'?'badge badge-vegas':'badge badge-public'}>{slot}</span>
                  <span style={{fontSize:18,fontWeight:900,color:wrColor(rate)}}>{wrStr(s)}</span>
                </div>
                <div style={{fontSize:10,color:'var(--text-dim)'}}>All-time: {s?.wins||0}W – {s?.losses||0}L</div>
                <div style={{fontSize:10,color:'var(--text-dim)'}}>Last 7d: {w7slot}W – {l7slot}L</div>
                {s && <div style={{marginTop:6}}><ProgressBar value={rate||0} colorClass={barColor(rate||0)} height={4} /></div>}
              </div>
            );
          })}
        </div>

        {/* SECTION 4 — SYSTEM PERFORMANCE */}
        {Object.keys(ls.bySystem||{}).length > 0 && (
          <div className="card">
            <div style={{fontSize:10,color:'var(--green)',fontWeight:900,letterSpacing:1,marginBottom:10,textTransform:'uppercase'}}>System Performance</div>
            <table className="perf-table" style={{width:'100%'}}>
              <thead><tr><th>System</th><th>W</th><th>L</th><th>Rate</th><th>Status</th></tr></thead>
              <tbody>
                {Object.entries(ls.bySystem)
                  .filter(([,s]) => (s.wins+s.losses) >= 3)
                  .sort((a,b) => (wr(b[1])||0)-(wr(a[1])||0))
                  .map(([sys, s]) => {
                    const rate = wr(s);
                    const st = sysStatus(rate);
                    return (
                      <tr key={sys}>
                        <td style={{color:'var(--text-bright)',maxWidth:100,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{sys}</td>
                        <td style={{color:'var(--green)'}}>{s.wins}</td>
                        <td style={{color:'var(--red)'}}>{s.losses}</td>
                        <td style={{color:wrColor(rate)}}>{wrStr(s)}</td>
                        <td style={{color:st?.color||'var(--text-dim)',fontSize:9,whiteSpace:'nowrap'}}>{st?.label||'—'}</td>
                      </tr>
                    );
                  })}
              </tbody>
            </table>
          </div>
        )}

        {/* SECTION 5 — PICK TYPE PERFORMANCE */}
        {Object.keys(ls.byPickType||{}).length > 0 && (
          <div className="card">
            <div style={{fontSize:10,color:'var(--green)',fontWeight:900,letterSpacing:1,marginBottom:10,textTransform:'uppercase'}}>Pick Type Performance</div>
            {['spread','total','moneyline'].map(pt => {
              const s = ls.byPickType?.[pt];
              if (!s || s.wins + s.losses === 0) return null;
              const rate = wr(s);
              return (
                <div key={pt} style={{marginBottom:10}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>
                    <span style={{fontSize:11,color:'var(--text-bright)',fontWeight:700,textTransform:'uppercase'}}>{pt}</span>
                    <span style={{fontSize:14,fontWeight:900,color:wrColor(rate)}}>{wrStr(s)}</span>
                  </div>
                  <div style={{fontSize:10,color:'var(--text-dim)',marginBottom:3}}>{s.wins}W – {s.losses}L – {s.pushes||0}P</div>
                  <ProgressBar value={rate||0} colorClass={barColor(rate||0)} height={4} />
                </div>
