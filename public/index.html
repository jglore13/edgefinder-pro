function ParlaysView({ gamesCache, setGamesCache, history, parlayHistory, onMarkParlay, onParlaysGenerated }) {
  const [loading, setLoading]           = useState(false);
  const [loadingPhase, setLoadingPhase] = useState('');
  const [error, setError]               = useState('');
  const [builds, setBuilds]             = useState(() => loadParlayBuilds());
  const [buildIdx, setBuildIdx]         = useState(() => { const b = loadParlayBuilds(); return b.length > 0 ? b.length - 1 : -1; });

  const currentBuild  = builds[buildIdx] || null;
  const mainSlips     = currentBuild?.mainSlips  || null;
  const fightSlips    = currentBuild?.fightSlips || null;
  const sportsUsed    = currentBuild?.sportsUsed || [];
  const hasFightNight = currentBuild?.hasFightNight || false;

  const clearCaches = () => {
    const d = new Date().toDateString();
    sessionStorage.removeItem(`efp_main_parlays_${d}`);
    sessionStorage.removeItem(`efp_fn_parlays_${d}`);
    sessionStorage.removeItem(`efp_variety_parlays_${d}`);
  };

  // 11am auto-clear: if builds are from yesterday, reset to empty state
  useEffect(() => {
    const check = () => {
      const hour = new Date().getHours();
      if (hour >= 11) {
        const todayBuilds = loadParlayBuilds();
        if (todayBuilds.length !== builds.length) {
          setBuilds(todayBuilds);
          setBuildIdx(todayBuilds.length > 0 ? todayBuilds.length - 1 : -1);
        }
      }
    };
    const t = setInterval(check, 60_000);
    return () => clearInterval(t);
  }, [builds.length]);

  const load = useCallback(async (forceRefresh = false) => {
    setLoading(true);
    setError('');
    try {
      if (forceRefresh) clearCaches();
      setLoadingPhase('Fetching today\'s games across all sports...');
      const result = await generateParlays(gamesCache, history, setGamesCache);

      const stamp = Date.now();
      const mains  = (result.mainSlips || []).map((p, i) => ({ ...p, id: `mp_${stamp}_${i}` }));
      const fights = (result.fightNightSlips || []).map((p, i) => ({ ...p, id: `fn_${stamp}_${i}` }));

      const newBuild = {
        date: new Date().toLocaleDateString('en-CA'),
        builtAt: stamp,
        mainSlips: mains,
        fightSlips: fights,
        sportsUsed: result.sportsWithGames || [],
        hasFightNight: result.hasFightNight || false,
      };

      setBuilds(prev => {
        const next = [...prev, newBuild];
        saveParlayBuilds(next);
        return next;
      });
      setBuildIdx(prev => {
        const b = loadParlayBuilds();
        return b.length; // will be length after save = prev.length
      });
      // Use local vars since state update is async
      onParlaysGenerated([...mains, ...fights]);
    } catch (e) {
      console.error('[ParlaysView error]', e);
      setError(e.message);
    } finally {
      setLoading(false);
      setLoadingPhase('');
    }
  }, [gamesCache, history]);

  // Set buildIdx correctly after builds changes
  useEffect(() => {
    if (builds.length > 0) setBuildIdx(builds.length - 1);
  }, [builds.length]);

  useEffect(() => {
    if (builds.length === 0) load();
  }, []);

  const today = new Date().toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
  const builtAtStr = currentBuild
    ? new Date(currentBuild.builtAt).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})
    : null;

  const slipByType = {};
  for (const s of (mainSlips || [])) slipByType[s.type] = s;

  return (
    <div>
      <div className="section-header">
        <div>
          <div className="section-title">PARLAY SLIPS — {today}</div>
          <div className="section-subtitle">
            {sportsUsed.length > 0
              ? `Built from: ${sportsUsed.join(' · ')} · Today only`
              : 'Auto-generated · Today\'s games only · Started games excluded'}
            {builtAtStr && <span style={{marginLeft:8,color:'var(--text-dim)'}}>· Built {builtAtStr}</span>}
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
          {builds.length > 1 && (
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <button className="btn" style={{padding:'4px 8px'}}
                onClick={() => setBuildIdx(i => Math.max(0, i - 1))}
                disabled={buildIdx <= 0}>←</button>
              <span style={{fontSize:10,color:'var(--text-dim)',whiteSpace:'nowrap'}}>
                Build {buildIdx + 1} of {builds.length}
              </span>
              <button className="btn" style={{padding:'4px 8px'}}
                onClick={() => setBuildIdx(i => Math.min(builds.length - 1, i + 1))}
                disabled={buildIdx >= builds.length - 1}>→</button>
            </div>
          )}
          <button className="btn" onClick={() => load(true)} disabled={loading}>↺ Rebuild</button>
        </div>
      </div>

      {error && <div className="error-box">⚠ {error}</div>}
      {loading && <div className="loading-row"><Spinner /><span>{loadingPhase || 'Building parlay slips...'}</span></div>}

      {!loading && mainSlips && (
        <div className="fade-in">
          {SLIP_SECTIONS.map(section => {
            const sectionSlips = section.types.map(t => slipByType[t]).filter(Boolean);
            const fallback = sectionSlips.length === 0
              ? (mainSlips || []).filter(s => section.types.some(t => (s.type||'').startsWith(t.split(' ')[0])))
              : sectionSlips;
            if (fallback.length === 0) return null;
            return (
              <ParlaySection
                key={section.label}
                label={section.label}
                slips={fallback}
                parlayHistory={parlayHistory}
                onMarkParlay={onMarkParlay}
              />
            );
          })}

          {hasFightNight && fightSlips && fightSlips.length > 0 && (
            <div style={{marginBottom:20}}>
              <div style={{fontSize:10,fontWeight:900,letterSpacing:2,color:'var(--green)',textTransform:'uppercase',marginBottom:8,paddingBottom:4,borderBottom:'1px solid var(--border)'}}>
                ⚡ FIGHT NIGHT
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:10}}>
                {fightSlips.map((slip, i) => (
                  <ParlaySlip key={slip.id || i} slip={slip} parlayHistory={parlayHistory} onMarkParlay={onMarkParlay} />
                ))}
              </div>
            </div>
          )}
        </div>
      )}

      {!loading && builds.length === 0 && !error && (
        <div className="loading-row"><Spinner /><span>Generating parlay slips...</span></div>
      )}
    </div>
  );
}

// ─── YESTERDAY'S PICKS VIEW ───────────────────────────────────────────────────

function ResultBadge({ result }) {
  if (!result) return <span className="rb rb-pending">PENDING</span>;
  if (result === 'WIN')  return <span className="rb rb-win">WIN ✓</span>;
  if (result === 'LOSS') return <span className="rb rb-loss">LOSS ✗</span>;
  if (result === 'PUSH') return <span className="rb rb-push">PUSH</span>;
  return null;
}

function YesterdayView({ onAutoResults }) {
  const todayKey     = getDailyKey();
  const yesterdayKey = getYesterdayKey();

  // Determine which day's picks to show:
  // Show today's picks if available; fall back to yesterday's (pending until 11am clear)
  const resolveActiveKey = () => {
    const td = loadDailyPicks(todayKey);
    if (td?.singles?.length > 0 || td?.parlays?.length > 0) return todayKey;
    const yd = loadDailyPicks(yesterdayKey);
    if (yd?.singles?.length > 0 || yd?.parlays?.length > 0) return yesterdayKey;
    return todayKey;
  };

  const [pickKey, setPickKey]           = useState(resolveActiveKey);
  const [dayData, setDayData]           = useState(() => loadDailyPicks(resolveActiveKey()));
  const [checking, setChecking]         = useState(false);
  const [lastChecked, setLastChecked]   = useState(() => {
    const d = loadDailyPicks(resolveActiveKey());
    return d?.lastChecked ? new Date(d.lastChecked).toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' }) : null;
  });
  const [checkStatus, setCheckStatus]   = useState(null); // null | 'checking' | {type:'allDone',w,l,p} | 'apiError'
  const [inWindow, setInWindow]         = useState(isInCheckWindow);
  const [cleared, setCleared]           = useState(false);
  const autoIntervalRef                 = useRef(null);

  // Update inWindow badge every minute
  useEffect(() => {
    const t = setInterval(() => setInWindow(isInCheckWindow()), 60_000);
    return () => clearInterval(t);
  }, []);

  // 11am auto-clear: if active picks are from yesterday, rotate them and reset
  useEffect(() => {
    const hour = new Date().getHours();
    if (hour >= 11 && pickKey === yesterdayKey) {
      const data = loadDailyPicks(yesterdayKey);
      if (data) {
        // Mark any remaining PENDING as UNRESOLVED
        const finalized = {
          ...data,
          singles: (data.singles || []).map(p => p.result ? p : { ...p, result: 'UNRESOLVED' }),
        };
        // Rotate to stats_history
        const existing = loadStatsHistory();
        const existIds = new Set(existing.map(p => p.id));
        const toAdd = finalized.singles.filter(p => !existIds.has(p.id));
        if (toAdd.length > 0) saveStatsHistory([...existing, ...toAdd]);
        localStorage.removeItem(DAILY_PICKS_PFX + yesterdayKey);
      }
      setDayData(null);
      setPickKey(todayKey);
      setCleared(true);
    }
  }, []); // eslint-disable-line

  // Auto-check: every 90 min within 9PM–2AM window; run once on mount if in window
  useEffect(() => {
    const tryAutoCheck = () => {
      if (!isInCheckWindow()) return;
      const d = loadDailyPicks(pickKey);
      if (!d) return;
      if (!(d.singles || []).some(p => !p.result)) return;
      doCheck(true);
    };
    tryAutoCheck();
    autoIntervalRef.current = setInterval(tryAutoCheck, AUTO_CHECK_MS);
    return () => clearInterval(autoIntervalRef.current);
  }, [pickKey]); // eslint-disable-line

  // Reset the 90-min auto-check timer (called after a manual check inside the window)
  const resetAutoTimer = () => {
    clearInterval(autoIntervalRef.current);
    autoIntervalRef.current = setInterval(() => {
      if (!isInCheckWindow()) return;
      const d = loadDailyPicks(pickKey);
      if (!d) return;
      if (!(d.singles || []).some(p => !p.result)) return;
      doCheck(true);
    }, AUTO_CHECK_MS);
  };

  async function doCheck(isAuto = false) {
    const data = loadDailyPicks(pickKey);
    if (!data) return;
    setChecking(true);
    if (isAuto) setCheckStatus('checking');
    // If manual check inside window, reset the 90-min auto timer
    if (!isAuto && isInCheckWindow()) resetAutoTimer();

    try {
      const pendingSingles = (data.singles || []).filter(p => !p.result);
      const sportKeys = [...new Set(pendingSingles.map(p => p.sport_key).filter(Boolean))];

      const scoresMap = { ...window.scoreCache };
      const scoresByTeams = Object.values(scoresMap);

      for (const sk of sportKeys) {
        const pendingForSport = pendingSingles.filter(p => p.sport_key === sk);
        if (pendingForSport.every(p => scoresMap[p.game_id])) continue;
        try {
          const d = await apiFetch(`/api/scores?sport=${sk}&daysFrom=2`);
          for (const g of (d.data || [])) {
            if (!g.completed || !g.scores) continue;
            if (!window.scoreCache[g.id]) window.scoreCache[g.id] = g;
            scoresMap[g.id] = g;
            if (!scoresByTeams.find(s => s.id === g.id)) scoresByTeams.push(g);
          }
        } catch (err) {
          const msg = err.message || '';
          if (msg.includes('OUT_OF_USAGE_CREDITS') || msg.includes('credits exhausted') || msg.includes('402')) {
            setCheckStatus('apiError');
            setChecking(false);
            return;
          }
        }
      }

      const findScore = pick => {
        if (scoresMap[pick.game_id]) return scoresMap[pick.game_id];
        return scoresByTeams.find(g =>
          (teamsMatch(g.home_team, pick.home_team) && teamsMatch(g.away_team, pick.away_team)) ||
          (teamsMatch(g.home_team, pick.away_team) && teamsMatch(g.away_team, pick.home_team))
        ) || null;
      };
      const parseScore = g => {
        const home = parseInt(g.scores?.find(s => teamsMatch(s.name, g.home_team))?.score ?? -1);
        const away = parseInt(g.scores?.find(s => teamsMatch(s.name, g.away_team))?.score ?? -1);
        return { homeScore: home, awayScore: away, valid: home >= 0 && away >= 0 };
      };

      const updatedSingles = (data.singles || []).map(pick => {
        if (pick.result) return pick;
        const g = findScore(pick);
        if (!g) return pick;
        const { homeScore, awayScore, valid } = parseScore(g);
        if (!valid) return pick;
        let result = null;
        if (pick.pick_type === 'spread' && pick.picked_team && pick.spread_line != null)
          result = calculateSpreadResult(pick.picked_team, pick.spread_line, g.home_team, homeScore, awayScore);
        else if (pick.pick_type === 'total' && pick.total_direction && pick.total_line != null)
          result = calculateTotalResult(pick.total_direction, pick.total_line, homeScore, awayScore);
        else if (pick.pick_type === 'moneyline' && pick.picked_team)
          result = calculateMLResult(pick.picked_team, g.home_team, homeScore, awayScore);
        return result ? { ...pick, result } : pick;
      });

      const updatedParlays = (data.parlays || []).map(slip => {
        if (slip.result) return slip;
        const updatedLegs = slip.legs.map(leg => {
          if (leg.result) return leg;
          const g = scoresByTeams.find(s =>
            (teamsMatch(s.home_team, leg.homeTeam) && teamsMatch(s.away_team, leg.awayTeam)) ||
            (teamsMatch(s.home_team, leg.awayTeam) && teamsMatch(s.away_team, leg.homeTeam))
          );
          if (!g) return leg;
          const { homeScore, awayScore, valid } = parseScore(g);
          if (!valid) return leg;
          const parsed = parseLegPick(leg.pick);
          let result = null;
          if (parsed.type === 'spread') result = calculateSpreadResult(parsed.team, parsed.line, g.home_team, homeScore, awayScore);
          else if (parsed.type === 'total') result = calculateTotalResult(parsed.direction, parsed.line, homeScore, awayScore);
          else result = calculateMLResult(parsed.team, g.home_team, homeScore, awayScore);
          return result ? { ...leg, result } : leg;
        });
        const allSettled = updatedLegs.every(l => l.result);
        const slipResult = allSettled ? (updatedLegs.every(l => l.result === 'WIN') ? 'WIN' : 'LOSS') : null;
        return { ...slip, legs: updatedLegs, result: slipResult };
      });

      const updated = { ...data, singles: updatedSingles, parlays: updatedParlays, lastChecked: Date.now() };
      saveDailyPicks(pickKey, updated);
      setDayData(updated);
      setLastChecked(new Date().toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' }));

      if (onAutoResults) onAutoResults(updatedSingles);

      const allResolved = updatedSingles.every(p => p.result);
      if (allResolved) {
        const w = updatedSingles.filter(p => p.result === 'WIN').length;
        const l = updatedSingles.filter(p => p.result === 'LOSS').length;
        const p = updatedSingles.filter(p => p.result === 'PUSH').length;
        setCheckStatus({ type: 'allDone', w, l, p });
        clearInterval(autoIntervalRef.current);
      } else if (isAuto) {
        setCheckStatus(null);
      }
    } catch (err) {
      const msg = err.message || '';
      if (msg.includes('OUT_OF_USAGE_CREDITS') || msg.includes('credits exhausted')) setCheckStatus('apiError');
    } finally {
      setChecking(false);
    }
  }

  const singles = dayData?.singles || [];
  const parlays = dayData?.parlays || [];
  const singleSettled = singles.filter(p => p.result && p.result !== 'PUSH' && p.result !== 'UNRESOLVED');
  const wins    = singleSettled.filter(p => p.result === 'WIN').length;
  const losses  = singleSettled.filter(p => p.result === 'LOSS').length;
  const pushes  = singles.filter(p => p.result === 'PUSH').length;
  const pending = singles.filter(p => !p.result).length;
  const hitRate = wins + losses > 0 ? ((wins / (wins + losses)) * 100).toFixed(0) : null;

  const bySport = {};
  for (const p of singles) {
    if (!bySport[p.sport]) bySport[p.sport] = [];
    bySport[p.sport].push(p);
  }
  const sortPicks = arr => [...arr].sort((a,b) => (a.result?0:1) - (b.result?0:1));

  const dateLabel = pickKey === todayKey
    ? new Date().toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' }).toUpperCase()
    : new Date(yesterdayKey + 'T12:00:00').toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' }).toUpperCase();

  const renderStatusBar = () => {
    if (checkStatus === 'apiError')
      return <div style={{background:'rgba(255,160,0,.1)',border:'1px solid rgba(255,160,0,.4)',borderRadius:5,padding:'8px 14px',marginBottom:12,fontSize:12,color:'var(--yellow)'}}>⚠ API credits low — mark results manually</div>;
    if (checkStatus?.type === 'allDone')
      return <div style={{background:'rgba(0,255,65,.08)',border:'1px solid rgba(0,255,65,.3)',borderRadius:5,padding:'8px 14px',marginBottom:12,fontSize:12,color:'var(--green)'}}>✅ All results in — {checkStatus.w} wins, {checkStatus.l} losses, {checkStatus.p} pushes</div>;
    if (checkStatus === 'checking')
      return <div style={{background:'rgba(0,180,255,.07)',border:'1px solid rgba(0,180,255,.25)',borderRadius:5,padding:'8px 14px',marginBottom:12,fontSize:12,color:'#64b4ff',display:'flex',alignItems:'center',gap:8}}><span style={{animation:'spin 1s linear infinite',display:'inline-block'}}>🔄</span> Checking results...</div>;
    return null;
  };

  return (
    <div>
      <div className="section-header">
        <div>
          <div className="section-title">TODAY'S PICKS — {dateLabel}</div>
          <div style={{display:'flex',gap:12,flexWrap:'wrap',marginTop:3}}>
            <span style={{fontSize:11,color:inWindow?'var(--green)':'var(--text-dim)'}}>
              {inWindow ? '🟢 Auto-check active (9PM–2AM)' : '⏰ Auto-check window: 9PM–2AM'}
            </span>
            {lastChecked && <span style={{fontSize:11,color:'var(--text-dim)'}}>Last checked: {lastChecked}</span>}
            {pending > 0 && !inWindow && <span style={{fontSize:11,color:'var(--yellow)'}}>· {pending} pending</span>}
          </div>
        </div>
        <button className="btn" onClick={() => doCheck(false)} disabled={checking}>
          {checking ? '⏳ Checking...' : '↺ Check Results Now'}
        </button>
      </div>

      {renderStatusBar()}

      {cleared && (
        <div style={{background:'rgba(0,255,65,.05)',border:'1px solid rgba(0,255,65,.2)',borderRadius:5,padding:'10px 14px',marginBottom:12,fontSize:12,color:'var(--green)'}}>
          Refreshed for new day — waiting for today's picks.
        </div>
      )}

      {/* Summary bar */}
      {singles.length > 0 && (
        <div className="yesterday-summary">
          <div className="ys-stat"><div className="ys-stat-val">{singles.length}</div><div className="ys-stat-lbl">Total Picks</div></div>
          <div className="ys-stat"><div className="ys-stat-val" style={{color:'var(--green)'}}>{wins}</div><div className="ys-stat-lbl">Wins</div></div>
          <div className="ys-stat"><div className="ys-stat-val" style={{color:'var(--red)'}}>{losses}</div><div className="ys-stat-lbl">Losses</div></div>
          <div className="ys-stat"><div className="ys-stat-val" style={{color:'var(--text-dim)'}}>{pushes}</div><div className="ys-stat-lbl">Pushes</div></div>
          <div className="ys-stat"><div className="ys-stat-val" style={{color:'var(--yellow)'}}>{pending}</div><div className="ys-stat-lbl">Pending</div></div>
          {hitRate && <div className="ys-stat"><div className="ys-stat-val" style={{color:parseFloat(hitRate)>=55?'var(--green)':'var(--red)'}}>{hitRate}%</div><div className="ys-stat-lbl">Hit Rate</div></div>}
        </div>
      )}

      {/* Singles grouped by sport */}
      {Object.keys(bySport).length > 0 && (
        <div className="card">
          <div style={{fontSize:11,color:'var(--green)',fontWeight:900,letterSpacing:1,marginBottom:10,textTransform:'uppercase'}}>Single Picks</div>
          {Object.entries(bySport).map(([sport, picks]) => (
            <div key={sport}>
              <div className="ys-sport-label">{sport}</div>
              {sortPicks(picks).map(p => (
                <div key={p.id} className="ys-pick-row">
                  <div className="ys-game">{p.game}</div>
                  <span className={`badge ${p.slot==='VEGAS'?'badge-vegas':'badge-public'}`}>{p.slot||'?'}</span>
                  <span className="badge badge-dim" style={{fontSize:9}}>{(p.pick_type||'').toUpperCase()}</span>
                  {p.is_value_dog && <span style={{background:'#ffd700',color:'#000',fontWeight:800,fontSize:8,padding:'1px 5px',borderRadius:2}}>💰 VALUE DOG</span>}
                  <div className="ys-pick">{p.pick_display}</div>
                  <div className="ys-meta">{fmtOdds(p.odds)}</div>
                  <ResultBadge result={p.result} />
                </div>
              ))}
            </div>
          ))}
        </div>
      )}

      {/* Parlays */}
      {parlays.length > 0 && (
        <div>
          <div style={{fontSize:11,color:'var(--green)',fontWeight:900,letterSpacing:1,margin:'16px 0 10px',textTransform:'uppercase'}}>Parlay Slips</div>
          {[...parlays].sort((a,b) => (a.result?0:1)-(b.result?0:1)).map(slip => (
            <div key={slip.id} className="ys-parlay-card">
              <div className="ys-parlay-header">
                <div className="ys-parlay-type">{slip.type}</div>
                <div className="ys-parlay-result" style={{color: slip.result==='WIN'?'var(--green)':slip.result==='LOSS'?'var(--red)':'var(--yellow)'}}>
                  {slip.result || 'PENDING'}
                </div>
              </div>
              {(slip.legs || []).map(leg => (
                <div key={leg.id} className="ys-leg">
                  <div className="ys-leg-pick">{leg.pick}</div>
                  <div className="ys-leg-game">{leg.awayTeam} @ {leg.homeTeam}</div>
                  <ResultBadge result={leg.result} />
                </div>
              ))}
            </div>
          ))}
        </div>
      )}

      {singles.length === 0 && parlays.length === 0 && !cleared && (
        <div className="empty-state">
          <div className="empty-icon">📋</div>
          <div>No picks yet for today</div>
          <div style={{marginTop:6,fontSize:11,color:'var(--text-dim)'}}>Picks are automatically saved when you generate them on any sport tab. Auto-check runs 9PM–2AM.</div>
        </div>
      )}
    </div>
  );
}

// ─── PERFORMANCE VIEW ─────────────────────────────────────────────────────────

function PerformanceView({ history, parlayHistory, onMarkResult, onClearHistory }) {
  // Read pre-computed learning_stats for fast access
  const ls = (() => { try { return JSON.parse(localStorage.getItem('learning_stats') || '{}'); } catch { return {}; } })();
  const ov = ls.overall || { wins:0, losses:0, pushes:0 };

  // Fallback: also compute from live history for recency data
  const allSettled = history.filter(p => p.result && p.result !== 'P' && p.result !== 'UNRESOLVED');
  const wins    = allSettled.filter(p => p.result === 'W').length;
  const losses  = allSettled.filter(p => p.result === 'L').length;
  const pushes  = history.filter(p => p.result === 'P').length;
  const pending = history.filter(p => !p.result).length;
  const total   = wins + losses;
  const overallPct = total > 0 ? Math.round((wins / total) * 100) : null;

  const now = Date.now();
  const last7d  = allSettled.filter(p => (now - new Date(p.generated_at).getTime()) < 7*86400000);
  const last30d = allSettled.filter(p => (now - new Date(p.generated_at).getTime()) < 30*86400000);
  const w7  = last7d.filter(p => p.result === 'W').length,  l7  = last7d.filter(p => p.result === 'L').length;
  const w30 = last30d.filter(p => p.result === 'W').length, l30 = last30d.filter(p => p.result === 'L').length;

  // Current streak
  const chron = [...history].sort((a,b) => new Date(a.generated_at)-new Date(b.generated_at));
  const settledChron = chron.filter(p => p.result === 'W' || p.result === 'L');
  let streak = 0, streakType = null;
  for (let i = settledChron.length - 1; i >= 0; i--) {
    const r = settledChron[i].result;
    if (!streakType) { streakType = r; streak = 1; }
    else if (r === streakType) streak++;
    else break;
  }

  // Value dog stats
  const valueDogPicks = allSettled.filter(p => p.is_value_dog || (p.systems||[]).includes('VALUE DOG'));
  const vdW = valueDogPicks.filter(p => p.result === 'W').length;
  const vdL = valueDogPicks.filter(p => p.result === 'L').length;

  // Recent 20 picks
  const recent20 = [...history].reverse().slice(0, 20);

  const wr = (s) => {
    if (!s) return null;
    const w = s.wins || 0, l = s.losses || 0;
    if (w + l === 0) return null;
    return Math.round((w / (w + l)) * 100);
  };
  const wrStr = (s) => {
    const r = wr(s);
    return r !== null ? `${r}%` : '—';
  };
  const wrColor = (pct) => {
    if (pct === null) return 'var(--text-dim)';
    if (pct >= 70) return 'var(--green)';
    if (pct >= 55) return '#64b4ff';
    if (pct >= 45) return 'var(--yellow)';
    return 'var(--red)';
  };
  const sysStatus = (pct) => {
    if (pct === null) return null;
    if (pct >= 75) return { label: '✅ HIGH CONFIDENCE', color: 'var(--green)' };
    if (pct >= 50) return { label: '⚠️ NEUTRAL', color: 'var(--yellow)' };
    return { label: '❌ REDUCE WEIGHT', color: 'var(--red)' };
  };

  // Trend: compare last 10 vs overall
  const trendFor = (sport) => {
    const sportPicks = allSettled.filter(p => p.sport === sport);
    const last10 = sportPicks.slice(-10);
    if (last10.length < 5) return null;
    const l10w = last10.filter(p => p.result === 'W').length;
    const l10pct = Math.round((l10w / last10.length) * 100);
    const allW = sportPicks.filter(p => p.result === 'W').length;
    const allPct = sportPicks.length > 0 ? Math.round((allW / sportPicks.length) * 100) : 0;
    return l10pct > allPct + 5 ? '↑' : l10pct < allPct - 5 ? '↓' : '→';
  };

  const DAY_ORDER = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const ODDS_RANGE_ORDER = ['heavy_fav','fav','pick_em','dog','big_dog'];
  const ODDS_RANGE_LABELS = { heavy_fav:'Heavy Fav (≤-151)', fav:'Fav (-150 to -110)', pick_em:"Pick'em", dog:'Dog (+110–+350)', big_dog:'Big Dog (+351+)' };

  return (
    <div>
      <div className="section-header">
        <div>
          <div className="section-title">SYSTEM LEARNING DASHBOARD</div>
          <div className="section-subtitle">Track GOAT system accuracy · Target: 90% hit rate</div>
        </div>
        <button className="btn" onClick={onClearHistory} style={{color:'var(--red)',borderColor:'rgba(255,68,102,0.3)'}}>
          Clear History
        </button>
      </div>

      {/* Hit rate progress bar */}
      <div className="perf-target-bar">
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
          <span style={{fontSize:11,color:'var(--text-mid)'}}>Hit Rate: <strong style={{color:wrColor(overallPct)}}>{overallPct !== null ? `${overallPct}%` : '—'}</strong></span>
          <span style={{fontSize:11,color:'var(--text-dim)'}}>Goal: 90%</span>
        </div>
        <ProgressBar value={overallPct||0} colorClass={barColor(overallPct||0)} height={10} />
        <div style={{display:'flex',justifyContent:'space-between',marginTop:4,fontSize:10,color:'var(--text-dim)'}}>
          <span>{wins}W – {losses}L – {pushes}P · {pending} pending</span>
          <span>Target: 90%</span>
        </div>
      </div>

      {/* SECTION 1 — OVERALL PERFORMANCE */}
      <div className="perf-grid" style={{marginBottom:16}}>
        <div className="perf-card">
          <div className="perf-card-label">Overall</div>
          <div className="perf-card-value" style={{color:wrColor(overallPct)}}>{overallPct !== null ? `${overallPct}%` : '—'}</div>
          <div className="perf-card-sub">{wins}W – {losses}L</div>
        </div>
        <div className="perf-card">
          <div className="perf-card-label">Last 7 Days</div>
          <div className="perf-card-value" style={{color:wrColor(w7+l7>0?Math.round((w7/(w7+l7))*100):null)}}>
            {w7+l7 > 0 ? `${Math.round((w7/(w7+l7))*100)}%` : '—'}
          </div>
          <div className="perf-card-sub">{w7}W – {l7}L</div>
        </div>
        <div className="perf-card">
          <div className="perf-card-label">Last 30 Days</div>
          <div className="perf-card-value" style={{color:wrColor(w30+l30>0?Math.round((w30/(w30+l30))*100):null)}}>
            {w30+l30 > 0 ? `${Math.round((w30/(w30+l30))*100)}%` : '—'}
          </div>
          <div className="perf-card-sub">{w30}W – {l30}L</div>
        </div>
        <div className="perf-card">
          <div className="perf-card-label">Current Streak</div>
          <div className="perf-card-value" style={{color:streakType==='W'?'var(--green)':streakType==='L'?'var(--red)':'var(--text-dim)'}}>
            {streak > 0 ? `${streak}${streakType}` : '—'}
          </div>
          <div className="perf-card-sub">{streakType==='W'?'Win streak 🔥':streakType==='L'?'Loss streak ❄':'No data'}</div>
        </div>
        <div className="perf-card">
          <div className="perf-card-label">Total Tracked</div>
          <div className="perf-card-value" style={{color:'var(--text-bright)'}}>{total + pushes}</div>
          <div className="perf-card-sub">picks · {pending} pending</div>
        </div>
        <div className="perf-card">
          <div className="perf-card-label">Value Dogs</div>
          <div className="perf-card-value" style={{color:'#ffd700'}}>{vdW+vdL>0?`${Math.round((vdW/(vdW+vdL))*100)}%`:'—'}</div>
          <div className="perf-card-sub">{vdW}W – {vdL}L</div>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:12,marginBottom:16}}>

        {/* SECTION 2 — BY SPORT */}
        {Object.keys(ls.bySport||{}).length > 0 && (
          <div className="card">
            <div style={{fontSize:10,color:'var(--green)',fontWeight:900,letterSpacing:1,marginBottom:10,textTransform:'uppercase'}}>By Sport</div>
            <table className="perf-table" style={{width:'100%'}}>
              <thead><tr><th>Sport</th><th>W</th><th>L</th><th>P</th><th>Rate</th><th>Trend</th></tr></thead>
              <tbody>
                {Object.entries(ls.bySport).sort((a,b) => (b[1].wins+b[1].losses)-(a[1].wins+a[1].losses)).map(([sport, s]) => {
                  const rate = wr(s);
                  const trend = trendFor(sport);
                  return (
                    <tr key={sport}>
                      <td style={{color:'var(--text-bright)'}}>{sport}</td>
                      <td style={{color:'var(--green)'}}>{s.wins}</td>
                      <td style={{color:'var(--red)'}}>{s.losses}</td>
                      <td style={{color:'var(--text-dim)'}}>{s.pushes||0}</td>
                      <td style={{color:wrColor(rate)}}>{wrStr(s)}</td>
                      <td style={{color: trend==='↑'?'var(--green)':trend==='↓'?'var(--red)':'var(--text-dim)',fontWeight:700}}>{trend||'—'}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}

        {/* SECTION 3 — VEGAS vs PUBLIC */}
        <div className="card">
          <div style={{fontSize:10,color:'var(--green)',fontWeight:900,letterSpacing:1,marginBottom:10,textTransform:'uppercase'}}>Vegas vs Public</div>
          {['VEGAS','PUBLIC'].map(slot => {
            const s = ls.bySlot?.[slot];
            const rate = wr(s);
            const w7slot = last7d.filter(p => (p.slot||'PUBLIC')===slot && p.result==='W').length;
            const l7slot = last7d.filter(p => (p.slot||'PUBLIC')===slot && p.result==='L').length;
            return (
              <div key={slot} style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:4,padding:'10px 12px',marginBottom:8}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                  <span className={slot==='VEGAS'?'badge badge-vegas':'badge badge-public'}>{slot}</span>
                  <span style={{fontSize:18,fontWeight:900,color:wrColor(rate)}}>{wrStr(s)}</span>
                </div>
                <div style={{fontSize:10,color:'var(--text-dim)'}}>All-time: {s?.wins||0}W – {s?.losses||0}L</div>
                <div style={{fontSize:10,color:'var(--text-dim)'}}>Last 7d: {w7slot}W – {l7slot}L</div>
                {s && <div style={{marginTop:6}}><ProgressBar value={rate||0} colorClass={barColor(rate||0)} height={4} /></div>}
              </div>
            );
          })}
        </div>

        {/* SECTION 4 — SYSTEM PERFORMANCE */}
        {Object.keys(ls.bySystem||{}).length > 0 && (
          <div className="card">
            <div style={{fontSize:10,color:'var(--green)',fontWeight:900,letterSpacing:1,marginBottom:10,textTransform:'uppercase'}}>System Performance</div>
            <table className="perf-table" style={{width:'100%'}}>
              <thead><tr><th>System</th><th>W</th><th>L</th><th>Rate</th><th>Status</th></tr></thead>
              <tbody>
                {Object.entries(ls.bySystem)
                  .filter(([,s]) => (s.wins+s.losses) >= 3)
                  .sort((a,b) => (wr(b[1])||0)-(wr(a[1])||0))
                  .map(([sys, s]) => {
                    const rate = wr(s);
                    const st = sysStatus(rate);
                    return (
                      <tr key={sys}>
                        <td style={{color:'var(--text-bright)',maxWidth:100,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{sys}</td>
                        <td style={{color:'var(--green)'}}>{s.wins}</td>
                        <td style={{color:'var(--red)'}}>{s.losses}</td>
                        <td style={{color:wrColor(rate)}}>{wrStr(s)}</td>
                        <td style={{color:st?.color||'var(--text-dim)',fontSize:9,whiteSpace:'nowrap'}}>{st?.label||'—'}</td>
                      </tr>
                    );
                  })}
              </tbody>
            </table>
          </div>
        )}

        {/* SECTION 5 — PICK TYPE PERFORMANCE */}
        {Object.keys(ls.byPickType||{}).length > 0 && (
          <div className="card">
            <div style={{fontSize:10,color:'var(--green)',fontWeight:900,letterSpacing:1,marginBottom:10,textTransform:'uppercase'}}>Pick Type Performance</div>
            {['spread','total','moneyline'].map(pt => {
              const s = ls.byPickType?.[pt];
              if (!s || s.wins + s.losses === 0) return null;
              const rate = wr(s);
              return (
                <div key={pt} style={{marginBottom:10}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>
                    <span style={{fontSize:11,color:'var(--text-bright)',fontWeight:700,textTransform:'uppercase'}}>{pt}</span>
                    <span style={{fontSize:14,fontWeight:900,color:wrColor(rate)}}>{wrStr(s)}</span>
                  </div>
                  <div style={{fontSize:10,color:'var(--text-dim)',marginBottom:3}}>{s.wins}W – {s.losses}L – {s.pushes||0}P</div>
                  <ProgressBar value={rate||0} colorClass={barColor(rate||0)} height={4} />
                </div>
              );
            })}
          </div>
        )}

        {/* SECTION 6 — DAILY HISTORY */}
        {(ls.dailyHistory||[]).length > 0 && (
          <div className="card">
            <div style={{fontSize:10,color:'var(--green)',fontWeight:900,letterSpacing:1,marginBottom:10,textTransform:'uppercase'}}>Daily History</div>
            <div className="perf-table-wrap" style={{maxHeight:200,overflowY:'auto'}}>
              <table className="perf-table" style={{width:'100%'}}>
                <thead><tr><th>Date</th><th>W</th><th>L</th><th>P</th><th>Rate</th></tr></thead>
                <tbody>
                  {[...(ls.dailyHistory)].reverse().map(d => (
                    <tr key={d.date}>
                      <td style={{color:'var(--text-dim)',fontSize:10}}>{d.date}</td>
                      <td style={{color:'var(--green)'}}>{d.wins}</td>
                      <td style={{color:'var(--red)'}}>{d.losses}</td>
                      <td style={{color:'var(--text-dim)'}}>{d.pushes||0}</td>
                      <td style={{color:wrColor(d.hitRate)}}>{d.hitRate !== null ? `${d.hitRate}%` : '—'}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* Day of week */}
        {Object.keys(ls.byDay||{}).length > 0 && (
          <div className="card">
            <div style={{fontSize:10,color:'var(--green)',fontWeight:900,letterSpacing:1,marginBottom:10,textTransform:'uppercase'}}>By Day of Week</div>
            <table className="perf-table" style={{width:'100%'}}>
              <thead><tr><th>Day</th><th>W</th><th>L</th><th>Rate</th></tr></thead>
              <tbody>
                {DAY_ORDER.filter(d => ls.byDay[d]).map(d => {
                  const s = ls.byDay[d];
                  const rate = wr(s);
                  return (
                    <tr key={d}>
                      <td style={{color:'var(--text-bright)'}}>{d}</td>
                      <td style={{color:'var(--green)'}}>{s.wins}</td>
                      <td style={{color:'var(--red)'}}>{s.losses}</td>
                      <td style={{color:wrColor(rate)}}>{wrStr(s)}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}

        {/* Odds range */}
        {Object.keys(ls.byOddsRange||{}).length > 0 && (
          <div className="card">
            <div style={{fontSize:10,color:'var(--green)',fontWeight:900,letterSpacing:1,marginBottom:10,textTransform:'uppercase'}}>By Odds Range</div>
            <table className="perf-table" style={{width:'100%'}}>
              <thead><tr><th>Range</th><th>W</th><th>L</th><th>Rate</th></tr></thead>
              <tbody>
                {ODDS_RANGE_ORDER.filter(r => ls.byOddsRange[r]).map(r => {
                  const s = ls.byOddsRange[r];
                  const rate = wr(s);
                  return (
                    <tr key={r}>
                      <td style={{color:'var(--text-bright)',fontSize:10}}>{ODDS_RANGE_LABELS[r]}</td>
                      <td style={{color:'var(--green)'}}>{s.wins}</td>
                      <td style={{color:'var(--red)'}}>{s.losses}</td>
                      <td style={{color:wrColor(rate)}}>{wrStr(s)}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}

        {/* SECTION 9 — VALUE DOG TRACKING */}
        {(vdW + vdL) > 0 && (
          <div className="card">
            <div style={{fontSize:10,color:'#ffd700',fontWeight:900,letterSpacing:1,marginBottom:10,textTransform:'uppercase'}}>💰 Value Dog Tracking</div>
            <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:10}}>
              <div className="perf-card" style={{flex:1,minWidth:80}}>
                <div className="perf-card-label">Win Rate</div>
                <div className="perf-card-value" style={{color:vdW+vdL>0?wrColor(Math.round((vdW/(vdW+vdL))*100)):'var(--text-dim)'}}>{vdW+vdL>0?`${Math.round((vdW/(vdW+vdL))*100)}%`:'—'}</div>
                <div className="perf-card-sub">{vdW}W – {vdL}L</div>
              </div>
              <div className="perf-card" style={{flex:1,minWidth:80}}>
                <div className="perf-card-label">vs Overall</div>
                <div className="perf-card-value" style={{color:overallPct!==null&&vdW+vdL>0&&Math.round((vdW/(vdW+vdL))*100)>overallPct?'var(--green)':'var(--red)'}}>
                  {overallPct !== null && vdW+vdL > 0 ? (Math.round((vdW/(vdW+vdL))*100) > overallPct ? '↑ Beating' : '↓ Below') : '—'}
                </div>
                <div className="perf-card-sub">overall avg: {overallPct||'—'}%</div>
              </div>
            </div>
            <div style={{fontSize:11,color:'var(--text-dim)'}}>Plus-money underdog picks flagged as mispriced by the system</div>
          </div>
        )}
      </div>

      {/* SECTION 7 — RECENT PICKS */}
      {recent20.length > 0 && (
        <div className="card" style={{marginBottom:16}}>
          <div style={{fontSize:10,color:'var(--green)',fontWeight:900,letterSpacing:1,marginBottom:10,textTransform:'uppercase'}}>Recent Picks (last 20)</div>
          <div className="perf-table-wrap" style={{maxHeight:320,overflowY:'auto'}}>
            <table className="perf-table" style={{width:'100%'}}>
              <thead>
                <tr>
                  <th>Game</th><th>Type</th><th>Pick</th><th>Odds</th><th>Slot</th><th>Systems</th><th>Result</th>
                </tr>
              </thead>
              <tbody>
                {recent20.map(p => (
                  <tr key={p.id}>
                    <td style={{color:'var(--text-dim)',fontSize:9,maxWidth:100,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.game||'—'}</td>
                    <td><span className="badge badge-dim" style={{fontSize:8}}>{p.pick_type||'?'}</span></td>
                    <td style={{color:'var(--text-bright)',fontSize:10,maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.pick_display||'—'}</td>
                    <td style={{color:'var(--text-mid)'}}>{fmtOdds(p.odds)}</td>
                    <td><span className={p.slot==='VEGAS'?'badge badge-vegas':'badge badge-public'} style={{fontSize:8}}>{p.slot||'?'}</span></td>
                    <td style={{fontSize:8,color:'var(--text-dim)',maxWidth:80,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                      {p.is_value_dog && <span style={{color:'#ffd700',fontWeight:700}}>💰 </span>}
                      {(p.systems||[]).filter(s => s !== 'VALUE DOG').slice(0,2).join(', ')||'—'}
                    </td>
                    <td>
                      {!p.result && <span style={{color:'var(--text-dim)',fontSize:9}}>Pending</span>}
                      {p.result === 'W' && <span style={{color:'var(--green)',fontWeight:700,fontSize:9}}>✓ WIN</span>}
                      {p.result === 'L' && <span style={{color:'var(--red)',fontWeight:700,fontSize:9}}>✗ LOSS</span>}
                      {p.result === 'P' && <span style={{color:'var(--yellow)',fontSize:9}}>≈ PUSH</span>}
                      {p.result === 'UNRESOLVED' && <span style={{color:'var(--text-dim)',fontSize:9}}>N/A</span>}
                      {!p.result && (
                        <span style={{display:'inline-flex',gap:2,marginLeft:4}}>
                          {['W','L','P'].map(r => (
                            <button key={r} className="result-btn" style={{fontSize:8,padding:'1px 4px'}}
                              onClick={() => onMarkResult(p.id, r)}>{r}</button>
                          ))}
                        </span>
                      )}
                      {p.result && p.result !== 'UNRESOLVED' && (
                        <button className="result-btn" style={{marginLeft:3,fontSize:8,padding:'1px 4px'}}
                          onClick={() => onMarkResult(p.id, null)}>✕</button>
                      )}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* SECTION 8 — LEARNING PROGRESS MESSAGE */}
      {total >= 5 && (() => {
        const pct = overallPct || 0;
        const TARGET = 90;
        const onTrack = pct >= TARGET;
        const winsNeeded = onTrack ? 0 : Math.ceil((TARGET/100 * total - wins) / (1 - TARGET/100));
        const recentRate = w30+l30>0 ? Math.round((w30/(w30+l30))*100) : pct;
        const trending = recentRate > pct + 5 ? '↑ improving' : recentRate < pct - 5 ? '↓ declining' : '→ stable';
        const trendColor = recentRate > pct + 5 ? 'var(--green)' : recentRate < pct - 5 ? 'var(--red)' : 'var(--text-mid)';

        const sysSorted = Object.entries(ls.bySystem||{}).filter(([,s]) => s.wins+s.losses >= 5).sort((a,b) => (wr(b[1])||0)-(wr(a[1])||0));
        const bestSys  = sysSorted[0];
        const worstSys = sysSorted[sysSorted.length-1];

        return (
          <div className="card" style={{marginBottom:16}}>
            <div style={{fontSize:10,color:'var(--green)',fontWeight:900,letterSpacing:1,marginBottom:10,textTransform:'uppercase'}}>Learning Progress</div>
            <div style={{fontSize:13,color:'var(--text-bright)',lineHeight:1.7,marginBottom:10}}>
              The system has made <strong style={{color:'var(--green)'}}>{total}</strong> picks and achieved{' '}
              <strong style={{color:wrColor(pct)}}>{pct}%</strong> accuracy.{' '}
              {onTrack
                ? <span style={{color:'var(--green)'}}>✅ 90% target achieved!</span>
                : <span>At current trajectory, <strong style={{color:'var(--yellow)'}}>{winsNeeded} more wins</strong> needed to reach 90% goal.</span>
              }
            </div>
            {bestSys && (
              <div style={{fontSize:12,color:'var(--text-mid)',marginBottom:4}}>
                Best performing system: <strong style={{color:'var(--green)'}}>{bestSys[0]}</strong> at {wrStr(bestSys[1])} ({bestSys[1].wins+bestSys[1].losses} picks)
              </div>
            )}
            {worstSys && worstSys[0] !== bestSys?.[0] && (
              <div style={{fontSize:12,color:'var(--text-mid)',marginBottom:8}}>
                Weakest system: <strong style={{color:'var(--red)'}}>{worstSys[0]}</strong> at {wrStr(worstSys[1])} — currently reducing weight
              </div>
            )}
            <div style={{display:'flex',gap:16,flexWrap:'wrap',marginBottom:10}}>
              <span style={{fontSize:11,color:'var(--text-dim)'}}>30-day rate: <span style={{color:trendColor,fontWeight:700}}>{w30+l30>0?`${recentRate}%`:'N/A'}</span> <span style={{color:trendColor,fontSize:10}}>{trending}</span></span>
              <span style={{fontSize:11,color:'var(--text-dim)'}}>All-time: {wins}W – {losses}L – {pushes}P</span>
            </div>
            <ProgressBar value={pct} colorClass={barColor(pct)} height={8} />
            <div style={{display:'flex',justifyContent:'space-between',marginTop:4,fontSize:10,color:'var(--text-dim)'}}>
              <span>Current: {pct}%</span><span>Target: {TARGET}%</span>
            </div>
          </div>
        );
      })()}

      {/* SECTION 10 — PROFITABILITY ANALYSIS */}
      {allSettled.length >= 3 && (() => {
        const flatBet = 100;
        const plPicks = allSettled.filter(p => typeof p.odds === 'number');
        const calcPL = (p) => {
          if (p.result === 'W') return p.odds > 0 ? flatBet * (p.odds / 100) : flatBet * (100 / Math.abs(p.odds));
          if (p.result === 'P') return 0;
          return -flatBet;
        };
        const totalPL = plPicks.reduce((sum, p) => sum + calcPL(p), 0);
        const totalInvested = plPicks.length * flatBet;
        const roi = totalInvested > 0 ? (totalPL / totalInvested * 100) : 0;
        const roiColor = roi >= 5 ? 'var(--green)' : roi >= 0 ? '#64b4ff' : 'var(--red)';

        // By confidence tier (ai_strength: 80-100, 60-79, 40-59, <40)
        const tiers = [
          { label: 'Confidence 80-100 (8-10)', min: 80, max: 100 },
          { label: 'Confidence 60-79 (6-7)',   min: 60, max: 79  },
          { label: 'Confidence 40-59 (4-5)',   min: 40, max: 59  },
          { label: 'Confidence <40 (1-3)',      min: 0,  max: 39  },
        ];
        const tierStats = tiers.map(t => {
          const tp = plPicks.filter(p => (p.ai_strength||p.confidence||50) >= t.min && (p.ai_strength||p.confidence||50) <= t.max);
          const tpl = tp.reduce((sum, p) => sum + calcPL(p), 0);
          const tinv = tp.length * flatBet;
          const troi = tinv > 0 ? (tpl / tinv * 100) : null;
          return { ...t, count: tp.length, pl: tpl, roi: troi };
        }).filter(t => t.count > 0);

        // By sport P/L
        const sportPL = {};
        plPicks.forEach(p => {
          if (!sportPL[p.sport]) sportPL[p.sport] = { pl: 0, count: 0 };
          sportPL[p.sport].pl += calcPL(p);
          sportPL[p.sport].count++;
        });

        return (
          <div style={{marginBottom:20}}>
            <div style={{fontSize:10,fontWeight:900,letterSpacing:2,color:'var(--text-dim)',textTransform:'uppercase',marginBottom:10,paddingBottom:4,borderBottom:'1px solid var(--border)'}}>
              💰 SECTION 10 — PROFITABILITY ANALYSIS ($100 flat bet)
            </div>
            {/* Summary row */}
            <div className="perf-grid" style={{marginBottom:12}}>
              <div className="perf-card">
                <div className="perf-card-label">Total Invested</div>
                <div className="perf-card-value">${totalInvested.toLocaleString()}</div>
                <div className="perf-card-sub">{plPicks.length} picks</div>
              </div>
              <div className="perf-card">
                <div className="perf-card-label">Net P/L</div>
                <div className="perf-card-value" style={{color:roiColor}}>{totalPL >= 0 ? '+' : ''}${totalPL.toFixed(0)}</div>
                <div className="perf-card-sub">{plPicks.filter(p=>calcPL(p)>0).length}W · {plPicks.filter(p=>calcPL(p)<0).length}L</div>
              </div>
              <div className="perf-card">
                <div className="perf-card-label">ROI</div>
                <div className="perf-card-value" style={{color:roiColor}}>{roi >= 0 ? '+' : ''}{roi.toFixed(1)}%</div>
                <div className="perf-card-sub">Flat $100 / pick</div>
              </div>
            </div>

            {/* By confidence tier */}
            {tierStats.length > 0 && (
              <div style={{marginBottom:12}}>
                <div style={{fontSize:10,color:'var(--text-dim)',marginBottom:6,fontWeight:700}}>ROI by Confidence Tier</div>
                <div style={{display:'flex',flexDirection:'column',gap:4}}>
                  {tierStats.map(t => {
                    const tc = t.roi == null ? 'var(--text-dim)' : t.roi >= 5 ? 'var(--green)' : t.roi >= 0 ? '#64b4ff' : 'var(--red)';
                    return (
                      <div key={t.label} style={{display:'flex',justifyContent:'space-between',alignItems:'center',background:'rgba(255,255,255,0.02)',borderRadius:4,padding:'5px 10px'}}>
                        <span style={{fontSize:11,color:'var(--text-mid)'}}>{t.label}</span>
                        <span style={{fontSize:11,fontWeight:700,color:tc}}>
                          {t.roi != null ? `${t.roi >= 0 ? '+' : ''}${t.roi.toFixed(1)}% ROI` : '—'} · {t.count} picks · {t.pl >= 0 ? '+' : ''}${t.pl.toFixed(0)}
                        </span>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* By sport P/L */}
            <div style={{fontSize:10,color:'var(--text-dim)',marginBottom:6,fontWeight:700}}>P/L by Sport</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
              {Object.entries(sportPL).sort((a,b) => b[1].pl - a[1].pl).map(([sport, s]) => {
                const spoiColor = s.pl >= 0 ? 'var(--green)' : 'var(--red)';
                return (
                  <div key={sport} style={{background:'rgba(255,255,255,0.02)',border:'1px solid var(--border)',borderRadius:4,padding:'5px 10px',minWidth:110,textAlign:'center'}}>
                    <div style={{fontSize:10,color:'var(--text-dim)',marginBottom:2}}>{sport}</div>
                    <div style={{fontSize:12,fontWeight:700,color:spoiColor}}>{s.pl >= 0 ? '+' : ''}${s.pl.toFixed(0)}</div>
                    <div style={{fontSize:9,color:'var(--text-dim)'}}>{s.count} picks</div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

      {history.length === 0 && (
        <div className="empty-state">
          <div className="empty-icon">📊</div>
          <div>No picks tracked yet.</div>
          <div style={{marginTop:6,fontSize:11,color:'var(--text-dim)'}}>Generate picks on any sport tab, then mark results to build your learning database.</div>
        </div>
      )}
    </div>
  );
}

function InjuriesView({ sport }) {
  const [items, setItems]   = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError]   = useState('');
  const [filter, setFilter] = useState('');

  const leagueKey = ROTOWIRE_MAP[sport.league];

  const load = useCallback(() => {
    if (!leagueKey) { setItems([]); return; }
    setLoading(true);
    setError('');
    apiFetch(`/api/injuries?sport=${leagueKey}`)
      .then(d => setItems(d.items || []))
      .catch(e => setError(e.message))
      .finally(() => setLoading(false));
  }, [leagueKey]);

  useEffect(() => { load(); }, [load]);

  const filtered = items.filter(i =>
    !filter || (i.title + i.description).toLowerCase().includes(filter.toLowerCase())
  );

  const timeAgo = (d) => {
    const m = Math.floor((Date.now() - new Date(d)) / 60000);
    if (m < 60) return `${m}m ago`;
    const h = Math.floor(m/60);
    if (h < 24) return `${h}h ago`;
    return `${Math.floor(h/24)}d ago`;
  };

  return (
    <div>
      <div className="section-header">
        <div>
          <div className="section-title">{sport.label} News &amp; Injuries</div>
          <div className="section-subtitle">Via Rotowire</div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <input className="filter-input" placeholder="Filter player / team..."
            value={filter} onChange={e => setFilter(e.target.value)} />
          <button className="btn" onClick={load}>↺</button>
          <span className="badge badge-dim">{filtered.length}</span>
        </div>
      </div>

      {!leagueKey && (
        <div className="no-games">No injury feed available for {sport.label}.</div>
      )}
      {error && <div className="error-box">⚠ {error}</div>}
      {loading && <div className="loading-row"><Spinner /><span>Loading injury news...</span></div>}

      {!loading && filtered.length === 0 && leagueKey && !error && (
        <div className="empty-state"><div className="empty-icon">🏥</div>No news found.</div>
      )}

      <div style={{maxHeight:'70vh',overflowY:'auto'}}>
        {filtered.map((item, i) => (
          <div key={i} className="injury-card fade-in">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
              <div className="injury-title">{item.title}</div>
              <span style={{fontSize:10,color:'var(--text-dim)',flexShrink:0}}>{item.pubDate ? timeAgo(item.pubDate) : ''}</span>
            </div>
            {item.description && (
              <div className="injury-desc" dangerouslySetInnerHTML={{__html: item.description.replace(/<[^>]+>/g,'')}} />
            )}
            {item.link && (
              <a href={item.link} target="_blank" rel="noopener noreferrer"
                style={{fontSize:10,color:'var(--green)',display:'inline-block',marginTop:4}}>
                Full article →
              </a>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────

function App() {
  const [activeTab, setActiveTab]       = useState(SPORTS[0].key);
  const [gamesCache, setGamesCache]     = useState({});
  const [history, setHistory]           = useState(() => loadHistory());
  const [parlayHistory, setParlayHistory] = useState(() => loadParlayHistory());
  const [innerTab, setInnerTab]         = useState('picks'); // 'picks' | 'injuries'
  const [globalQuota, setGlobalQuota]   = useState(null);
  // Badge: tracks whether we're in the 9PM-2AM auto-check window
  const [reviewInWindow, setReviewInWindow] = useState(isInCheckWindow);
  const [reviewAllDone, setReviewAllDone]   = useState(false);

  // On mount: rotate yesterday's settled picks to permanent stats_history
  React.useEffect(() => { maybeRotateToStats(); }, []);

  // Update window badge every minute
  React.useEffect(() => {
    const t = setInterval(() => setReviewInWindow(isInCheckWindow()), 60_000);
    return () => clearInterval(t);
  }, []);

  const activeSport = SPORTS.find(s => s.key === activeTab);
  const isSpecialTab = activeTab === 'parlays' || activeTab === 'stats' || activeTab === 'yesterday';

  // Mark a pick result
  const handleMarkResult = useCallback((pickId, result) => {
    setHistory(prev => {
      const next = prev.map(p => p.id === pickId ? {...p, result} : p);
      saveHistory(next);
      saveLearningStats(next);
      return next;
    });
  }, []);

  // Called by YesterdayView after auto-checking: merges resolved results into history + updates learning stats
  const handleAutoResults = useCallback((updatedSingles) => {
    setHistory(prev => {
      const resultMap = new Map(
        updatedSingles.filter(p => p.result).map(p => [p.id, p.result])
      );
      if (resultMap.size === 0) return prev;
      const next = prev.map(p => resultMap.has(p.id) ? { ...p, result: resultMap.get(p.id) } : p);
      saveHistory(next);
      saveLearningStats(next);
      return next;
    });
    // Signal all-done badge if all resolved
    const allResolved = updatedSingles.every(p => p.result);
    if (allResolved && updatedSingles.length > 0) setReviewAllDone(true);
  }, []);

  // Mark a parlay result
  const handleMarkParlay = useCallback((parlayId, result) => {
    setParlayHistory(prev => {
      const existing = prev.find(p => p.id === parlayId);
      let next;
      if (existing) {
        next = prev.map(p => p.id === parlayId ? {...p, result} : p);
      } else {
        next = [...prev, { id: parlayId, result }];
      }
      saveParlayHistory(next);
      return next;
    });
  }, []);

  // When picks are generated, upsert them into history + save to daily picks key
  const handlePicksGenerated = useCallback((picks, sport) => {
    const nowIso = new Date().toISOString();
    const todayKey = getDailyKey();
    const newEntries = [];
    const dailySingles = [];

    for (const gp of picks) {
      const gameLabel = `${gp.away_team} @ ${gp.home_team}`;
      for (const ptype of ['spread','moneyline','total']) {
        const p = gp[ptype];
        if (!p) continue;
        const pickDisplay = ptype === 'total'
          ? `${p.direction} ${p.line}`
          : `${p.pick}`;
        const base = {
          id: `${gp.game_id}_${ptype}`,
          sport: sport.label,
          sport_key: sport.key,
          game_id: gp.game_id,
          game: gameLabel,
          away_team: gp.away_team,
          home_team: gp.home_team,
          commenceTime: gp.commence_time || null,
          dayName: getTodayName(),
          pick_type: ptype,
          pick_display: pickDisplay,
          odds: p.odds,
          slot: gp.game_slot,
          systems: p.systems || [],
          flags: p.systems || [],
          ai_strength: p.ai_strength,
          confidence: p.ai_strength || 50,
          oddsProb: p.odds ? Math.round(americanToImplied(p.odds)) : null,
          is_value_dog: (p.systems || []).includes('VALUE DOG'),
          generated_at: nowIso,
          result: null,
        };
        // Extra fields for auto result calculation
        if (ptype === 'spread') {
          base.picked_team = (p.pick || '').replace(/\s[+-]?\d+(\.\d+)?$/, '').trim();
          base.spread_line = p.line ?? null;
        } else if (ptype === 'total') {
          base.total_direction = p.direction || null;
          base.total_line = p.line ?? null;
        } else if (ptype === 'moneyline') {
          base.picked_team = p.pick || null;
        }
        newEntries.push(base);
        dailySingles.push(base);
      }
    }

    // Save to efp_history_v2
    setHistory(prev => {
      const next = upsertPicksToHistory(newEntries, prev);
      saveHistory(next);
      return next;
    });

    // Save to daily picks key (picks_YYYY-MM-DD)
    const existing = loadDailyPicks(todayKey) || { date: todayKey, singles: [], parlays: [] };
    const existIds = new Set(existing.singles.map(p => p.id));
    const toAdd = dailySingles.filter(p => !existIds.has(p.id));
    if (toAdd.length > 0) {
      saveDailyPicks(todayKey, { ...existing, singles: [...existing.singles, ...toAdd] });
    }
  }, []);

  // When parlays generated, store them for result tracking + save legs to daily picks
  const handleParlaysGenerated = useCallback((slips) => {
    const todayKey = getDailyKey();

    // Update parlayHistory state
    setParlayHistory(prev => {
      const existingIds = new Set(prev.map(p => p.id));
      const newOnes = slips.filter(s => !existingIds.has(s.id)).map(s => ({ id: s.id, result: null }));
      if (newOnes.length === 0) return prev;
      const next = [...prev, ...newOnes];
      saveParlayHistory(next);
      return next;
    });

    // Save full leg data to daily picks key
    const existing = loadDailyPicks(todayKey) || { date: todayKey, singles: [], parlays: [] };
    const existIds = new Set(existing.parlays.map(p => p.id));
    const toAdd = slips
      .filter(s => !existIds.has(s.id) && s.legs?.length)
      .map(s => ({
        id: s.id,
        type: s.type || '?',
        legs: (s.legs || []).map((leg, i) => ({
          id: `${s.id}_leg${i}`,
          sport: leg.sport || '',
          awayTeam: leg.awayTeam || '',
          homeTeam: leg.homeTeam || '',
          pick: leg.pick || '',
          odds: leg.odds || '',
          result: null,
        })),
        result: null,
      }));
    if (toAdd.length > 0) {
      saveDailyPicks(todayKey, { ...existing, parlays: [...existing.parlays, ...toAdd] });
    }
  }, []);

  const handleClearHistory = () => {
    if (!confirm('Clear all pick history? This cannot be undone.')) return;
    setHistory([]);
    saveHistory([]);
  };

  // Sub-tabs for sport view
  const sportInnerTabs = [
    { id: 'picks', label: '⚡ AI Picks' },
    { id: 'injuries', label: '🏥 News' },
  ];

  return (
    <div className="app-root">
      <header className="header">
        <div className="header-inner">
          <div className="header-top">
            <div className="logo">
              <div className="logo-box">EF</div>
              <div className="logo-text">
                <h1>EDGEFINDER PRO</h1>
              </div>
            </div>
            <div style={{display:'flex',gap:4,flexWrap:'wrap',alignItems:'center'}}>
              <button
                className={`sport-tab special${activeTab === 'parlays' ? ' active' : ''}`}
                onClick={() => setActiveTab('parlays')}
              >💰 PARLAYS</button>
              <button
                className={`sport-tab stats-tab${activeTab === 'stats' ? ' active' : ''}`}
                onClick={() => setActiveTab('stats')}
              >📊 STATS</button>
              <button
                className={`sport-tab${activeTab === 'yesterday' ? ' active' : ''}`}
                style={{borderColor:'rgba(255,200,0,.4)',color:activeTab==='yesterday'?'var(--yellow)':'var(--text-dim)',position:'relative'}}
                onClick={() => { setActiveTab('yesterday'); setReviewAllDone(false); }}
              >
                📋 REVIEW
                {activeTab !== 'yesterday' && reviewAllDone && (
                  <span style={{position:'absolute',top:-4,right:-4,fontSize:9,background:'var(--green)',color:'#000',borderRadius:8,padding:'1px 4px',fontWeight:900,lineHeight:1.4}}>✓</span>
                )}
                {activeTab !== 'yesterday' && !reviewAllDone && reviewInWindow && (
                  <span style={{position:'absolute',top:-4,right:-4,fontSize:9,background:'#64b4ff',color:'#000',borderRadius:8,padding:'1px 4px',fontWeight:900,lineHeight:1.4,animation:'pulse 2s infinite'}}>🔄</span>
                )}
              </button>
            </div>
          </div>
          <div className="sport-tabs">
            {SPORTS.map(s => (
              <button
                key={s.key}
                className={`sport-tab${activeTab === s.key ? ' active' : ''}`}
                onClick={() => { setActiveTab(s.key); setInnerTab('picks'); }}
              >{s.label}</button>
            ))}
          </div>
        </div>
      </header>

      <main>
        {/* Best Bet of the Day — shown above sport tabs when not on a special tab */}
        {!isSpecialTab && <BestBetSection history={history} />}

        {/* Sport inner tabs */}
        {!isSpecialTab && (
          <div style={{display:'flex',gap:4,marginBottom:14}}>
            {sportInnerTabs.map(t => (
              <button
                key={t.id}
                className={`sport-tab${innerTab === t.id ? ' active' : ''}`}
                style={{fontSize:10,padding:'4px 10px'}}
                onClick={() => setInnerTab(t.id)}
              >{t.label}</button>
            ))}
          </div>
        )}

        {/* Content */}
        {!isSpecialTab && activeSport && innerTab === 'picks' && (
          <PicksView
            key={activeSport.key}
            sport={activeSport}
            gamesCache={gamesCache}
            setGamesCache={setGamesCache}
            history={history}
            onMarkResult={handleMarkResult}
            onPicksGenerated={handlePicksGenerated}
            onQuotaUpdate={setGlobalQuota}
          />
        )}
        {!isSpecialTab && activeSport && innerTab === 'injuries' && (
          <InjuriesView sport={activeSport} />
        )}

        {activeTab === 'parlays' && (
          <ParlaysView
            gamesCache={gamesCache}
            setGamesCache={setGamesCache}
            history={history}
            parlayHistory={parlayHistory}
            onMarkParlay={handleMarkParlay}
            onParlaysGenerated={handleParlaysGenerated}
          />
        )}

        {activeTab === 'stats' && (
          <PerformanceView
            history={history}
            parlayHistory={parlayHistory}
            onMarkResult={handleMarkResult}
            onClearHistory={handleClearHistory}
          />
        )}

        {activeTab === 'yesterday' && <YesterdayView onAutoResults={handleAutoResults} />}
      </main>

      <footer>
        EdgeFinder Pro · Odds API + Claude AI · Gamble responsibly 18+
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
