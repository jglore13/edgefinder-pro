              );
            })}
          </div>
        )}

        {/* SECTION 6 — DAILY HISTORY */}
        {(ls.dailyHistory||[]).length > 0 && (
          <div className="card">
            <div style={{fontSize:10,color:'var(--green)',fontWeight:900,letterSpacing:1,marginBottom:10,textTransform:'uppercase'}}>Daily History</div>
            <div className="perf-table-wrap" style={{maxHeight:200,overflowY:'auto'}}>
              <table className="perf-table" style={{width:'100%'}}>
                <thead><tr><th>Date</th><th>W</th><th>L</th><th>P</th><th>Rate</th></tr></thead>
                <tbody>
                  {[...(ls.dailyHistory)].reverse().map(d => (
                    <tr key={d.date}>
                      <td style={{color:'var(--text-dim)',fontSize:10}}>{d.date}</td>
                      <td style={{color:'var(--green)'}}>{d.wins}</td>
                      <td style={{color:'var(--red)'}}>{d.losses}</td>
                      <td style={{color:'var(--text-dim)'}}>{d.pushes||0}</td>
                      <td style={{color:wrColor(d.hitRate)}}>{d.hitRate !== null ? `${d.hitRate}%` : '—'}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* Day of week */}
        {Object.keys(ls.byDay||{}).length > 0 && (
          <div className="card">
            <div style={{fontSize:10,color:'var(--green)',fontWeight:900,letterSpacing:1,marginBottom:10,textTransform:'uppercase'}}>By Day of Week</div>
            <table className="perf-table" style={{width:'100%'}}>
              <thead><tr><th>Day</th><th>W</th><th>L</th><th>Rate</th></tr></thead>
              <tbody>
                {DAY_ORDER.filter(d => ls.byDay[d]).map(d => {
                  const s = ls.byDay[d];
                  const rate = wr(s);
                  return (
                    <tr key={d}>
                      <td style={{color:'var(--text-bright)'}}>{d}</td>
                      <td style={{color:'var(--green)'}}>{s.wins}</td>
                      <td style={{color:'var(--red)'}}>{s.losses}</td>
                      <td style={{color:wrColor(rate)}}>{wrStr(s)}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}

        {/* Odds range */}
        {Object.keys(ls.byOddsRange||{}).length > 0 && (
          <div className="card">
            <div style={{fontSize:10,color:'var(--green)',fontWeight:900,letterSpacing:1,marginBottom:10,textTransform:'uppercase'}}>By Odds Range</div>
            <table className="perf-table" style={{width:'100%'}}>
              <thead><tr><th>Range</th><th>W</th><th>L</th><th>Rate</th></tr></thead>
              <tbody>
                {ODDS_RANGE_ORDER.filter(r => ls.byOddsRange[r]).map(r => {
                  const s = ls.byOddsRange[r];
                  const rate = wr(s);
                  return (
                    <tr key={r}>
                      <td style={{color:'var(--text-bright)',fontSize:10}}>{ODDS_RANGE_LABELS[r]}</td>
                      <td style={{color:'var(--green)'}}>{s.wins}</td>
                      <td style={{color:'var(--red)'}}>{s.losses}</td>
                      <td style={{color:wrColor(rate)}}>{wrStr(s)}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}

        {/* SECTION 9 — VALUE DOG TRACKING */}
        {(vdW + vdL) > 0 && (
          <div className="card">
            <div style={{fontSize:10,color:'#ffd700',fontWeight:900,letterSpacing:1,marginBottom:10,textTransform:'uppercase'}}>💰 Value Dog Tracking</div>
            <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:10}}>
              <div className="perf-card" style={{flex:1,minWidth:80}}>
                <div className="perf-card-label">Win Rate</div>
                <div className="perf-card-value" style={{color:vdW+vdL>0?wrColor(Math.round((vdW/(vdW+vdL))*100)):'var(--text-dim)'}}>{vdW+vdL>0?`${Math.round((vdW/(vdW+vdL))*100)}%`:'—'}</div>
                <div className="perf-card-sub">{vdW}W – {vdL}L</div>
              </div>
              <div className="perf-card" style={{flex:1,minWidth:80}}>
                <div className="perf-card-label">vs Overall</div>
                <div className="perf-card-value" style={{color:overallPct!==null&&vdW+vdL>0&&Math.round((vdW/(vdW+vdL))*100)>overallPct?'var(--green)':'var(--red)'}}>
                  {overallPct !== null && vdW+vdL > 0 ? (Math.round((vdW/(vdW+vdL))*100) > overallPct ? '↑ Beating' : '↓ Below') : '—'}
                </div>
                <div className="perf-card-sub">overall avg: {overallPct||'—'}%</div>
              </div>
            </div>
            <div style={{fontSize:11,color:'var(--text-dim)'}}>Plus-money underdog picks flagged as mispriced by the system</div>
          </div>
        )}
      </div>

      {/* SECTION 7 — RECENT PICKS */}
      {recent20.length > 0 && (
        <div className="card" style={{marginBottom:16}}>
          <div style={{fontSize:10,color:'var(--green)',fontWeight:900,letterSpacing:1,marginBottom:10,textTransform:'uppercase'}}>Recent Picks (last 20)</div>
          <div className="perf-table-wrap" style={{maxHeight:320,overflowY:'auto'}}>
            <table className="perf-table" style={{width:'100%'}}>
              <thead>
                <tr>
                  <th>Game</th><th>Type</th><th>Pick</th><th>Odds</th><th>Slot</th><th>Systems</th><th>Result</th>
                </tr>
              </thead>
              <tbody>
                {recent20.map(p => (
                  <tr key={p.id}>
                    <td style={{color:'var(--text-dim)',fontSize:9,maxWidth:100,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.game||'—'}</td>
                    <td><span className="badge badge-dim" style={{fontSize:8}}>{p.pick_type||'?'}</span></td>
                    <td style={{color:'var(--text-bright)',fontSize:10,maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.pick_display||'—'}</td>
                    <td style={{color:'var(--text-mid)'}}>{fmtOdds(p.odds)}</td>
                    <td><span className={p.slot==='VEGAS'?'badge badge-vegas':'badge badge-public'} style={{fontSize:8}}>{p.slot||'?'}</span></td>
                    <td style={{fontSize:8,color:'var(--text-dim)',maxWidth:80,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                      {p.is_value_dog && <span style={{color:'#ffd700',fontWeight:700}}>💰 </span>}
                      {(p.systems||[]).filter(s => s !== 'VALUE DOG').slice(0,2).join(', ')||'—'}
                    </td>
                    <td>
                      {!p.result && <span style={{color:'var(--text-dim)',fontSize:9}}>Pending</span>}
                      {p.result === 'W' && <span style={{color:'var(--green)',fontWeight:700,fontSize:9}}>✓ WIN</span>}
                      {p.result === 'L' && <span style={{color:'var(--red)',fontWeight:700,fontSize:9}}>✗ LOSS</span>}
                      {p.result === 'P' && <span style={{color:'var(--yellow)',fontSize:9}}>≈ PUSH</span>}
                      {p.result === 'UNRESOLVED' && <span style={{color:'var(--text-dim)',fontSize:9}}>N/A</span>}
                      {!p.result && (
                        <span style={{display:'inline-flex',gap:2,marginLeft:4}}>
                          {['W','L','P'].map(r => (
                            <button key={r} className="result-btn" style={{fontSize:8,padding:'1px 4px'}}
                              onClick={() => onMarkResult(p.id, r)}>{r}</button>
                          ))}
                        </span>
                      )}
                      {p.result && p.result !== 'UNRESOLVED' && (
                        <button className="result-btn" style={{marginLeft:3,fontSize:8,padding:'1px 4px'}}
                          onClick={() => onMarkResult(p.id, null)}>✕</button>
                      )}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* SECTION 8 — LEARNING PROGRESS MESSAGE */}
      {total >= 5 && (() => {
        const pct = overallPct || 0;
        const TARGET = 90;
        const onTrack = pct >= TARGET;
        const winsNeeded = onTrack ? 0 : Math.ceil((TARGET/100 * total - wins) / (1 - TARGET/100));
        const recentRate = w30+l30>0 ? Math.round((w30/(w30+l30))*100) : pct;
        const trending = recentRate > pct + 5 ? '↑ improving' : recentRate < pct - 5 ? '↓ declining' : '→ stable';
        const trendColor = recentRate > pct + 5 ? 'var(--green)' : recentRate < pct - 5 ? 'var(--red)' : 'var(--text-mid)';

        const sysSorted = Object.entries(ls.bySystem||{}).filter(([,s]) => s.wins+s.losses >= 5).sort((a,b) => (wr(b[1])||0)-(wr(a[1])||0));
        const bestSys  = sysSorted[0];
        const worstSys = sysSorted[sysSorted.length-1];

        return (
          <div className="card" style={{marginBottom:16}}>
            <div style={{fontSize:10,color:'var(--green)',fontWeight:900,letterSpacing:1,marginBottom:10,textTransform:'uppercase'}}>Learning Progress</div>
            <div style={{fontSize:13,color:'var(--text-bright)',lineHeight:1.7,marginBottom:10}}>
              The system has made <strong style={{color:'var(--green)'}}>{total}</strong> picks and achieved{' '}
              <strong style={{color:wrColor(pct)}}>{pct}%</strong> accuracy.{' '}
              {onTrack
                ? <span style={{color:'var(--green)'}}>✅ 90% target achieved!</span>
                : <span>At current trajectory, <strong style={{color:'var(--yellow)'}}>{winsNeeded} more wins</strong> needed to reach 90% goal.</span>
              }
            </div>
            {bestSys && (
              <div style={{fontSize:12,color:'var(--text-mid)',marginBottom:4}}>
                Best performing system: <strong style={{color:'var(--green)'}}>{bestSys[0]}</strong> at {wrStr(bestSys[1])} ({bestSys[1].wins+bestSys[1].losses} picks)
              </div>
            )}
            {worstSys && worstSys[0] !== bestSys?.[0] && (
              <div style={{fontSize:12,color:'var(--text-mid)',marginBottom:8}}>
                Weakest system: <strong style={{color:'var(--red)'}}>{worstSys[0]}</strong> at {wrStr(worstSys[1])} — currently reducing weight
              </div>
            )}
            <div style={{display:'flex',gap:16,flexWrap:'wrap',marginBottom:10}}>
              <span style={{fontSize:11,color:'var(--text-dim)'}}>30-day rate: <span style={{color:trendColor,fontWeight:700}}>{w30+l30>0?`${recentRate}%`:'N/A'}</span> <span style={{color:trendColor,fontSize:10}}>{trending}</span></span>
              <span style={{fontSize:11,color:'var(--text-dim)'}}>All-time: {wins}W – {losses}L – {pushes}P</span>
            </div>
            <ProgressBar value={pct} colorClass={barColor(pct)} height={8} />
            <div style={{display:'flex',justifyContent:'space-between',marginTop:4,fontSize:10,color:'var(--text-dim)'}}>
              <span>Current: {pct}%</span><span>Target: {TARGET}%</span>
            </div>
          </div>
        );
      })()}

      {/* SECTION 10 — PROFITABILITY ANALYSIS */}
      {allSettled.length >= 3 && (() => {
        const flatBet = 100;
        const plPicks = allSettled.filter(p => typeof p.odds === 'number');
        const calcPL = (p) => {
          if (p.result === 'W') return p.odds > 0 ? flatBet * (p.odds / 100) : flatBet * (100 / Math.abs(p.odds));
          if (p.result === 'P') return 0;
          return -flatBet;
        };
        const totalPL = plPicks.reduce((sum, p) => sum + calcPL(p), 0);
        const totalInvested = plPicks.length * flatBet;
        const roi = totalInvested > 0 ? (totalPL / totalInvested * 100) : 0;
        const roiColor = roi >= 5 ? 'var(--green)' : roi >= 0 ? '#64b4ff' : 'var(--red)';

        // By confidence tier (ai_strength: 80-100, 60-79, 40-59, <40)
        const tiers = [
          { label: 'Confidence 80-100 (8-10)', min: 80, max: 100 },
          { label: 'Confidence 60-79 (6-7)',   min: 60, max: 79  },
          { label: 'Confidence 40-59 (4-5)',   min: 40, max: 59  },
          { label: 'Confidence <40 (1-3)',      min: 0,  max: 39  },
        ];
        const tierStats = tiers.map(t => {
          const tp = plPicks.filter(p => (p.ai_strength||p.confidence||50) >= t.min && (p.ai_strength||p.confidence||50) <= t.max);
          const tpl = tp.reduce((sum, p) => sum + calcPL(p), 0);
          const tinv = tp.length * flatBet;
          const troi = tinv > 0 ? (tpl / tinv * 100) : null;
          return { ...t, count: tp.length, pl: tpl, roi: troi };
        }).filter(t => t.count > 0);

        // By sport P/L
        const sportPL = {};
        plPicks.forEach(p => {
          if (!sportPL[p.sport]) sportPL[p.sport] = { pl: 0, count: 0 };
          sportPL[p.sport].pl += calcPL(p);
          sportPL[p.sport].count++;
        });

        return (
          <div style={{marginBottom:20}}>
            <div style={{fontSize:10,fontWeight:900,letterSpacing:2,color:'var(--text-dim)',textTransform:'uppercase',marginBottom:10,paddingBottom:4,borderBottom:'1px solid var(--border)'}}>
              💰 SECTION 10 — PROFITABILITY ANALYSIS ($100 flat bet)
            </div>
            {/* Summary row */}
            <div className="perf-grid" style={{marginBottom:12}}>
              <div className="perf-card">
                <div className="perf-card-label">Total Invested</div>
                <div className="perf-card-value">${totalInvested.toLocaleString()}</div>
                <div className="perf-card-sub">{plPicks.length} picks</div>
              </div>
              <div className="perf-card">
                <div className="perf-card-label">Net P/L</div>
                <div className="perf-card-value" style={{color:roiColor}}>{totalPL >= 0 ? '+' : ''}${totalPL.toFixed(0)}</div>
                <div className="perf-card-sub">{plPicks.filter(p=>calcPL(p)>0).length}W · {plPicks.filter(p=>calcPL(p)<0).length}L</div>
              </div>
              <div className="perf-card">
                <div className="perf-card-label">ROI</div>
                <div className="perf-card-value" style={{color:roiColor}}>{roi >= 0 ? '+' : ''}{roi.toFixed(1)}%</div>
                <div className="perf-card-sub">Flat $100 / pick</div>
              </div>
            </div>

            {/* By confidence tier */}
            {tierStats.length > 0 && (
              <div style={{marginBottom:12}}>
                <div style={{fontSize:10,color:'var(--text-dim)',marginBottom:6,fontWeight:700}}>ROI by Confidence Tier</div>
                <div style={{display:'flex',flexDirection:'column',gap:4}}>
                  {tierStats.map(t => {
                    const tc = t.roi == null ? 'var(--text-dim)' : t.roi >= 5 ? 'var(--green)' : t.roi >= 0 ? '#64b4ff' : 'var(--red)';
                    return (
                      <div key={t.label} style={{display:'flex',justifyContent:'space-between',alignItems:'center',background:'rgba(255,255,255,0.02)',borderRadius:4,padding:'5px 10px'}}>
                        <span style={{fontSize:11,color:'var(--text-mid)'}}>{t.label}</span>
                        <span style={{fontSize:11,fontWeight:700,color:tc}}>
                          {t.roi != null ? `${t.roi >= 0 ? '+' : ''}${t.roi.toFixed(1)}% ROI` : '—'} · {t.count} picks · {t.pl >= 0 ? '+' : ''}${t.pl.toFixed(0)}
                        </span>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* By sport P/L */}
            <div style={{fontSize:10,color:'var(--text-dim)',marginBottom:6,fontWeight:700}}>P/L by Sport</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
              {Object.entries(sportPL).sort((a,b) => b[1].pl - a[1].pl).map(([sport, s]) => {
                const spoiColor = s.pl >= 0 ? 'var(--green)' : 'var(--red)';
                return (
                  <div key={sport} style={{background:'rgba(255,255,255,0.02)',border:'1px solid var(--border)',borderRadius:4,padding:'5px 10px',minWidth:110,textAlign:'center'}}>
                    <div style={{fontSize:10,color:'var(--text-dim)',marginBottom:2}}>{sport}</div>
                    <div style={{fontSize:12,fontWeight:700,color:spoiColor}}>{s.pl >= 0 ? '+' : ''}${s.pl.toFixed(0)}</div>
                    <div style={{fontSize:9,color:'var(--text-dim)'}}>{s.count} picks</div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

      {/* SECTION 11 — LINE TIMING ANALYSIS */}
      {allSettled.filter(p => p.line_value_window).length >= 3 && (() => {
        const timedPicks = allSettled.filter(p => p.line_value_window);
        const byWindow = { EARLY:{w:0,l:0}, STANDARD:{w:0,l:0}, LATE:{w:0,l:0} };
        timedPicks.forEach(p => {
          const w = byWindow[p.line_value_window];
          if (!w) return;
          if (p.result === 'W') w.w++; else if (p.result === 'L') w.l++;
        });
        const hasData = Object.values(byWindow).some(v => v.w + v.l > 0);
        if (!hasData) return null;
        return (
          <div className="card" style={{marginBottom:16}}>
            <div style={{fontSize:10,color:'var(--green)',fontWeight:900,letterSpacing:1,marginBottom:10,textTransform:'uppercase'}}>⏰ Line Timing Analysis</div>
            <div style={{fontSize:10,color:'var(--text-dim)',marginBottom:8}}>Win rate by how early you got the line. Early = 4+ hrs before game, Standard = 2-4 hrs, Late = &lt;2 hrs.</div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {Object.entries(byWindow).map(([window, s]) => {
                if (s.w + s.l === 0) return null;
                const rate = Math.round((s.w/(s.w+s.l))*100);
                return (
                  <div key={window} style={{background:'rgba(255,255,255,0.03)',border:'1px solid var(--border)',borderRadius:4,padding:'8px 12px',minWidth:100,textAlign:'center'}}>
                    <div style={{fontSize:9,color:'var(--text-dim)',marginBottom:3,textTransform:'uppercase',letterSpacing:1}}>{window}</div>
                    <div style={{fontSize:16,fontWeight:900,color:wrColor(rate)}}>{rate}%</div>
                    <div style={{fontSize:9,color:'var(--text-dim)'}}>{s.w}W–{s.l}L</div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

      {/* SECTION 12 — CLV TRACKER */}
      {allSettled.filter(p => p.opening_spread != null || p.opening_total != null).length >= 3 && (
        <div className="card" style={{marginBottom:16}}>
          <div style={{fontSize:10,color:'var(--green)',fontWeight:900,letterSpacing:1,marginBottom:8,textTransform:'uppercase'}}>📈 Closing Line Value (CLV) Tracker</div>
          <div style={{fontSize:11,color:'var(--text-mid)',lineHeight:1.6}}>
            Opening lines are stored at pick generation time. CLV tracks whether you're getting good numbers relative to where lines close.
          </div>
          <div style={{marginTop:8,fontSize:10,color:'var(--text-dim)'}}>
            Opening lines tracked for <span style={{color:'var(--green)',fontWeight:700}}>{allSettled.filter(p=>p.opening_spread!=null||p.opening_total!=null).length}</span> picks.
            {' '}Positive CLV = you beat the closing line = long-term profitable.
          </div>
          <div style={{marginTop:8,fontSize:9,color:'var(--text-dim)',fontStyle:'italic'}}>
            Full CLV comparison requires closing line collection. Opening lines are being stored now — compare them manually in the Recent Picks table above.
          </div>
        </div>
      )}

      {history.length === 0 && (
        <div className="empty-state">
          <div className="empty-icon">📊</div>
          <div>No picks tracked yet.</div>
          <div style={{marginTop:6,fontSize:11,color:'var(--text-dim)'}}>Generate picks on any sport tab, then mark results to build your learning database.</div>
        </div>
      )}
    </div>
  );
}

// ─── INJURIES VIEW ────────────────────────────────────────────────────────────

const INJURY_STATUS_STYLES = {
  OUT:          { bg:'rgba(255,68,68,0.15)',  border:'rgba(255,68,68,0.4)',  color:'var(--red)',    label:'OUT'          },
  DOUBTFUL:     { bg:'rgba(255,120,0,0.12)',  border:'rgba(255,120,0,0.4)',  color:'#ff7800',       label:'DOUBTFUL'     },
  QUESTIONABLE: { bg:'rgba(240,180,41,0.12)', border:'rgba(240,180,41,0.4)', color:'var(--yellow)', label:'QUESTIONABLE' },
  'DAY-TO-DAY': { bg:'rgba(240,130,0,0.10)',  border:'rgba(240,130,0,0.35)', color:'#f08200',       label:'DAY-TO-DAY'   },
  PROBABLE:     { bg:'rgba(0,200,80,0.07)',   border:'rgba(0,200,80,0.3)',   color:'var(--green)',  label:'PROBABLE'     },
  RETURNING:    { bg:'rgba(0,255,65,0.08)',   border:'rgba(0,255,65,0.3)',   color:'var(--green)',  label:'↩ RETURNING'  },
  NEWS:         { bg:'rgba(255,255,255,0.02)',border:'var(--border)',         color:'var(--text-dim)',label:'NEWS'        },
};

function InjuriesView({ sport }) {
  const [injuries, setInjuries]   = useState([]);
  const [news, setNews]           = useState([]);
  const [loadingInj, setLoadingInj] = useState(false);
  const [loadingNews, setLoadingNews] = useState(false);
  const [error, setError]         = useState('');
  const [filter, setFilter]       = useState('');
  const [lastUpdated, setLastUpdated] = useState(null);
  const [hasQuestionable, setHasQuestionable] = useState(false);
  const [tab, setTab]             = useState('injuries'); // 'injuries' | 'news'
  const monitorRef                = useRef(null);

  const sportKey = SPORT_INJURY_MAP[sport.label];

  const timeAgo = (d) => {
    if (!d) return '';
    const m = Math.floor((Date.now() - new Date(d)) / 60000);
    if (m < 60) return `${m}m ago`;
    const h = Math.floor(m/60);
    if (h < 24) return `${h}h ago`;
    return `${Math.floor(h/24)}d ago`;
  };

  const loadInjuries = useCallback(async () => {
    if (!sportKey || sportKey === 'MMA') { setInjuries([]); return; }
    setLoadingInj(true);
    try {
      const d = await apiFetch(`/api/injuries?sport=${sportKey}`);
      setInjuries(d.injuries || []);
      setHasQuestionable(d.hasQuestionable || false);
      setLastUpdated(d.lastUpdated);
    } catch (e) { setError(e.message); }
    finally { setLoadingInj(false); }
  }, [sportKey]);

  const loadNews = useCallback(async () => {
    if (!sportKey) { setNews([]); return; }
    setLoadingNews(true);
    try {
      const d = await apiFetch(`/api/news?sport=${sportKey}`);
      setNews(d.news || []);
    } catch {}
    finally { setLoadingNews(false); }
  }, [sportKey]);

  useEffect(() => {
    loadInjuries();
    loadNews();
    // Auto-refresh if questionable players
    monitorRef.current = setInterval(() => {
      loadInjuries();
    }, 5 * 60 * 1000);
    return () => clearInterval(monitorRef.current);
  }, [loadInjuries, loadNews]);

  const filteredInj = injuries.filter(i =>
    !filter || (i.title + (i.desc||'')).toLowerCase().includes(filter.toLowerCase())
  );
  const filteredNews = news.filter(i =>
    !filter || (i.title + (i.desc||'')).toLowerCase().includes(filter.toLowerCase())
  );

  const isInjuryRelated = (title, desc) => {
    const t = (title + ' ' + desc).toLowerCase();
    return /injur|out|doubtful|questionable|probable|day-to-day|surgery|return/.test(t);
  };

  const statusSort = { OUT:0, DOUBTFUL:1, QUESTIONABLE:2, 'DAY-TO-DAY':3, PROBABLE:4, RETURNING:5, NEWS:6 };
  const sorted = [...filteredInj].sort((a,b) => (statusSort[a.status]||6) - (statusSort[b.status]||6));

  return (
    <div>
      <div className="section-header">
        <div>
          <div className="section-title">{sport.label} News &amp; Injuries</div>
          <div className="section-subtitle">
            {lastUpdated ? `Updated ${timeAgo(lastUpdated)}` : 'Live feeds'}
            {hasQuestionable && <span style={{marginLeft:8,color:'var(--yellow)',animation:'pulse 2s infinite',display:'inline'}}>🔄 Monitoring questionable players every 5 min</span>}
          </div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <input className="filter-input" placeholder="Filter player / team..."
            value={filter} onChange={e => setFilter(e.target.value)} />
          <button className="btn" onClick={() => { loadInjuries(); loadNews(); }}>↺</button>
        </div>
      </div>

      {/* Tab switcher */}
      <div style={{display:'flex',gap:4,marginBottom:12}}>
        <button className={`sport-tab${tab==='injuries'?' active':''}`}
          style={{fontSize:10,padding:'4px 12px'}} onClick={() => setTab('injuries')}>
          🏥 Injuries {filteredInj.length > 0 && <span className="badge badge-dim" style={{marginLeft:4}}>{filteredInj.length}</span>}
        </button>
        <button className={`sport-tab${tab==='news'?' active':''}`}
          style={{fontSize:10,padding:'4px 12px'}} onClick={() => setTab('news')}>
          📰 News {filteredNews.length > 0 && <span className="badge badge-dim" style={{marginLeft:4}}>{filteredNews.length}</span>}
        </button>
      </div>

      {error && <div className="error-box">⚠ {error}</div>}

      {tab === 'injuries' && (
        <div>
          {loadingInj && <div className="loading-row"><Spinner /><span>Loading injury feed...</span></div>}
          {!loadingInj && !sportKey && <div className="no-games">No injury feed for {sport.label}.</div>}
          {!loadingInj && sportKey === 'MMA' && <div className="no-games">No injury feed for UFC/MMA.</div>}
          {!loadingInj && sorted.length === 0 && sportKey && sportKey !== 'MMA' && !error && (
            <div className="empty-state"><div className="empty-icon">🏥</div>No injury reports found.</div>
          )}
          <div style={{maxHeight:'70vh',overflowY:'auto'}}>
            {sorted.map((item, i) => {
              const st = INJURY_STATUS_STYLES[item.status] || INJURY_STATUS_STYLES.NEWS;
              return (
                <div key={i} className="injury-card fade-in"
                  style={{background:st.bg,borderColor:st.border,borderWidth:1,borderStyle:'solid',borderRadius:5,padding:'10px 12px',marginBottom:6}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8,marginBottom:4}}>
                    <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                      <span style={{fontSize:9,fontWeight:900,letterSpacing:0.5,padding:'2px 6px',borderRadius:2,background:st.bg,border:`1px solid ${st.border}`,color:st.color}}>
                        {st.label}
                      </span>
                      {item.status === 'QUESTIONABLE' && <span style={{fontSize:9,color:'var(--yellow)',animation:'pulse 2s infinite'}}>●</span>}
                      <div className="injury-title" style={{flex:1}}>{item.title}</div>
                    </div>
                    <span style={{fontSize:10,color:'var(--text-dim)',flexShrink:0}}>{timeAgo(item.pubDate)}</span>
                  </div>
                  {item.desc && <div className="injury-desc">{item.desc}</div>}
                  {item.link && (
                    <a href={item.link} target="_blank" rel="noopener noreferrer"
                      style={{fontSize:10,color:'var(--green)',display:'inline-block',marginTop:4}}>Read more →</a>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {tab === 'news' && (
        <div>
          {loadingNews && <div className="loading-row"><Spinner /><span>Loading news feed...</span></div>}
          {!loadingNews && filteredNews.length === 0 && !error && (
            <div className="empty-state"><div className="empty-icon">📰</div>No news found.</div>
          )}
          <div style={{maxHeight:'70vh',overflowY:'auto'}}>
            {filteredNews.map((item, i) => {
              const injRelated = isInjuryRelated(item.title, item.desc);
              return (
                <div key={i} className="injury-card fade-in"
                  style={{borderColor:injRelated?'rgba(240,180,41,0.3)':'var(--border)',background:injRelated?'rgba(240,180,41,0.04)':'transparent'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
                    <div>
                      {injRelated && <span style={{fontSize:8,fontWeight:900,color:'var(--yellow)',marginRight:6,letterSpacing:0.5}}>INJURY-RELATED</span>}
                      <span className="injury-title">{item.title}</span>
                    </div>
                    <span style={{fontSize:10,color:'var(--text-dim)',flexShrink:0}}>{timeAgo(item.pubDate)}</span>
                  </div>
                  {item.desc && <div className="injury-desc" style={{marginTop:4}}>{item.desc}</div>}
                  {item.link && (
                    <a href={item.link} target="_blank" rel="noopener noreferrer"
                      style={{fontSize:10,color:'var(--green)',display:'inline-block',marginTop:4}}>Read more →</a>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────

function App() {
  const [activeTab, setActiveTab]       = useState(SPORTS[0].key);
  const [gamesCache, setGamesCache]     = useState({});
  const [history, setHistory]           = useState(() => loadHistory());
  const [parlayHistory, setParlayHistory] = useState(() => loadParlayHistory());
  const [innerTab, setInnerTab]         = useState('picks'); // 'picks' | 'injuries'
  const [globalQuota, setGlobalQuota]   = useState(null);
  // Badge: tracks whether we're in the 9PM-2AM auto-check window
  const [reviewInWindow, setReviewInWindow] = useState(isInCheckWindow);
  const [reviewAllDone, setReviewAllDone]   = useState(false);
  // Line monitoring: lineMovements[sportKey] = [{ gameId, game, moves, movedAt }]
  const [lineMovements, setLineMovements] = useState({});
  // updatedPicks[game_id] = updated pick object with _movedAt timestamp
  const [updatedPicks, setUpdatedPicks]   = useState({});
  const [nextLineCheckTime, setNextLineCheckTime] = useState(null);
  const [linesBannerDismissed, setLinesBannerDismissed] = useState(false);
  const [deployInfo, setDeployInfo]     = useState(null);
  const lineCheckRef  = useRef(null);
  const gamesRef      = useRef(gamesCache);
  const quotaRef      = useRef(globalQuota);
  const historyRef    = useRef(history);

  // Keep refs current
  useEffect(() => { gamesRef.current = gamesCache; }, [gamesCache]);
  useEffect(() => { quotaRef.current = globalQuota; }, [globalQuota]);
  useEffect(() => { historyRef.current = history; }, [history]);

  // On mount: rotate yesterday's settled picks to permanent stats_history
  React.useEffect(() => { maybeRotateToStats(); }, []);

  // On mount: fetch deploy info for header badge
  React.useEffect(() => {
    fetch('/api/version').then(r => r.json()).then(d => setDeployInfo(d)).catch(() => {});
  }, []);

  // Background prefetch: warm all sport odds caches in parallel so tab switches are instant
  React.useEffect(() => {
    const prefetch = async () => {
      const todayStr = new Date().toLocaleDateString('en-CA');
      await Promise.allSettled(
        SPORTS.filter(s => !s.noOdds).map(async sport => {
          if (getCachedOdds(sport.key)) return; // already warm
          try {
            const keysToTry = [sport.key, ...(sport.fallbackKeys || [])];
            for (const k of keysToTry) {
              const d = await apiFetch(`/api/odds?sport=${k}&markets=h2h,spreads,totals&regions=us&bookmakers=${MULTI_BOOKS}`);
              const games = (d.data || []).filter(g => new Date(g.commence_time).toLocaleDateString('en-CA') === todayStr);
              if (games.length > 0 || k === keysToTry[keysToTry.length - 1]) {
                setCachedOdds(k, games, d.quota);
                setGamesCache(prev => ({ ...prev, [k]: games }));
                if (d.quota) setGlobalQuota(d.quota);
                break;
              }
            }
          } catch { /* non-fatal */ }
        })
      );
    };
    prefetch();
  }, []);

  // Update window badge every minute
  React.useEffect(() => {
    const t = setInterval(() => setReviewInWindow(isInCheckWindow()), 60_000);
    return () => clearInterval(t);
  }, []);

  const activeSport = SPORTS.find(s => s.key === activeTab);
  const isSpecialTab = activeTab === 'parlays' || activeTab === 'stats' || activeTab === 'yesterday';

  // ── 45-min line monitoring ──────────────────────────────────────────────────

  const checkAllLines = useCallback(async () => {
    const now = new Date();
    const h = now.getHours();
    const todayStr = now.toLocaleDateString('en-CA');

    // Stop after 11pm; only run after noon (new lines post around noon)
    if (h >= 23 || h < 11) { console.log('[LineCheck] Outside monitoring window (11am–11pm)'); return; }

    const quota = quotaRef.current;
    // Credit protection: <50 credits → stop entirely
    if (quota?.remainingRequests != null && parseInt(quota.remainingRequests) < 50) {
      console.log('[LineCheck] Stopped — credits below 50'); return;
    }

    const newMovements = {};

    for (const sport of SPORTS) {
      const games = getCachedOdds(sport.key) || gamesRef.current[sport.key];
      if (!games || games.length === 0) continue;

      // Skip sports where all games have started
      const upcoming = games.filter(g => new Date(g.commence_time) > now);
      if (upcoming.length === 0) { console.log(`[LineCheck] ${sport.label} — all games started, skipping`); continue; }

      try {
        const keysToTry = [sport.key, ...(sport.fallbackKeys || [])];
        let freshGames = null;
        for (const key of keysToTry) {
          try {
            const d = await apiFetch(`/api/odds?sport=${key}&markets=h2h,spreads,totals&regions=us&bookmakers=${MULTI_BOOKS}`);
            const fg = (d.data || []).filter(g => new Date(g.commence_time).toLocaleDateString('en-CA') === todayStr);
            if (fg.length > 0 || key === keysToTry[keysToTry.length - 1]) {
              freshGames = fg;
              if (d.quota) setGlobalQuota(d.quota);
              break;
            }
          } catch {}
        }
        if (!freshGames) continue;

        const oldSnapshot = loadOddsSnapshot(sport.key);
        saveOddsSnapshot(sport.key, freshGames);
        setCachedOdds(sport.key, freshGames);
        setGamesCache(prev => ({ ...prev, [sport.key]: freshGames }));

        if (!oldSnapshot) { console.log(`[LineCheck] ${sport.label} — first snapshot saved`); continue; }

        const snapMap = {};
        oldSnapshot.forEach(s => { snapMap[s.gameId] = s; });

        const gameMoves = [];
        for (const g of freshGames) {
          if (new Date(g.commence_time) <= now) continue; // skip started games
          const old = snapMap[g.id];
          if (!old) continue;
          const ns = extractGameSummary(g);
          const newSnap = {
            gameId: g.id, awayTeam: g.away_team, homeTeam: g.home_team,
            awaySpread: ns.spread?.away?.line ?? null,
            homeML: ns.moneyline?.home ?? null,
            total: ns.total?.line ?? null,
          };
          const moves = detectLineMovement(old, newSnap);
          if (moves.length > 0) {
            const movedAt = new Date().toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
            gameMoves.push({ gameId: g.id, game: `${g.away_team} @ ${g.home_team}`, moves, movedAt });
          }
        }
        console.log(`[LineCheck] ${sport.label} — ${upcoming.length} games monitored — ${gameMoves.length} moves`);
        if (gameMoves.length > 0) newMovements[sport.key] = gameMoves;
      } catch (e) { console.warn(`[LineCheck] ${sport.label} failed:`, e.message); }
    }

    if (Object.keys(newMovements).length > 0) {
      setLineMovements(prev => ({ ...prev, ...newMovements }));
      setLinesBannerDismissed(false);
      // Generate updated picks for any moved games on the active tab
      for (const [sportKey, moves] of Object.entries(newMovements)) {
        const sport = SPORTS.find(s => s.key === sportKey);
        const games = getCachedOdds(sportKey) || gamesRef.current[sportKey] || [];
        for (const moveInfo of moves) {
          if (window.updatedPicksStore[moveInfo.gameId]) continue; // already have
          const game = games.find(g => g.id === moveInfo.gameId);
          if (!game) continue;
          const moveSummary = formatMoveSummary(moveInfo.moves);
          generateUpdatedPickForGame(sport, game, moveSummary).then(upd => {
            if (upd) {
              const withTime = { ...upd, _movedAt: moveInfo.movedAt };
              window.updatedPicksStore[moveInfo.gameId] = withTime;
              setUpdatedPicks(prev => ({ ...prev, [moveInfo.gameId]: withTime }));
            }
          }).catch(() => {});
        }
      }
    }

    const nextInterval = quota?.remainingRequests != null && parseInt(quota.remainingRequests) < 100
      ? 90 * 60 * 1000 : LINE_MONITOR_MS;
    setNextLineCheckTime(Date.now() + nextInterval);
  }, []);

  // ── Background preload all sports ──────────────────────────────────────────

  const preloadAllSports = useCallback(async () => {
    const h = new Date().getHours();
    if (h >= 23 || h < 11) return; // Only preload during the day
    const todayStr = new Date().toLocaleDateString('en-CA');

    // Fetch all sports odds in parallel
    const results = await Promise.allSettled(
      SPORTS.map(async sport => {
        if (getCachedOdds(sport.key)) return { sport, games: getCachedOdds(sport.key) };
        const keysToTry = [sport.key, ...(sport.fallbackKeys || [])];
        for (const key of keysToTry) {
          try {
            const d = await apiFetch(`/api/odds?sport=${key}&markets=h2h,spreads,totals&regions=us&bookmakers=${MULTI_BOOKS}`);
            const games = (d.data || []).filter(g => new Date(g.commence_time).toLocaleDateString('en-CA') === todayStr);
            if (games.length > 0 || key === keysToTry[keysToTry.length - 1]) {
              setCachedOdds(sport.key, games, d.quota);
              saveOddsSnapshot(sport.key, games);
              return { sport, games };
            }
          } catch {}
        }
        return { sport, games: [] };
      })
    );

    const newCache = {};
    results.forEach(r => {
      if (r.status === 'fulfilled' && r.value) newCache[r.value.sport.key] = r.value.games;
    });
    setGamesCache(prev => ({ ...prev, ...newCache }));

    // Generate picks for all sports with staggered delays (skip sports with fresh cache)
    let delay = 500; // start after 500ms
    for (const sport of SPORTS) {
      const games = newCache[sport.key] || [];
      if (games.length === 0) continue;
      const bgHit = window.bgPicksCache[sport.key];
      const lsHit = loadPicksFromCache(sport.key);
      if ((bgHit && Date.now() - bgHit.ts < PICKS_CACHE_TTL) || lsHit) continue; // already cached
      const sportCopy = sport;
      const gamesCopy = games;
      setTimeout(async () => {
        try {
          console.log(`[Preload] Generating picks for ${sportCopy.label}...`);
          await generatePicks(sportCopy, gamesCopy, historyRef.current);
        } catch (e) { console.warn(`[Preload] ${sportCopy.label} failed:`, e.message); }
      }, delay);
      delay += 4000; // 4-second stagger between sports to avoid API overload
    }

    // Set initial next check time
    setNextLineCheckTime(Date.now() + LINE_MONITOR_MS);
  }, []);

  // Start preloading on mount (once)
  useEffect(() => {
    if (!window._preloadStarted) {
      window._preloadStarted = true;
      preloadAllSports();
    }
  }, []);

  // Start 45-min line monitoring interval
  useEffect(() => {
    const initialInterval = globalQuota?.remainingRequests != null && parseInt(globalQuota.remainingRequests) < 100
      ? 90 * 60 * 1000 : LINE_MONITOR_MS;
    lineCheckRef.current = setInterval(checkAllLines, initialInterval);
    return () => clearInterval(lineCheckRef.current);
  }, []); // eslint-disable-line

  // Mark a pick result
  const handleMarkResult = useCallback((pickId, result) => {
    setHistory(prev => {
      const next = prev.map(p => p.id === pickId ? {...p, result} : p);
      saveHistory(next);
      saveLearningStats(next);
      return next;
    });
  }, []);

  // Called by YesterdayView after auto-checking parlays: merges parlay results into parlayHistory
  const handleAutoParlay = useCallback((updatedParlays) => {
    if (!updatedParlays || updatedParlays.length === 0) return;
    setParlayHistory(prev => {
      const resultMap = new Map(
        updatedParlays.filter(p => p.result).map(p => [p.id, p.result === 'WIN' ? 'W' : p.result === 'LOSS' ? 'L' : null])
      );
      if (resultMap.size === 0) return prev;
      let changed = false;
      const next = prev.map(p => {
        const nr = resultMap.get(p.id);
        if (nr && p.result !== nr) { changed = true; return { ...p, result: nr }; }
        return p;
      });
      if (!changed) return prev;
      saveParlayHistory(next);
      return next;
    });
  }, []);

  // Called by YesterdayView after auto-checking: merges resolved results into history + updates learning stats
  const handleAutoResults = useCallback((updatedSingles) => {
    setHistory(prev => {
      const resultMap = new Map(
        updatedSingles.filter(p => p.result).map(p => [p.id, p.result])
      );
      if (resultMap.size === 0) return prev;
      const next = prev.map(p => resultMap.has(p.id) ? { ...p, result: resultMap.get(p.id) } : p);
      saveHistory(next);
      saveLearningStats(next);
      return next;
    });
    // Signal all-done badge if all resolved
    const allResolved = updatedSingles.every(p => p.result);
    if (allResolved && updatedSingles.length > 0) setReviewAllDone(true);
  }, []);

  // Mark a parlay result
  const handleMarkParlay = useCallback((parlayId, result) => {
    setParlayHistory(prev => {
      const existing = prev.find(p => p.id === parlayId);
      let next;
      if (existing) {
        next = prev.map(p => p.id === parlayId ? {...p, result} : p);
      } else {
        next = [...prev, { id: parlayId, result }];
      }
      saveParlayHistory(next);
      return next;
    });
  }, []);

  // When picks are generated, upsert them into history + save to daily picks key
  const handlePicksGenerated = useCallback((picks, sport) => {
    const nowIso = new Date().toISOString();
    const todayKey = getDailyKey();
    const newEntries = [];
    const dailySingles = [];

    for (const gp of picks) {
      const gameLabel = `${gp.away_team} @ ${gp.home_team}`;
      for (const ptype of ['spread','moneyline','total']) {
        const p = gp[ptype];
        if (!p) continue;
        const pickDisplay = ptype === 'total'
          ? `${p.direction} ${p.line}`
          : `${p.pick}`;
        const base = {
          id: `${gp.game_id}_${ptype}`,
          sport: sport.label,
          sport_key: sport.key,
          game_id: gp.game_id,
          game: gameLabel,
          away_team: gp.away_team,
          home_team: gp.home_team,
          commenceTime: gp.commence_time || null,
          dayName: getTodayName(),
          pick_type: ptype,
          pick_display: pickDisplay,
          odds: p.odds,
          slot: gp.game_slot,
          systems: p.systems || [],
          flags: p.systems || [],
          ai_strength: p.ai_strength,
          confidence: p.ai_strength || 50,
          oddsProb: p.odds ? Math.round(americanToImplied(p.odds)) : null,
          is_value_dog: (p.systems || []).includes('VALUE DOG'),
          generated_at: nowIso,
          result: null,
        };
        // Extra fields for auto result calculation
        if (ptype === 'spread') {
          base.picked_team = (p.pick || '').replace(/\s[+-]?\d+(\.\d+)?$/, '').trim();
          base.spread_line = p.line ?? null;
          base.opening_spread = p.line ?? null; // CLV tracking
        } else if (ptype === 'total') {
          base.total_direction = p.direction || null;
          base.total_line = p.line ?? null;
          base.opening_total = p.line ?? null; // CLV tracking
        } else if (ptype === 'moneyline') {
          base.picked_team = p.pick || null;
          base.opening_ml = p.odds ?? null; // CLV tracking
        }
        // Line timing
        if (gp.commence_time) {
          const hrs = (new Date(gp.commence_time) - new Date()) / 3600000;
          base.hours_before_game = Math.round(hrs * 10) / 10;
          base.line_value_window = hrs >= 4 ? 'EARLY' : hrs >= 2 ? 'STANDARD' : 'LATE';
        }
        newEntries.push(base);
        dailySingles.push(base);
      }
    }

    // Save to efp_history_v2
    setHistory(prev => {
      const next = upsertPicksToHistory(newEntries, prev);
      saveHistory(next);
      return next;
    });

    // Save to daily picks key (picks_YYYY-MM-DD)
    const existing = loadDailyPicks(todayKey) || { date: todayKey, singles: [], parlays: [] };
    const existIds = new Set(existing.singles.map(p => p.id));
    const toAdd = dailySingles.filter(p => !existIds.has(p.id));
    if (toAdd.length > 0) {
      saveDailyPicks(todayKey, { ...existing, singles: [...existing.singles, ...toAdd] });
    }
  }, []);

  // When parlays generated, store them for result tracking + save legs to daily picks
  const handleParlaysGenerated = useCallback((slips) => {
    const todayKey = getDailyKey();

    // Update parlayHistory state
    setParlayHistory(prev => {
      const existingIds = new Set(prev.map(p => p.id));
      const newOnes = slips.filter(s => !existingIds.has(s.id)).map(s => ({ id: s.id, result: null }));
      if (newOnes.length === 0) return prev;
      const next = [...prev, ...newOnes];
      saveParlayHistory(next);
      return next;
    });

    // Save full leg data to daily picks key
    const existing = loadDailyPicks(todayKey) || { date: todayKey, singles: [], parlays: [] };
    const existIds = new Set(existing.parlays.map(p => p.id));
    const toAdd = slips
      .filter(s => !existIds.has(s.id) && s.legs?.length)
      .map(s => ({
        id: s.id,
        type: s.type || '?',
        legs: (s.legs || []).map((leg, i) => ({
          id: `${s.id}_leg${i}`,
          sport: leg.sport || '',
          awayTeam: leg.awayTeam || '',
          homeTeam: leg.homeTeam || '',
          pick: leg.pick || '',
          odds: leg.odds || '',
          result: null,
        })),
        result: null,
      }));
    if (toAdd.length > 0) {
      saveDailyPicks(todayKey, { ...existing, parlays: [...existing.parlays, ...toAdd] });
    }
  }, []);

  const handleClearHistory = () => {
    if (!confirm('Clear all pick history? This cannot be undone.')) return;
    setHistory([]);
    saveHistory([]);
  };

  // Sub-tabs for sport view
  const sportInnerTabs = [
    { id: 'picks', label: '⚡ AI Picks' },
    { id: 'injuries', label: '🏥 News' },
  ];

  return (
    <div className="app-root">
      <header className="header">
        <div className="header-inner">
          <div className="header-top">
            <div className="logo">
              <div className="logo-box">EF</div>
              <div className="logo-text">
                <h1>EDGEFINDER PRO</h1>
                <div style={{fontSize:10,color:'#555',fontFamily:'var(--font)',marginTop:1,letterSpacing:0.3}}>Mission: Build wealth through disciplined winning picks</div>
                {globalQuota && (
                  <p style={{fontSize:9,color:'var(--text-dim)',fontFamily:'var(--font-mono)'}}>
                    {globalQuota.remainingRequests} API credits
                    {nextLineCheckTime && new Date().getHours() >= 11 && new Date().getHours() < 23 && (
                      <span style={{marginLeft:6,color:parseInt(globalQuota.remainingRequests)<50?'var(--red)':parseInt(globalQuota.remainingRequests)<100?'var(--yellow)':'var(--text-dim)'}}>
                        {parseInt(globalQuota.remainingRequests) < 50 ? '⚠ auto-refresh OFF'
                          : parseInt(globalQuota.remainingRequests) < 100 ? '· 90min interval'
                          : `· monitoring`}
                      </span>
                    )}
                  </p>
                )}
                {deployInfo && (
                  <p style={{fontSize:9,color:'var(--text-dim)',fontFamily:'var(--font-mono)',marginTop:1}}>
                    🚀 {deployInfo.env === 'production' ? 'Live' : deployInfo.env || 'Local'} · Deployed {new Date(deployInfo.deployedAt).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}
                    {deployInfo.commitSha && <span style={{marginLeft:4,opacity:.6}}>{deployInfo.commitSha.slice(0,7)}</span>}
                  </p>
                )}
              </div>
            </div>
            <div style={{display:'flex',gap:4,flexWrap:'wrap',alignItems:'center'}}>
              <button
                className={`sport-tab special${activeTab === 'parlays' ? ' active' : ''}`}
                onClick={() => setActiveTab('parlays')}
              >💰 PARLAYS</button>
              <button
                className={`sport-tab stats-tab${activeTab === 'stats' ? ' active' : ''}`}
                onClick={() => setActiveTab('stats')}
              >📊 STATS</button>
              <button
                className={`sport-tab${activeTab === 'yesterday' ? ' active' : ''}`}
                style={{borderColor:'rgba(255,200,0,.4)',color:activeTab==='yesterday'?'var(--yellow)':'var(--text-dim)',position:'relative'}}
                onClick={() => { setActiveTab('yesterday'); setReviewAllDone(false); }}
              >
                📋 REVIEW
                {activeTab !== 'yesterday' && reviewAllDone && (
                  <span style={{position:'absolute',top:-4,right:-4,fontSize:9,background:'var(--green)',color:'#000',borderRadius:8,padding:'1px 4px',fontWeight:900,lineHeight:1.4}}>✓</span>
                )}
                {activeTab !== 'yesterday' && !reviewAllDone && reviewInWindow && (
                  <span style={{position:'absolute',top:-4,right:-4,fontSize:9,background:'#64b4ff',color:'#000',borderRadius:8,padding:'1px 4px',fontWeight:900,lineHeight:1.4,animation:'pulse 2s infinite'}}>🔄</span>
                )}
              </button>
            </div>
          </div>
          <div className="sport-tabs">
            {SPORTS.map(s => {
              const moveCount = (lineMovements[s.key] || []).length;
              return (
                <button
                  key={s.key}
                  className={`sport-tab${activeTab === s.key ? ' active' : ''}`}
                  style={{position:'relative'}}
                  onClick={() => { setActiveTab(s.key); setInnerTab('picks'); }}
                >
                  {s.label}
                  {moveCount > 0 && activeTab !== s.key && (() => {
                    const hasSteam = (lineMovements[s.key] || []).some(m => hasSteamMove(m.moves));
                    return (
                      <span className="tab-notif" style={hasSteam ? {background:'#ff6400',color:'#fff'} : {}}>
                        {hasSteam ? '🔥' : moveCount}
                      </span>
                    );
                  })()}
                </button>
              );
            })}
          </div>
        </div>
      </header>

      <main>
        {/* Global lines-updated banner */}
        {!linesBannerDismissed && Object.keys(lineMovements).length > 0 && (() => {
          const totalMoves = Object.values(lineMovements).reduce((s, a) => s + a.length, 0);
          const sportWithMost = Object.entries(lineMovements).sort((a,b) => b[1].length - a[1].length)[0]?.[0];
          return (
            <div className="lines-banner" onClick={() => { if (sportWithMost) { setActiveTab(sportWithMost); setInnerTab('picks'); } }}>
              <span>📈 Lines Updated — {totalMoves} game{totalMoves !== 1 ? 's' : ''} moved across {Object.keys(lineMovements).length} sport{Object.keys(lineMovements).length !== 1 ? 's' : ''}</span>
              <button style={{marginLeft:'auto',background:'none',border:'none',color:'var(--yellow)',cursor:'pointer',fontSize:14,lineHeight:1}}
                onClick={e => { e.stopPropagation(); setLinesBannerDismissed(true); }}>✕</button>
            </div>
          );
        })()}

        {/* Best Bet of the Day — shown above sport tabs when not on a special tab */}
        {!isSpecialTab && <BestBetSection history={history} />}

        {/* Sport inner tabs */}
        {!isSpecialTab && (
          <div style={{display:'flex',gap:4,marginBottom:14}}>
            {sportInnerTabs.map(t => (
              <button
                key={t.id}
                className={`sport-tab${innerTab === t.id ? ' active' : ''}`}
                style={{fontSize:10,padding:'4px 10px'}}
                onClick={() => setInnerTab(t.id)}
              >{t.label}</button>
            ))}
          </div>
        )}

        {/* Content */}
        {!isSpecialTab && activeSport && innerTab === 'picks' && (
          <PicksView
            key={activeSport.key}
            sport={activeSport}
            gamesCache={gamesCache}
            setGamesCache={setGamesCache}
            history={history}
            onMarkResult={handleMarkResult}
            onPicksGenerated={handlePicksGenerated}
            onQuotaUpdate={setGlobalQuota}
            lineMovementsForSport={lineMovements[activeSport.key] || []}
            updatedPicksForSport={updatedPicks}
          />
        )}
        {!isSpecialTab && activeSport && innerTab === 'injuries' && (
          <InjuriesView sport={activeSport} />
        )}

        {activeTab === 'parlays' && (
          <ParlaysView
            gamesCache={gamesCache}
            setGamesCache={setGamesCache}
            history={history}
            parlayHistory={parlayHistory}
            onMarkParlay={handleMarkParlay}
            onParlaysGenerated={handleParlaysGenerated}
          />
        )}

        {activeTab === 'stats' && (
          <PerformanceView
            history={history}
            parlayHistory={parlayHistory}
            onMarkResult={handleMarkResult}
            onClearHistory={handleClearHistory}
            onRecalcStats={() => setHistory([...loadHistory()])}
          />
        )}

        {activeTab === 'yesterday' && <YesterdayView onAutoResults={handleAutoResults} onAutoParlay={handleAutoParlay} />}
      </main>

      <footer>
        EdgeFinder Pro · Odds API + Claude AI · Gamble responsibly 18+
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
